<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Case</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy3:#1C2E44;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px;flex-shrink:0}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff}
.gn-links{display:flex;align-items:center;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-right{display:flex;align-items:center;gap:8px;margin-left:8px}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.gn-av{width:24px;height:24px;border-radius:50%;background:var(--navy3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.gn-user{font-size:11px;font-weight:500;color:rgba(255,255,255,0.8)}
.shell{display:flex;flex-direction:column;height:calc(100vh - 48px)}
.case-header{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.case-bar-top{display:flex;align-items:center;gap:12px;padding:10px 20px;flex-wrap:wrap}
.case-back{font-size:12px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:4px}
.case-back:hover{color:var(--text)}
.case-bar-meta{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;font-size:12px}
.case-bar-ref{font-family:var(--mono);font-size:11px;color:var(--text3)}
.case-bar-name{font-weight:500;color:var(--text)}
.case-bar-flight,.case-bar-value,.case-bar-jur{color:var(--text2)}
.case-bar-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.case-bar-cpr,.case-bar-ev{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.dp-urgent{background:var(--red-faint);color:var(--red)}
.dp-warn{background:var(--amber-faint);color:var(--amber)}
.dp-ok{background:var(--green-faint);color:var(--green)}
.case-cta{margin-left:auto;font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--r);background:var(--navy);color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.case-cta:hover{opacity:0.92}
.waiting-on{background:var(--amber-faint);border-top:1px solid #FDE68A;padding:8px 20px;font-size:12px;color:var(--text2)}
.demo-study-strip{background:linear-gradient(135deg,var(--blue-faint),#fff);border-bottom:1px solid #BFDBFE;padding:8px 20px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.demo-study-strip strong{color:var(--blue-text);font-weight:500}
.demo-study-strip a{color:var(--blue-text);text-decoration:none;font-weight:500;margin-left:auto}
.demo-study-strip a:hover{text-decoration:underline}
.stage-tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;flex-shrink:0}
.stage-tab{display:flex;align-items:center;gap:6px;padding:11px 14px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);white-space:nowrap}
.stage-tab:hover{color:var(--text)}
.stage-tab.active{color:var(--blue-text);border-bottom-color:var(--blue)}
.stage-tab.done{color:var(--green)}
.tab-panel{flex:1;overflow:hidden;min-height:0}
.tab-panel-inner{height:100%;overflow-y:auto;padding:16px 20px}
.case-frame{width:100%;height:100%;border:none;background:var(--surface2)}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:16px}
.panel-card.highlight{border-color:#BFDBFE;background:linear-gradient(135deg,var(--blue-faint),#fff)}
.pc-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:8px}
.pc-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:12px;line-height:1.4}
.btn-primary{font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)}
.kv:last-child{border-bottom:none}
.kv span:first-child{color:var(--text3)}
.kv span:last-child{font-weight:500;text-align:right}
.mini-pipeline{display:flex;gap:4px;margin-top:4px}
.mp-step{flex:1;text-align:center;cursor:pointer;padding:6px 4px;border-radius:var(--r)}
.mp-step.current{background:var(--blue-faint)}
.mp-step.done .mp-dot{background:var(--green)}
.mp-dot{width:10px;height:10px;border-radius:50%;background:var(--border);margin:0 auto 4px}
.mp-label{font-size:10px;color:var(--text3)}
.mp-step.current .mp-label{color:var(--blue-text);font-weight:500}
.alert-box{margin-top:10px;font-size:11px;line-height:1.55;color:var(--amber);background:var(--amber-faint);border-radius:var(--r);padding:10px}
.similar-row{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.similar-row:last-child{border-bottom:none}
.sim-ref{font-family:var(--mono);font-size:10px;color:var(--text3)}
.sim-name{font-size:12px;font-weight:500}
.sim-meta{font-size:11px;color:var(--text3)}
.empty-note{font-size:12px;color:var(--text3);padding:12px 0}
.activity-list{margin-bottom:12px}
.act-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--blue)}
.act-dot.act-note{background:var(--purple,#4338CA)}
.act-dot.act-create{background:var(--green)}
.act-text{font-size:12px;color:var(--text)}
.act-time{font-size:10px;color:var(--text3);margin-top:2px}
.note-form{display:flex;gap:8px}
.note-form input{flex:1;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font)}
.note-form button{font-size:12px;padding:8px 12px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font)}
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:1000;align-items:flex-start;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;box-shadow:0 4px 20px rgba(0,0,0,0.12);overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.ud-item:hover,.ud-item.current{background:var(--blue-faint)}
.ud-av{width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.ud-name{font-size:12px;font-weight:500}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);font-size:14px;display:none}
.ud-item.current .ud-tick{display:block}
@media(max-width:800px){.overview-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="shared_data.js"></script>
<script src="case_helpers.js"></script>
<script src="demo_studies.js"></script>
<script src="case_shell.js"></script>

<nav class="global-nav">
  <a href="index.html" class="gn-logo"><div class="gn-mark"><i class="ti ti-plane"></i></div><span class="gn-name">261Claims</span></a>
  <div class="gn-links" id="gn-links"></div>
  <div class="gn-right">
    <div class="gn-user-btn" onclick="toggleUserMenu()">
      <div class="gn-av" id="nav-av">SB</div>
      <span class="gn-user" id="nav-user">S. Booth</span>
    </div>
  </div>
</nav>

<div class="shell">
  <div class="case-header" id="case-header"></div>
  <div class="stage-tabs" id="case-tabs"></div>
  <div class="tab-panel" id="tab-panel"></div>
</div>

<script src="shared_nav.js"></script>
<script>window.addEventListener('load', function(){ CaseShell.init(); });</script>

<div id="user-modal" class="user-modal" onclick="if(event.target===this)closeMenu()">
  <div class="user-dropdown">
    <div class="ud-header">Switch user — demo</div>
    <div class="ud-item" id="ud-SB" onclick="switchUser('SB')"><div class="ud-av">SB</div><div><div class="ud-name">Sarah Booth</div><div class="ud-role">Head of Legal Ops</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-JP" onclick="switchUser('JP')"><div class="ud-av">JP</div><div><div class="ud-name">James Patel</div><div class="ud-role">Senior Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-KR" onclick="switchUser('KR')"><div class="ud-av">KR</div><div><div class="ud-name">Kiran Rahman</div><div class="ud-role">Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div class="ud-item" id="ud-MD" onclick="switchUser('MD')"><div class="ud-av" style="background:#1a3a6b">MD</div><div><div class="ud-name">Marie Dupont</div><div class="ud-role">Juriste senior</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-PL" onclick="switchUser('PL')"><div class="ud-av" style="background:#1a3a6b">PL</div><div><div class="ud-name">Pierre Laurent</div><div class="ud-role">Juriste</div></div><i class="ti ti-check ud-tick"></i></div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div class="ud-item" id="ud-CG" onclick="switchUser('CG')"><div class="ud-av" style="background:#6b1a1a">CG</div><div><div class="ud-name">Carlos García</div><div class="ud-role">Abogado senior</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-IM" onclick="switchUser('IM')"><div class="ud-av" style="background:#6b1a1a">IM</div><div><div class="ud-name">Isabel Martín</div><div class="ud-role">Abogada</div></div><i class="ti ti-check ud-tick"></i></div>
    <div style="height:1px;background:var(--border);margin:4px 0"></div>
    <div class="ud-item" id="ud-EH" onclick="switchUser('EH')"><div class="ud-av" style="background:#164E63">EH</div><div><div class="ud-name">Emma Hughes</div><div class="ud-role">Evidence Handling Specialist</div></div><i class="ti ti-check ud-tick"></i></div>
  </div>
</div>
<script>
function toggleUserMenu(){var m=document.getElementById('user-modal');if(m)m.classList.toggle('open');}
function closeMenu(){var m=document.getElementById('user-modal');if(m)m.classList.remove('open');}
function switchUser(id){
  if(typeof setActiveUser==='function')setActiveUser(id);
  sessionStorage.removeItem('261c_lang');
  closeMenu();
  if(id==='EH'&&USERS[id]&&USERS[id].team==='evidence'){window.location.href='index.html';return;}
  var u=USERS[id];
  if(u){document.getElementById('nav-av').textContent=u.initials;document.getElementById('nav-user').textContent=u.name;}
  ['SB','JP','KR','MD','PL','CG','IM','EH'].forEach(function(uid){var el=document.getElementById('ud-'+uid);if(el)el.classList.toggle('current',uid===id);});
  if(typeof renderGlobalNav==='function')renderGlobalNav();
  CaseShell.init();
}
</script>
</body>
</html>
