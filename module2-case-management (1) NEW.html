<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aero Claims — Module 2: Case Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}

/* ── Topbar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}

/* ── Body layout ── */
.body{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
.main{overflow-y:auto;padding:22px 26px}
.sidebar{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}

/* ── Stage rail ── */
.stage-rail{display:flex;align-items:center;gap:0;margin-bottom:22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 18px;overflow-x:auto}
.rail-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:64px;position:relative;cursor:pointer;user-select:none}
.rail-step:not(:last-child)::after{content:'';position:absolute;top:12px;right:-50%;width:100%;height:1.5px;background:var(--border2);z-index:0}
.rail-pip{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--border2);background:var(--surface3);color:var(--text3);position:relative;z-index:1;transition:all 0.2s}
.rail-pip.complete{background:var(--green-faint);border-color:var(--green-l);color:var(--green)}
.rail-pip.active{background:var(--blue-faint);border-color:var(--blue);color:var(--blue-text);box-shadow:0 0 0 3px rgba(42,111,219,0.12)}
.rail-label{font-size:10px;font-weight:500;margin-top:5px;text-align:center;color:var(--text3);transition:color 0.2s}
.rail-label.active{color:var(--blue-text)}
.rail-label.complete{color:var(--green)}

/* ── Case header ── */
.case-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:16px 20px;margin-bottom:18px}
.ch-ref{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:3px}
.ch-name{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em}
.ch-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--text2)}
.ch-meta span{display:flex;align-items:center;gap:4px}
.ch-meta i{font-size:13px;color:var(--text3)}

/* ── Stage card ── */
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-bottom:16px}
.sc-top{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.sc-stage-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.sc-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px}
.sc-purpose{font-size:12px;color:var(--text2);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:var(--r);border-left:3px solid var(--border2)}
.sc-body{padding:18px 20px}

/* ── Checklist ── */
.checklist{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);transition:border-color 0.15s}
.check-item.complete{background:var(--green-faint);border-color:#BBF7D0}
.check-item.blocked{background:var(--surface3);opacity:0.55;pointer-events:none}
.check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surface);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.check-box:hover{border-color:var(--blue)}
.check-box.checked{background:var(--green-l);border-color:var(--green-l)}
.check-box.checked i{display:block}
.check-box i{display:none;color:#fff;font-size:11px}
.check-content{flex:1}
.check-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.check-title.done{text-decoration:line-through;color:var(--text3)}
.check-sub{font-size:11px;color:var(--text2);line-height:1.5}
.check-tag{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px}
.tag-required{background:var(--red-faint);color:var(--red)}
.tag-rec{background:var(--amber-faint);color:var(--amber)}
.tag-optional{background:var(--surface3);color:var(--text3)}

/* ── LOA recommendation ── */
.loa-block{border:1px solid var(--amber);border-radius:var(--r2);padding:14px 16px;background:var(--amber-faint);margin-bottom:14px}
.loa-header{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.loa-title{font-size:12px;font-weight:500;color:var(--amber)}
.loa-body{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.loa-options{display:flex;flex-direction:column;gap:6px}
.loa-opt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);cursor:pointer;padding:3px 0}
.loa-opt input[type=radio]{accent-color:var(--navy);width:14px;height:14px;cursor:pointer}

/* ── Document upload items ── */
.doc-upload-item{border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;background:var(--surface);margin-bottom:8px}
.dui-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dui-icon{width:30px;height:30px;border-radius:var(--r);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0}
.dui-icon.uploaded{background:var(--green-faint);color:var(--green)}
.dui-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.dui-status{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.st-required{background:var(--red-faint);color:var(--red)}
.st-uploaded{background:var(--green-faint);color:var(--green)}
.st-optional{background:var(--surface3);color:var(--text3)}
.dui-why{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px;padding-left:40px}
.dui-actions{display:flex;align-items:center;gap:8px;padding-left:40px}
.btn-upload{font-size:11px;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:4px;transition:background 0.15s}
.btn-upload:hover{background:var(--surface3)}
.btn-upload.done{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}
.uploaded-name{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── Advance button ── */
.advance-wrap{margin-top:4px}
.btn-advance{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.15s}
.btn-advance:hover:not(:disabled){background:var(--navy2)}
.btn-advance:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.advance-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:7px;min-height:16px}

/* ── Sidebar ── */
.sb-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:12px;font-weight:500;color:var(--text)}
.sb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.audit-scroll{flex:1;overflow-y:auto;padding:10px 14px}
.audit-entry{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.audit-entry:last-child{border-bottom:none}
.audit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-stage{background:var(--blue)}.dot-action{background:var(--green-l)}.dot-upload{background:#8B5CF6}.dot-note{background:var(--amber)}.dot-create{background:var(--green-l)}
.audit-text{font-size:11px;color:var(--text);line-height:1.4}
.audit-time{font-size:10px;color:var(--text3);margin-top:2px}
.audit-by{font-size:10px;color:var(--text3)}
.note-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.note-bar input{flex:1;font-size:11px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.note-bar input:focus{outline:none;border-color:var(--blue)}
.note-bar button{font-size:11px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--font);color:var(--text2);white-space:nowrap}
.note-bar button:hover{background:var(--surface3)}

input[type=file]{display:none}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <a href="module1-intake.html" class="btn-back"><i class="ti ti-arrow-left"></i> Intake</a>
      <div class="logo">
        <div class="logo-mark"><i class="ti ti-plane"></i></div>
        <span class="logo-name">Aero Claims</span>
        <span class="logo-tag">/ Case management</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="mod-badge">Module 2 — Case management</span>
      <div class="av-row"><div class="av" id="av-initials">SB</div><span id="av-name">S. Booth</span></div>
    </div>
  </div>

  <div class="body">
    <div class="main" id="main"></div>
    <div class="sidebar">
      <div class="sb-header">
        <div class="sb-title">Audit trail</div>
        <div class="sb-sub" id="audit-count">0 entries</div>
      </div>
      <div class="audit-scroll" id="audit-scroll"></div>
      <div class="note-bar">
        <input type="text" id="note-input" placeholder="Add a note to this case…" onkeydown="if(event.key==='Enter')addNote()">
        <button onclick="addNote()">Add note</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="file-input" onchange="handleUpload(event)">

<script>
/* ── Case data — read from sessionStorage (passed from Module 1) ── */
let _incoming = {};
try {
  const raw = sessionStorage.getItem('aeroCaseData');
  if(raw) { _incoming = JSON.parse(raw); sessionStorage.removeItem('aeroCaseData'); }
} catch(e) {}

const CASE = {
  ref:          _incoming.ref          || 'AC-2026-0089',
  name:         _incoming.claimant     || 'Daniel Hartley',
  sol:          _incoming.solicitor    || 'Pemberton & Associates Solicitors LLP',
  flight:       _incoming.flight       || 'HC 1184 — LTN to BCN (diverted VLC)',
  value:        _incoming.value        || '£39,000+',
  type:         _incoming.type         || 'EC 261/2004 — delay / diversion',
  date:         _incoming.date         || '22 May 2026',
  framework:    _incoming.framework    || 'EC Regulation 261/2004',
  jurisdiction: _incoming.jurisdiction || 'England & Wales',
  points:       _incoming.points       || [],
  user:         'S. Booth'
};

/* ── Derive LOA recommendation from points ── */
const redPoints   = CASE.points.filter(pt => pt.evidenceStatus === 'red').length;
const amberPoints = CASE.points.filter(pt => pt.evidenceStatus === 'amber').length;
const loaRecommended = redPoints >= 1 || CASE.points.length === 0;

/* ── Stage definitions ── */
const STAGES = [
  {
    id:'intake',
    label:'Intake',
    icon:'ti-inbox',
    color:'#1D4ED8',
    faint:'#EFF6FF',
    dot:'#3B82F6',
    purpose:'Review what has been received and decide how to respond. This stage is complete once you have confirmed the extracted details are correct, assessed the claim, and decided whether to send a Letter of Acknowledgement.',
    checks:[
      {id:'c_confirm', label:'Confirm extracted case details are correct', sub:'Review the LOC summary from intake — claimant, flight, claim type, and value.', required:true},
      {id:'c_points',  label:'Review all points of claim', sub:'Read each point and its evidence status. Note any red-flagged items that will need urgent attention.', required:true},
      {id:'c_loa',     label:'Decision made on Letter of Acknowledgement', sub:'See recommendation below — select your decision before proceeding.', required:true},
    ],
    loa: true,
    docs:[
      {id:'d_loc', name:'Letter of claim', why:'The original document from the claimant\'s solicitor. Upload here to attach it permanently to this case record.', icon:'ti-file-text', required:true},
      {id:'d_booking', name:'Booking confirmation', why:'Confirms the passenger was ticketed on this flight. Used to verify the claimant\'s right to bring a claim under EC 261/2004.', icon:'ti-file', required:false},
    ],
    nextLabel:'Confirm intake complete',
  },
  {
    id:'triage',
    label:'Triage',
    icon:'ti-search',
    color:'#92400E',
    faint:'#FEF3C7',
    dot:'#F59E0B',
    purpose:'Decide how this claim will be handled and who is responsible for it. By the end of this stage you should have a clear strategy — defend, settle early, or dismiss — and a named solicitor assigned.',
    checks:[
      {id:'t_assign',   label:'Assign lead solicitor', sub:'A named solicitor must be responsible for this case before any further steps are taken.', required:true},
      {id:'t_strategy', label:'Initial strategy agreed', sub:'Defend, pursue early settlement, or dismiss. Record the decision and brief reasoning.', required:true},
      {id:'t_complex',  label:'Complexity flag reviewed', sub:'This claim contains a consequential loss allegation (£38,250). Confirm this has been noted and will be addressed in evidence gathering.', required:true},
      {id:'t_deadline', label:'CPR response deadline noted', sub:'Response to LOC is due within 21 days of receipt. Confirm the deadline has been recorded.', required:false},
    ],
    loa: false,
    docs:[
      {id:'d_triage', name:'Triage assessment note', why:'A brief internal record of the strategy decision made at triage. Creates accountability and gives context to anyone picking up this case later.', icon:'ti-notes', required:false},
    ],
    nextLabel:'Triage complete — begin evidence gathering',
  },
  {
    id:'evidence',
    label:'Evidence',
    icon:'ti-folder',
    color:'#4338CA',
    faint:'#EEEDFE',
    dot:'#8B5CF6',
    purpose:'Gather the documents and records needed to answer each point of claim. You cannot file a defence until you know what evidence you hold and what is missing. Address the red-flagged points first.',
    checks:[
      {id:'e_weather', label:'Weather and NOTAM records requested', sub:'Required to support the extraordinary circumstances defence on Point 2. METAR, SIGMET and BCN NOTAMs for 14 March 2026.', required:true},
      {id:'e_crew',    label:'Crew statements requested', sub:'Needed to establish whether the seatbelt sign was activated and announcements made before turbulence — central to Point 2 defence.', required:true},
      {id:'e_valencia',label:'Valencia ground handling records requested', sub:'Article 9 (Point 3) — confirms whether refreshments and information were offered during the delay at VLC. Independent liability regardless of EC261 outcome.', required:true},
      {id:'e_contract',label:'Meridian Consulting contract loss investigated', sub:'Point 4 (£38,250). Independently verify the letter from Meridian Consulting SL. Causation must be challenged before any settlement is agreed.', required:true},
      {id:'e_gaps',    label:'Evidence gaps reviewed and logged', sub:'Any evidence that cannot be obtained should be explicitly noted. These gaps will inform the defence strategy and settlement value.', required:false},
    ],
    loa: false,
    docs:[
      {id:'d_metar',   name:'METAR / SIGMET weather report', why:'Proves the weather conditions at BCN on 14 March 2026. The extraordinary circumstances defence depends on showing conditions were exceptional and unavoidable.', icon:'ti-cloud', required:true},
      {id:'d_notam',   name:'NOTAM records (BCN, 14 Mar)', why:'Aerodrome notices confirm whether BCN was subject to restrictions. Supports the argument that diversion was operationally necessary.', icon:'ti-file', required:true},
      {id:'d_crew',    name:'Crew incident / cabin report', why:'The crew\'s own record of the flight. Essential to defend Point 2 — failure to warn. Shows what announcements were made and when the seatbelt sign was activated.', icon:'ti-user', required:true},
      {id:'d_fdr',     name:'Flight data recorder summary', why:'Provides the precise time the seatbelt sign was switched on. This is the single most important piece of evidence for Point 2.', icon:'ti-activity', required:true},
      {id:'d_ground',  name:'Valencia ground handling log', why:'Shows what care was provided to passengers at VLC — refreshments, information, transport. Directly addresses the Article 9 (Point 3) allegation.', icon:'ti-clipboard', required:false},
    ],
    nextLabel:'Evidence gathered — draft the defence',
  },
  {
    id:'defence',
    label:'Defence',
    icon:'ti-shield',
    color:'#065F46',
    faint:'#ECFDF5',
    dot:'#1D9E75',
    purpose:'Prepare and file the formal response to the letter of claim. Nothing leaves this stage without a named solicitor\'s sign-off. The defence must address every point raised in the LOC.',
    checks:[
      {id:'df_draft',  label:'Defence letter drafted', sub:'Using the EC 261/2004 extraordinary circumstances template. Each point of claim must be addressed in turn.', required:true},
      {id:'df_review', label:'Reviewed by lead solicitor', sub:'The assigned solicitor must confirm the draft is accurate and complete before it is sent.', required:true},
      {id:'df_signoff',label:'Sign-off confirmed', sub:'Senior counsel approval obtained. This is a formal legal response — it must be authorised.', required:true},
      {id:'df_filed',  label:'Response filed to claimant solicitor', sub:'Sent to Pemberton & Associates. Date of filing recorded.', required:true},
      {id:'df_p36',    label:'Part 36 offer considered', sub:'Given the low statutory value (€400) versus the cost of litigation, a Part 36 offer may be appropriate. Record the decision either way.', required:false},
    ],
    loa: false,
    docs:[
      {id:'d_defence', name:'Defence letter', why:'The formal response to the LOC. This document directly answers each point of claim and sets out the airline\'s position. It is the primary legal output of this stage.', icon:'ti-file-text', required:true},
      {id:'d_p36',     name:'Part 36 offer letter (if applicable)', why:'A formal settlement offer under CPR Part 36. Sending this creates costs protection for the airline if the claimant later fails to beat the offer at trial.', icon:'ti-scale', required:false},
    ],
    nextLabel:'Defence filed — proceed to resolution',
  },
  {
    id:'resolve',
    label:'Resolve',
    icon:'ti-circle-check',
    color:'#374151',
    faint:'#F9FAFB',
    dot:'#9CA3AF',
    purpose:'Close the case. Record the outcome, agree any settlement, and archive everything. This stage creates the permanent record of how this claim was resolved.',
    checks:[
      {id:'r_outcome', label:'Outcome recorded', sub:'Defended in full, settled, dismissed, or escalated to court. Select and confirm.', required:true},
      {id:'r_value',   label:'Final settlement value confirmed (if applicable)', sub:'Record the agreed figure. This feeds into management reporting.', required:false},
      {id:'r_archive', label:'All documents archived to case record', sub:'Ensure every uploaded file and drafted document is attached to this case before closing.', required:true},
      {id:'r_closure', label:'Closure note added', sub:'Brief summary of how the claim was resolved and why. Useful reference for similar future claims.', required:false},
    ],
    loa: false,
    docs:[
      {id:'d_settlement', name:'Settlement agreement or court order', why:'The final legal document confirming how the claim was resolved. Required for any settlement — creates a binding record of the agreed terms.', icon:'ti-file-check', required:false},
      {id:'d_closure',    name:'Closure note', why:'An internal summary of the case outcome. Builds the firm\'s institutional knowledge and informs the defence intelligence system over time.', icon:'ti-notes', required:false},
    ],
    nextLabel:null,
  },
];

/* ── State ── */
let currentStage = 0;
let checked = {};   // {checkId: true}
let uploaded = {};  // {docId: fileName}
let loaChoice = ''; // 'send' | 'defer' | 'none'
let audit = [];

function ts(){return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function log(text, type='action'){
  audit.push({text, type, time:ts(), by:CASE.user});
  renderAudit();
}

/* ── Progress check ── */
function stageComplete(idx){
  const s = STAGES[idx];
  const allRequired = s.checks.filter(c=>c.required).every(c=>checked[c.id]);
  const loaOk = !s.loa || loaChoice !== '';
  return allRequired && loaOk;
}

function completedCount(idx){
  const s = STAGES[idx];
  return s.checks.filter(c=>checked[c.id]).length;
}

/* ── Render ── */
function render(){
  try {
    renderMain();
  } catch(e) {
    const m = document.getElementById('main');
    if(m) m.innerHTML = '<div style="padding:40px;color:#C0392B;font-size:13px"><strong>Render error:</strong> '+e.message+'</div>';
    console.error('renderMain error:', e);
    return;
  }
  try { populateLoaReason(); } catch(e) { console.warn('LOA reason error:', e); }
  try { renderAudit(); } catch(e) { console.warn('Audit error:', e); }
}

function populateLoaReason(){
  const el = document.getElementById('loa-reason');
  if(!el) return;
  const rec = loaRecommended;
  const redTxt = redPoints > 0 ? `<strong>${redPoints} undefended point${redPoints>1?'s':''}</strong>` : null;
  const ambTxt = amberPoints > 0 ? `<strong>${amberPoints} partially evidenced point${amberPoints>1?'s':''}</strong>` : null;
  const parts = [redTxt, ambTxt].filter(Boolean).join(' and ');
  if(rec){
    el.innerHTML = `This claim has ${parts || 'points requiring attention'} and limited evidence on file. Sending a Letter of Acknowledgement is <strong>recommended</strong> — it buys time to gather evidence, satisfies pre-action protocol expectations, and signals to the claimant's solicitor that the matter is being handled seriously.`;
  } else {
    el.innerHTML = `This claim has ${parts || 'no immediate red flags'}. A Letter of Acknowledgement is <strong>not required</strong> at this stage but may still be courteous. Review the points of claim and decide accordingly.`;
  }
}

function renderMain(){
  const m = document.getElementById('main');
  const s = STAGES[currentStage];
  const done = stageComplete(currentStage);
  const total = s.checks.length;
  const comp = completedCount(currentStage);

  // stage rail
  const rail = STAGES.map((st,i)=>{
    const cls = i < currentStage ? 'complete' : i===currentStage ? 'active' : '';
    const connector = i < STAGES.length-1 ? `<div style="position:absolute;top:12px;right:-50%;width:100%;height:1.5px;background:${i<currentStage?'var(--green-l)':'var(--border2)'};z-index:0"></div>` : '';
    return `<div class="rail-step" onclick="jumpTo(${i})" title="${st.label}">
      ${connector}
      <div class="rail-pip ${cls}">
        <i class="ti ${i<currentStage?'ti-check':st.icon}" style="font-size:11px"></i>
      </div>
      <div class="rail-label ${cls}">${st.label}</div>
    </div>`;
  }).join('');

  // checks
  const checksHtml = s.checks.map((c,ci)=>{
    const isDone = !!checked[c.id];
    return `<div class="check-item${isDone?' complete':''}">
      <div class="check-box${isDone?' checked':''}" onclick="toggleCheck('${c.id}','${c.label}')">
        <i class="ti ti-check"></i>
      </div>
      <div class="check-content">
        <div class="check-title${isDone?' done':''}">
          ${c.label}
          <span class="check-tag ${c.required?'tag-required':'tag-optional'}">${c.required?'Required':'Optional'}</span>
        </div>
        <div class="check-sub">${c.sub}</div>
      </div>
    </div>`;
  }).join('');

  // loa block
  const loaHtml = s.loa ? `
    <div class="loa-block">
      <div class="loa-header">
        <i class="ti ti-alert-triangle" style="font-size:14px;color:var(--amber)"></i>
        <div class="loa-title">Letter of Acknowledgement — recommendation</div>
      </div>
      <div class="loa-body" id="loa-reason"></div>
      <div class="loa-options">
        <label class="loa-opt"><input type="radio" name="loa" value="send" onchange="setLoa('send')" ${loaChoice==='send'?'checked':''}> Send Letter of Acknowledgement — draft and send before proceeding</label>
        <label class="loa-opt"><input type="radio" name="loa" value="defer" onchange="setLoa('defer')" ${loaChoice==='defer'?'checked':''}> Defer — I will send separately outside this system</label>
        <label class="loa-opt"><input type="radio" name="loa" value="none" onchange="setLoa('none')" ${loaChoice==='none'?'checked':''}> Not sending — note reason in audit trail</label>
      </div>
    </div>` : '';

  // docs
  const docsHtml = s.docs.map(function(d){
    const isUp = !!uploaded[d.id];
    const iconCls = isUp ? 'dui-icon uploaded' : 'dui-icon';
    const statusCls = isUp ? 'st-uploaded' : (d.required ? 'st-required' : 'st-optional');
    const statusTxt = isUp ? 'Uploaded' : (d.required ? 'Required' : 'Optional');
    const uploadedHtml = isUp
      ? '<button class="btn-upload done"><i class="ti ti-check"></i> Uploaded</button><span class="uploaded-name">' + uploaded[d.id] + '</span>'
      : '<button class="btn-upload" onclick="triggerUpload(\''+d.id+'\',\''+d.name+'\')"><i class="ti ti-upload"></i> Upload file</button>';
    return '<div class="doc-upload-item">'
      + '<div class="dui-top">'
      + '<div class="'+iconCls+'"><i class="ti '+d.icon+'"></i></div>'
      + '<div class="dui-name">'+d.name+'</div>'
      + '<span class="dui-status '+statusCls+'">'+statusTxt+'</span>'
      + '</div>'
      + '<div class="dui-why">'+d.why+'</div>'
      + '<div class="dui-actions">'+uploadedHtml+'</div>'
      + '</div>';
  }).join('');

  // advance hint
  let hint = '';
  if(!done){
    const missing = s.checks.filter(c=>c.required && !checked[c.id]);
    if(missing.length) hint = `${missing.length} required item${missing.length>1?'s':''} remaining before you can proceed`;
    if(s.loa && loaChoice==='') hint = hint || 'Select a Letter of Acknowledgement decision to proceed';
  }

  // next stage label
  const isLast = currentStage === STAGES.length - 1;

  m.innerHTML = `
    <div class="stage-rail">${rail}</div>

    <div class="case-hdr">
      <div class="ch-ref">${CASE.ref}</div>
      <div class="ch-name">${CASE.name} v. Horizon Airways</div>
      <div class="ch-meta">
        <span><i class="ti ti-plane"></i>${CASE.flight}</span>
        <span><i class="ti ti-currency-pound"></i>${CASE.value}</span>
        <span><i class="ti ti-calendar"></i>Received ${CASE.date}</span>
        <span><i class="ti ti-file-text"></i>${CASE.type}</span>
      </div>
    </div>

    <div class="stage-card">
      <div class="sc-top" style="border-left:4px solid ${s.dot}">
        <div class="sc-stage-label" style="color:${s.color}"><i class="ti ${s.icon}" style="font-size:12px"></i>${s.label} — ${comp} of ${total} items complete</div>
        <div class="sc-title">${stageTitle(currentStage)}</div>
        <div class="sc-purpose">${s.purpose}</div>
      </div>
      <div class="sc-body">
        <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px">Checklist</div>
        <div class="checklist">${checksHtml}</div>
        ${loaHtml}
        ${s.docs.length ? `<div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px">Documents</div>${docsHtml}` : ''}
        <div class="advance-wrap" style="margin-top:18px">
          ${isLast && done
            ? `<div style="text-align:center;padding:14px;font-size:13px;color:var(--green);font-weight:500;border:1px solid var(--green-faint);border-radius:var(--r2);background:var(--green-faint)"><i class="ti ti-circle-check"></i>  Case closed — all stages complete</div>`
            : `<button class="btn-advance" onclick="advance()" ${done?'':'disabled'}>${s.nextLabel||'Close case'} <i class="ti ti-arrow-right"></i></button>
               <div class="advance-hint">${hint}</div>`
          }
        </div>
      </div>
    </div>`;
}

function stageTitle(i){
  const titles = ['What have we received?','How will we handle this?','What evidence do we need?','Prepare and file the defence','Close the case'];
  return titles[i] || STAGES[i].label;
}

function renderAudit(){
  const el = document.getElementById('audit-scroll');
  document.getElementById('audit-count').textContent = audit.length + ' entr' + (audit.length===1?'y':'ies');
  if(!audit.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 2px">No activity yet</div>';return;}
  el.innerHTML = [...audit].reverse().map(e=>`
    <div class="audit-entry">
      <div class="audit-dot dot-${e.type}"></div>
      <div>
        <div class="audit-text">${e.text}</div>
        <div class="audit-time">${e.time} &middot; <span class="audit-by">${e.by}</span></div>
      </div>
    </div>`).join('');
}

/* ── Interactions ── */
function toggleCheck(id, label){
  if(checked[id]){
    delete checked[id];
    log('Unchecked: '+label, 'action');
  } else {
    checked[id] = true;
    log('Completed: '+label, 'action');
  }
  renderMain();
}

function setLoa(val){
  const prev = loaChoice;
  loaChoice = val;
  if(val !== prev){
    const msgs = {send:'Decision: Letter of Acknowledgement will be sent', defer:'Decision: LOA will be sent separately outside system', none:'Decision: Letter of Acknowledgement not being sent — reason to be noted'};
    log(msgs[val], 'action');
    // mark the loa check as done automatically
    checked['c_loa'] = true;
  }
  renderMain();
}

function advance(){
  if(!stageComplete(currentStage)) return;
  log('Stage completed: '+STAGES[currentStage].label+' → '+(STAGES[currentStage+1]?.label||'closed'), 'stage');
  currentStage++;
  render();
  document.getElementById('main').scrollTo(0,0);
}

function jumpTo(i){
  if(i === currentStage) return;
  if(i > currentStage){
    // only allow jumping forward if all previous stages complete
    for(let x = currentStage; x < i; x++){
      if(!stageComplete(x)){
        log('Cannot skip to '+STAGES[i].label+' — '+STAGES[x].label+' is not complete', 'note');
        return;
      }
    }
  }
  log('Navigated to: '+STAGES[i].label, 'note');
  currentStage = i;
  render();
  document.getElementById('main').scrollTo(0,0);
}

let pendingUpload = null;
function triggerUpload(docId, docName){
  pendingUpload = {docId, docName};
  document.getElementById('file-input').click();
}
function handleUpload(e){
  const f = e.target.files[0];
  if(!f || !pendingUpload) return;
  uploaded[pendingUpload.docId] = f.name;
  log('Document uploaded: "'+f.name+'" for '+pendingUpload.docName, 'upload');
  e.target.value='';
  pendingUpload=null;
  renderMain();
}

function addNote(){
  const inp = document.getElementById('note-input');
  const val = inp.value.trim();
  if(!val) return;
  log(val, 'note');
  inp.value='';
}

/* ── Init ── */
log('Case activated from intake — '+CASE.name+' v. Horizon Airways', 'create');
log('Claim type: '+CASE.type+' · Value: '+CASE.value, 'create');
render();
</script>
</body>
</html>
