<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Evidence requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1628;--blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;--green:#1A7A4A;--green-faint:#E6F5EE;--red:#C0392B;--red-faint:#FCF0EF;--amber:#B45309;--amber-faint:#FEF3C7;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;--surface:#fff;--surface2:#F8FAFC;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--font-serif:'Instrument Serif',serif;--r:8px;--r2:12px;--r3:16px}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff}
.gn-links{display:flex;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:450;color:rgba(255,255,255,0.5);text-decoration:none}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-right{margin-left:8px}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.gn-av{width:24px;height:24px;border-radius:50%;background:#1C2E44;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.gn-user{font-size:11px;color:rgba(255,255,255,0.85)}
.page{height:calc(100vh - 48px);overflow-y:auto;padding:20px 24px;max-width:900px}
.page-hdr{margin-bottom:16px}
.page-hdr h1{font-family:var(--font-serif);font-size:19px;font-weight:400}
.page-hdr p{font-size:12px;color:var(--text3);margin-top:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:14px}
.filter-chip{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text2)}
.filter-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.req-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 16px;margin-bottom:10px}
.req-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.req-id{font-family:var(--mono);font-size:10px;color:var(--text3)}
.req-title{font-size:14px;font-weight:500;margin:4px 0}
.req-meta{font-size:12px;color:var(--text2);line-height:1.55}
.req-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text2);margin-left:6px}
.req-pill.urgent{background:var(--red-faint);color:var(--red)}
.req-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn-mini{font-size:11px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.btn-mini.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn-mini.done{background:var(--green-faint);border-color:#BBF7D0;color:var(--green)}
.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px}
.stat-label{font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.06em}
.stat-val{font-size:22px;font-weight:500;margin-top:4px}
.notif-bar{background:var(--blue-faint);border:1px solid #BFDBFE;border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blue-text)}
.notif-bar strong{display:block;margin-bottom:4px}
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.ud-item:hover,.ud-item.current{background:var(--blue-faint)}
.ud-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.ud-name{font-size:12px;font-weight:500}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);display:none}
.ud-item.current .ud-tick{display:block}
</style>
</head>
<body>
<script src="shared_data.js"></script>
<script src="case_helpers.js"></script>
<script src="evidence_filing.js"></script>

<nav class="global-nav">
  <a href="index.html" class="gn-logo"><div class="gn-mark"><i class="ti ti-plane"></i></div><span class="gn-name">261Claims</span></a>
  <div class="gn-links" id="gn-links"></div>
  <div class="gn-right"><div class="gn-user-btn" onclick="toggleUserMenu()"><div class="gn-av" id="nav-av">EH</div><span class="gn-user" id="nav-user">E. Hughes</span></div></div>
</nav>

<div class="page" id="page"></div>

<script>
var statusFilter='open';
function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}
function setStatusFilter(s){statusFilter=s;render();}

function openRequest(id){
  var r=getEvidenceRequests().find(function(x){return x.id===id;});
  if(!r)return;
  try{
    sessionStorage.setItem('261c_active_request',r.id);
    var c=getCase(r.ref);
    if(c)sessionStorage.setItem('261c_case',JSON.stringify(c));
  }catch(e){}
  updateEvidenceRequest(r.id,'in-progress');
  window.location.href='case.html?ref='+encodeURIComponent(r.ref)+'&tab=evidence&request='+encodeURIComponent(r.id);
}

function markRequestComplete(id){
  var req=typeof completeEvidenceRequest==='function'?completeEvidenceRequest(id):null;
  if(req&&typeof EvidenceFiling!=='undefined'){
    EvidenceFiling.uploadFile({
      categoryId:'dpm',
      date:'2026-03-24',
      filename:'HC1184_DailyOpsReview_24MAR24.pdf',
      flights:['HC 1184'],
      routes:'LTN-BCN-VLC',
      uploadedBy:'EH',
      uploadedByName:'E. Hughes',
      source:'Manual',
      size:62000,
      notes:'Daily Operations Review uploaded on request completion'
    });
    EvidenceFiling.uploadFile({
      categoryId:'max_ops',
      date:'2026-03-14',
      filename:'HC1184_Valencia_GroundHandling_14Mar2026.pdf',
      flights:['HC 1184'],
      routes:'VLC',
      uploadedBy:'EH',
      uploadedByName:'E. Hughes',
      source:'Manual',
      size:84000
    });
    try{
      var evState=JSON.parse(sessionStorage.getItem('261c_evidence_AC-2026-0089')||'null');
      if(evState){
        evState.uploads=evState.uploads||{};
        evState.uploads.ops_review='HC1184_DailyOpsReview_24MAR24.pdf';
        evState.uploads.max_ops='HC1184_Valencia_GroundHandling_14Mar2026.pdf';
        evState.uploads.dpm='HC1184_DailyOpsReview_24MAR24.pdf';
        evState.pullState=evState.pullState||{};
        evState.pullState.ops_review='done';
        evState.pullState.max_ops='done';
        evState.pullState.dpm='done';
        evState.pullAllDone=true;
        evState.evidencePct=100;
        sessionStorage.setItem('261c_evidence_AC-2026-0089',JSON.stringify(evState));
      }
      if(typeof syncCaseEvidencePct==='function')syncCaseEvidencePct(req.ref,100,true);
    }catch(e){}
  }
  sessionStorage.removeItem('261c_active_request');
  render();
}

function render(){
  var uid=getActiveUser();
  var u=USERS[uid]||USERS.EH;
  var reqs=getEvidenceRequests();
  var notifs=getNotifications(uid).filter(function(n){return !n.read;});
  var open=reqs.filter(function(r){return r.status!=='complete';});
  var complete=reqs.filter(function(r){return r.status==='complete';});
  var shown=statusFilter==='complete'?complete:statusFilter==='in-progress'?open.filter(function(r){return r.status==='in-progress';}):open.filter(function(r){return r.status==='open'||r.status==='in-progress';});

  var notifHtml=notifs.length?'<div class="notif-bar"><strong><i class="ti ti-bell"></i> '+notifs.length+' new notification'+(notifs.length!==1?'s':'')+'</strong>'+notifs.slice(0,3).map(function(n){return escapeHtml(n.title)+' — '+escapeHtml(n.body);}).join('<br>')+'</div>':'';

  document.getElementById('page').innerHTML=
    '<div class="page-hdr"><h1>Evidence requests · '+open.length+' open</h1><p>Queue for '+escapeHtml(u.name)+' — requests from legal teams where gold evidence packs have gaps</p></div>'
    +notifHtml
    +'<div class="stats"><div class="stat"><div class="stat-label">Open</div><div class="stat-val">'+open.length+'</div></div><div class="stat"><div class="stat-label">Urgent</div><div class="stat-val" style="color:var(--red)">'+open.filter(function(r){return r.priority==='Urgent';}).length+'</div></div><div class="stat"><div class="stat-label">Complete</div><div class="stat-val" style="color:var(--green)">'+complete.length+'</div></div></div>'
    +'<div class="filter-bar"><button class="filter-chip '+(statusFilter==='open'?'active':'')+'" onclick="setStatusFilter(\'open\')">Open</button><button class="filter-chip '+(statusFilter==='in-progress'?'active':'')+'" onclick="setStatusFilter(\'in-progress\')">In progress</button><button class="filter-chip '+(statusFilter==='complete'?'active':'')+'" onclick="setStatusFilter(\'complete\')">Complete</button></div>'
    +(shown.length?shown.map(function(r){
      var done=r.status==='complete';
      var summary=(r.requestedBy||'Legal team')+' requests a '+(r.requestType||'evidence completion')+' for '+(r.requestDate||r.flight||'');
      return '<div class="req-card"><div class="req-top"><div><div class="req-id">'+escapeHtml(r.id)+' · '+escapeHtml(r.ref)+'</div><div class="req-title">'+escapeHtml(r.claimant||r.ref)+' <span class="req-pill">Gold pack</span><span class="req-pill '+(r.priority==='Urgent'?'urgent':'')+'">'+escapeHtml(r.priority||'Normal')+'</span></div><div class="req-meta">'+escapeHtml(summary)+'<br>Requested by '+escapeHtml(r.requestedBy)+' · Due '+escapeHtml(r.due||'—')+'<br><strong>Missing:</strong> '+escapeHtml((r.missing||[]).join(', '))+'</div></div></div><div class="req-actions">'
        +(done?'<span class="btn-mini done"><i class="ti ti-check"></i> Complete</span>':'<button class="btn-mini primary" onclick="openRequest(\''+r.id+'\')"><i class="ti ti-folder-open"></i> Open request</button><button class="btn-mini" onclick="markRequestComplete(\''+r.id+'\')"><i class="ti ti-circle-check"></i> Mark as complete</button>')
        +'<a class="btn-mini" href="repository.html#evidence"><i class="ti ti-database"></i> Repository</a>'
        +'</div></div>';
    }).join(''):'<div class="req-card" style="text-align:center;color:var(--text3)">No requests in this filter.</div>');
  if(typeof renderGlobalNav==='function')renderGlobalNav();
}
function toggleUserMenu(){document.getElementById('user-modal').classList.toggle('open');}
function closeMenu(){document.getElementById('user-modal').classList.remove('open');}
function switchUser(id){
  setActiveUser(id);sessionStorage.removeItem('261c_lang');closeMenu();
  if(id!=='EH'){window.location.href='index.html';return;}
  var u=USERS[id];if(u){document.getElementById('nav-av').textContent=u.initials;document.getElementById('nav-user').textContent=u.name;}
  ['SB','JP','KR','MD','PL','CG','IM','EH'].forEach(function(uid){var el=document.getElementById('ud-'+uid);if(el)el.classList.toggle('current',uid===id);});
  render();
}
(function seedDemoNotif(){
  try{
    if(sessionStorage.getItem('261c_seeded_eh_notif'))return;
    var reqs=getEvidenceRequests();
    if(reqs.some(function(r){return r.id==='REQ-001'&&r.status!=='complete';})){
      pushNotification({to:'EH',type:'evidence-request',ref:'AC-2026-0089',requestId:'REQ-001',title:'New evidence request',body:'S. Booth requests a Daily Operations Review for 24MAR24 — Daniel Hartley',tab:'requests'});
      sessionStorage.setItem('261c_seeded_eh_notif','1');
    }
  }catch(e){}
})();
window.addEventListener('load',render);
</script>
<script src="shared_nav.js"></script>

<div id="user-modal" class="user-modal" onclick="if(event.target===this)closeMenu()">
  <div class="user-dropdown">
    <div class="ud-header">Switch user — demo</div>
    <div class="ud-item" id="ud-EH" onclick="switchUser('EH')"><div class="ud-av" style="background:#164E63">EH</div><div><div class="ud-name">Emma Hughes</div><div class="ud-role">Evidence Handling Specialist</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-SB" onclick="switchUser('SB')"><div class="ud-av">SB</div><div><div class="ud-name">Sarah Booth</div><div class="ud-role">Head of Legal Ops</div></div><i class="ti ti-check ud-tick"></i></div>
  </div>
</div>
</body>
</html>
