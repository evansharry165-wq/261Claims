<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1628;--blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;--green:#1A7A4A;--green-faint:#E6F5EE;--red:#C0392B;--amber:#B45309;--amber-faint:#FEF3C7;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;--surface:#fff;--surface2:#F8FAFC;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--r2:12px;--r3:16px}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff}
.gn-links{display:flex;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-right{margin-left:8px}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.gn-av{width:24px;height:24px;border-radius:50%;background:#1C2E44;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.gn-user{font-size:11px;color:rgba(255,255,255,0.85)}
.shell{display:flex;flex-direction:column;height:calc(100vh - 48px);min-height:0}
.insights-tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px}
.ins-tab{padding:11px 14px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font)}
.ins-tab.active{color:var(--blue-text);border-bottom-color:var(--blue)}
.tab-panel{flex:1;overflow:hidden;min-height:0}
.tab-frame{width:100%;height:100%;border:none;background:var(--surface2)}
.past-wrap{height:100%;overflow-y:auto;padding:16px 20px}
.grid-main{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border)}
.panel-title{font-size:13px;font-weight:500}
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tab{font-size:11px;border:1px solid var(--border);background:var(--surface2);padding:5px 10px;border-radius:20px;cursor:pointer;font-family:var(--font)}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.case-card{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.case-card:hover{background:var(--surface2)}
.ref{font-family:var(--mono);font-size:10px;color:var(--text3)}
.name{font-size:13px;font-weight:500;margin-top:2px}
.meta{font-size:11px;color:var(--text2);line-height:1.5;margin-top:3px}
.pill{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-block}
.p-defended{background:var(--green-faint);color:var(--green)}
.p-settled{background:var(--amber-faint);color:var(--amber)}
.p-paid{background:var(--blue-faint);color:var(--blue-text)}
.p-withdrawn{background:var(--surface2);color:var(--text2)}
.kv{display:grid;grid-template-columns:110px 1fr;gap:8px;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.kv-label{color:var(--text3)}
.detail-body{padding:14px 16px;font-size:12px;line-height:1.55}
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.ud-item:hover,.ud-item.current{background:var(--blue-faint)}
.ud-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.ud-name{font-size:12px;font-weight:500}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);display:none}
.ud-item.current .ud-tick{display:block}
</style>
</head>
<body>
<script src="shared_data.js"></script>
<script src="insights_data.js"></script>

<nav class="global-nav">
  <a href="index.html" class="gn-logo"><div class="gn-mark"><i class="ti ti-plane"></i></div><span class="gn-name">261Claims</span></a>
  <div class="gn-links" id="gn-links"></div>
  <div class="gn-right"><div class="gn-user-btn" onclick="toggleUserMenu()"><div class="gn-av" id="nav-av">SB</div><span class="gn-user" id="nav-user">S. Booth</span></div></div>
</nav>

<div class="shell">
  <div class="insights-tabs" id="insights-tabs"></div>
  <div class="tab-panel" id="tab-panel"></div>
</div>

<script>
var TABS=[{id:'reporting',label:'Reporting'},{id:'past-cases',label:'Past cases'},{id:'guidance',label:'Guidance'}];
var activeTab=(new URLSearchParams(window.location.search).get('tab')||'reporting');
var activeOutcome='all', selectedRef='', query='';

function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}

function switchTab(tab){
  activeTab=tab;
  history.replaceState({},'','insights.html?tab='+tab);
  renderTabs();renderPanel();
}

function renderTabs(){
  document.getElementById('insights-tabs').innerHTML=TABS.map(function(t){
    return '<button class="ins-tab'+(activeTab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+escapeHtml(t.label)+'</button>';
  }).join('');
}

function filteredPastCases(){
  var q=query.toLowerCase();
  return repoCases().filter(function(c){
    var ok=activeOutcome==='all'||c.outcome===activeOutcome;
    var hay=[c.ref,c.claimant,c.disruptionType,c.summary].join(' ').toLowerCase();
    return ok&&(!q||hay.indexOf(q)>=0);
  });
}

function renderPastCases(){
  var rows=filteredPastCases();
  if(!selectedRef&&rows.length)selectedRef=rows[0].ref;
  var selected=rows.find(function(c){return c.ref===selectedRef;})||rows[0];
  var tabs=['all','defended','settled','paid','withdrawn'].map(function(o){
    return '<button class="tab '+(activeOutcome===o?'active':'')+'" onclick="activeOutcome=\''+o+'\';renderPanel()">'+(o==='all'?'All':outcomeLabel(o))+'</button>';
  }).join('');
  document.getElementById('tab-panel').innerHTML='<div class="past-wrap"><div class="grid-main"><div class="panel"><div class="panel-hdr"><div class="panel-title">Past cases archive</div><div class="tabbar">'+tabs+'</div><input style="margin-top:10px;width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font)" placeholder="Search past cases…" value="'+escapeHtml(query)+'" oninput="query=this.value;renderPanel()"></div>'
    +rows.map(function(c){return '<div class="case-card" onclick="selectedRef=\''+c.ref+'\';renderPanel()"><div class="ref">'+escapeHtml(c.ref)+'</div><div class="name">'+escapeHtml(c.claimant)+' · '+escapeHtml(c.flightNum)+'</div><div class="meta">'+escapeHtml(c.disruptionType)+' · <span class="pill '+outcomeClass(c.outcome)+'">'+outcomeLabel(c.outcome)+'</span> · '+c.confidence+'% confidence</div></div>';}).join('')
    +'</div><div class="panel">'+(selected?'<div class="panel-hdr"><div class="panel-title">Case insight</div></div><div class="detail-body"><div class="kv"><div class="kv-label">Outcome</div><div><span class="pill '+outcomeClass(selected.outcome)+'">'+outcomeLabel(selected.outcome)+'</span></div></div><div class="kv"><div class="kv-label">Saving</div><div>'+escapeHtml(selected.saving)+'</div></div><div class="kv"><div class="kv-label">Time to close</div><div>'+selected.days+' days</div></div><div style="margin-top:10px">'+escapeHtml(selected.summary)+'</div><div style="margin-top:10px;color:var(--blue-text)"><strong>Recommendation:</strong> '+escapeHtml(selected.recommendation)+'</div></div>':'<div class="detail-body">Select a case.</div>')+'</div></div><p style="margin-top:12px;font-size:12px;color:var(--text3)">Active cases are on <a href="cases.html" style="color:var(--blue-text)">Cases</a>.</p></div>';
}

function renderPanel(){
  if(activeTab==='reporting'){
    document.getElementById('tab-panel').innerHTML='<iframe class="tab-frame" src="module6-mi.html?embed=1" title="Reporting"></iframe>';
  }else if(activeTab==='guidance'){
    document.getElementById('tab-panel').innerHTML='<iframe class="tab-frame" src="education.html?embed=1" title="Guidance"></iframe>';
  }else{
    renderPastCases();
  }
  if(typeof renderGlobalNav==='function')renderGlobalNav();
}

function toggleUserMenu(){document.getElementById('user-modal').classList.toggle('open');}
function closeMenu(){document.getElementById('user-modal').classList.remove('open');}
function switchUser(id){
  setActiveUser(id);sessionStorage.removeItem('261c_lang');closeMenu();
  var u=USERS[id];if(u){document.getElementById('nav-av').textContent=u.initials;document.getElementById('nav-user').textContent=u.name;}
  ['SB','JP','KR','MD','PL','CG','IM','EH'].forEach(function(uid){var el=document.getElementById('ud-'+uid);if(el)el.classList.toggle('current',uid===id);});
  renderPanel();
}
window.addEventListener('load',function(){renderTabs();renderPanel();});
</script>
<script src="shared_nav.js"></script>

<div id="user-modal" class="user-modal" onclick="if(event.target===this)closeMenu()">
  <div class="user-dropdown">
    <div class="ud-header">Switch user — demo</div>
    <div class="ud-item" id="ud-SB" onclick="switchUser('SB')"><div class="ud-av">SB</div><div><div class="ud-name">Sarah Booth</div><div class="ud-role">Head of Legal Ops</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-JP" onclick="switchUser('JP')"><div class="ud-av">JP</div><div><div class="ud-name">James Patel</div><div class="ud-role">Senior Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-KR" onclick="switchUser('KR')"><div class="ud-av">KR</div><div><div class="ud-name">Kiran Rahman</div><div class="ud-role">Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
  </div>
</div>
</body>
</html>
