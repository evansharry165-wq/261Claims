<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1628;--blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;--green:#1A7A4A;--green-faint:#E6F5EE;--red:#C0392B;--red-faint:#FCF0EF;--amber:#B45309;--amber-faint:#FEF3C7;--purple:#4338CA;--purple-faint:#EEEDFE;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;--surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;--font:'Inter',sans-serif;--font-serif:'Instrument Serif',Georgia,serif;--mono:'DM Mono',monospace;--r:8px;--r2:12px;--r3:16px}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff}
.gn-links{display:flex;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-right{margin-left:8px}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.gn-av{width:24px;height:24px;border-radius:50%;background:#1C2E44;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.gn-user{font-size:11px;color:rgba(255,255,255,0.85)}
.shell{display:flex;flex-direction:column;height:calc(100vh - 48px);min-height:0}
.page-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 0;flex-shrink:0}
.page-hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:12px}
.page-title{font-family:var(--font-serif);font-size:22px;font-weight:400;letter-spacing:-0.02em}
.page-sub{font-size:12px;color:var(--text2);line-height:1.55;margin-top:4px;max-width:680px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;align-items:center}
.page-link,.sync-badge{font-size:11px;text-decoration:none;color:var(--blue-text);border:1px solid var(--border);background:var(--surface2);padding:6px 10px;border-radius:var(--r);display:inline-flex;align-items:center;gap:5px}
.sync-badge{color:var(--text2);font-size:10px}
.insights-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 4px;overflow-x:auto}
.ins-tab{padding:11px 14px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.ins-tab.active{color:var(--blue-text);border-bottom-color:var(--blue)}
.tab-panel{flex:1;overflow:hidden;min-height:0}
.tab-frame{width:100%;height:100%;border:none;background:var(--surface2);display:block}
.past-wrap{height:100%;overflow-y:auto;padding:16px 20px 24px}
.facet-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2)}
.facet-bar input,.facet-bar select{font-size:11px;border:1px solid var(--border);border-radius:var(--r);padding:7px 9px;font-family:var(--font);color:var(--text);background:var(--surface2)}
.facet-search{flex:1;min-width:180px}
.facet-clear{font-size:11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r);padding:7px 10px;cursor:pointer;color:var(--text2);font-family:var(--font)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:500;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:500;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.grid-main{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
.intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.panel-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.panel-body{padding:14px 16px}
.panel-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.45}
.case-list{max-height:420px;overflow-y:auto}
.case-card{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:12px}
.case-card:hover,.case-card.selected{background:var(--surface2)}
.ref{font-family:var(--mono);font-size:10px;color:var(--text3)}
.name{font-size:13px;font-weight:500;margin-top:2px}
.meta{font-size:11px;color:var(--text2);line-height:1.5;margin-top:3px}
.pill{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.p-defended{background:var(--green-faint);color:var(--green)}
.p-settled{background:var(--amber-faint);color:var(--amber)}
.p-paid{background:var(--blue-faint);color:var(--blue-text)}
.p-withdrawn{background:var(--surface3);color:var(--text2)}
.detail{position:sticky;top:12px}
.detail-body{padding:14px 16px;font-size:12px;line-height:1.55}
.detail-empty,.empty-note{font-size:12px;color:var(--text3);line-height:1.6;padding:28px 16px;text-align:center}
.kv{display:grid;grid-template-columns:110px 1fr;gap:8px;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.kv-label{color:var(--text3)}
.kv-val{font-weight:500}
.ev-list,.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.ev,.tag-chip{font-size:10px;padding:3px 7px;border-radius:20px;background:var(--purple-faint);color:var(--purple);text-decoration:none}
.case-law{font-size:11px;color:var(--text2);line-height:1.55;margin-top:10px;padding:8px 10px;border-left:3px solid var(--blue);background:var(--blue-faint);border-radius:0 var(--r) var(--r) 0}
.learn-box{margin-top:10px;padding:10px 12px;border:1px solid #BFDBFE;background:linear-gradient(135deg,var(--blue-faint),#fff);border-radius:var(--r2);font-size:11px;color:var(--text2);line-height:1.55}
.learn-box a{color:var(--blue-text);font-weight:500;text-decoration:none}
.updates-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px}
.updates-title{font-size:12px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.update-chip{display:block;padding:8px 0;border-top:1px solid var(--border);text-decoration:none;color:var(--text);font-size:11px;line-height:1.5}
.update-chip:first-of-type{border-top:none;padding-top:0}
.update-chip span{display:block;color:var(--text3);margin-top:2px}
.sugg-item{font-size:12px;line-height:1.55;padding:9px 0;border-bottom:1px solid var(--border)}
.sugg-item.urgent{color:var(--red);font-weight:500}
.sugg-item.high{color:var(--green)}
.sugg-item a{color:var(--blue-text);margin-left:4px}
.intel-cards{display:grid;gap:10px}
.intel-card{border:1px solid var(--border);border-radius:var(--r2);padding:11px 12px;background:var(--surface2)}
.intel-title{font-size:12px;font-weight:500;margin-bottom:4px}
.intel-meta{font-size:10px;color:var(--text3);margin-bottom:6px}
.intel-stat{font-size:11px;color:var(--green);margin-bottom:6px}
.intel-note,.intel-list{font-size:11px;color:var(--text2);line-height:1.55}
.intel-list{padding-left:16px;margin:0}
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.ud-item:hover,.ud-item.current{background:var(--blue-faint)}
.ud-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.ud-name{font-size:12px;font-weight:500}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);display:none}
.ud-item.current .ud-tick{display:block}
@media (max-width:960px){.stats-row{grid-template-columns:repeat(2,1fr)}.grid-main,.intel-grid{grid-template-columns:1fr}.detail{position:static}}
</style>
</head>
<body>
<script src="shared_data.js"></script>
<script src="shared_theme.js"></script>
<script src="legal_updates.js"></script>
<script src="court_profiles.js"></script>
<script src="insights_search.js"></script>
<script src="insight_tags.js"></script>
<script src="insights_data.js"></script>
<script src="insight_engine.js"></script>

<nav class="global-nav">
  <a href="index.html" class="gn-logo"><div class="gn-mark"><i class="ti ti-plane"></i></div><span class="gn-name">261Claims</span></a>
  <div class="gn-links" id="gn-links"></div>
  <div class="gn-right"><div class="gn-user-btn" onclick="toggleUserMenu()"><div class="gn-av" id="nav-av">SB</div><span class="gn-user" id="nav-user">S. Booth</span></div></div>
</nav>

<div class="shell">
  <div class="page-hdr">
    <div class="page-hdr-top">
      <div>
        <div class="page-title" id="page-title">Insights</div>
        <div class="page-sub" id="page-sub">Management reporting, closed-case learning, and legal intelligence.</div>
      </div>
      <div class="page-actions" id="page-actions"></div>
    </div>
    <div class="insights-tabs" id="insights-tabs"></div>
  </div>
  <div class="tab-panel" id="tab-panel"></div>
</div>

<script src="insights_ui.js"></script>
<script src="shared_nav.js"></script>

<div id="user-modal" class="user-modal" onclick="if(event.target===this)document.getElementById('user-modal').classList.remove('open')">
  <div class="user-dropdown">
    <div class="ud-header">Switch user — demo</div>
    <div class="ud-item" id="ud-SB" onclick="switchUser('SB')"><div class="ud-av">SB</div><div><div class="ud-name">Sarah Booth</div><div class="ud-role">Head of Legal Ops</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-JP" onclick="switchUser('JP')"><div class="ud-av">JP</div><div><div class="ud-name">James Patel</div><div class="ud-role">Senior Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
    <div class="ud-item" id="ud-KR" onclick="switchUser('KR')"><div class="ud-av">KR</div><div><div class="ud-name">Kiran Rahman</div><div class="ud-role">Solicitor</div></div><i class="ti ti-check ud-tick"></i></div>
  </div>
</div>
</body>
</html>
