<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:calc(100vh - 48px)}

/* topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--green-faint);color:var(--green);border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}

/* layout */
.body{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden}
.sidebar-left{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:16px}
.main{overflow-y:auto;padding:20px 24px}

/* case header */
.case-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:13px 16px;margin-bottom:16px}
.ch-ref{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:2px}
.ch-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
.ch-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--text2)}
.ch-meta span{display:flex;align-items:center;gap:3px}
.ch-meta i{font-size:11px;color:var(--text3)}

/* document library */
.lib-section{margin-bottom:16px}
.lib-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:8px}
.doc-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:5px;cursor:pointer;text-align:left;font-family:var(--font);background:var(--surface);transition:all 0.15s}
.doc-btn:hover{border-color:var(--border2);background:var(--surface2)}
.doc-btn.active{border-color:var(--blue);background:var(--blue-faint)}
.doc-btn-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.doc-btn-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.doc-btn-sub{font-size:10px;color:var(--text3)}
.doc-status{margin-left:auto;font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;white-space:nowrap}
.ds-draft{background:var(--amber-faint);color:var(--amber)}
.ds-approved{background:var(--green-faint);color:var(--green)}
.ds-ready{background:var(--blue-faint);color:var(--blue-text)}
.ds-empty{background:var(--surface3);color:var(--text3)}

/* document workspace */
.doc-workspace{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-bottom:14px}
.dw-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.dw-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px}
.dw-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-action{font-size:11px;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font);display:inline-flex;align-items:center;gap:4px;transition:background 0.15s}
.btn-action:hover{background:var(--surface3)}
.btn-action.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-action.primary:hover{background:var(--navy2)}
.btn-action.success{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}

/* AI generate bar */
.ai-bar{padding:10px 14px;background:var(--blue-faint);border-bottom:1px solid #BFDBFE;display:flex;align-items:center;gap:10px}
.ai-bar-text{font-size:12px;color:var(--blue-text);flex:1}
.ai-spinner{width:14px;height:14px;border:2px solid #BFDBFE;border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-generate{font-size:11px;padding:5px 12px;border-radius:var(--r);background:var(--blue-text);color:#fff;border:none;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:4px}

/* evidence used strip */
.ev-strip{padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ev-strip-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-right:2px}
.ev-pill{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--purple-faint);color:var(--purple);border:1px solid #C7D2FE;display:flex;align-items:center;gap:3px}
.ev-pill i{font-size:10px}

/* letter body */
.letter-body{padding:28px 36px;font-size:12.5px;line-height:1.85;color:var(--text);background:var(--surface);min-height:400px;font-family:Georgia,serif;white-space:pre-wrap;outline:none;border:none}
.letter-body[contenteditable=true]{border:1px solid var(--blue);border-radius:0}
.letter-body .gap{background:#FEF3C7;border:1px dashed var(--amber);border-radius:3px;padding:0 4px;color:var(--amber);font-family:var(--font);font-size:11px;cursor:pointer}

/* status bar */
.status-bar{padding:9px 14px;border-top:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.status-text{font-size:11px;color:var(--text3)}
.status-text.approved{color:var(--green);font-weight:500}
.send-note{font-size:10px;color:var(--amber);display:flex;align-items:center;gap:4px}

/* empty state */
.empty-workspace{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3)}
.empty-workspace i{font-size:36px;color:var(--text3);margin-bottom:12px;opacity:0.4;display:block}
.empty-workspace p{font-size:13px;color:var(--text3);max-width:260px;line-height:1.6}

/* points of claim reference */
.points-ref{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.pr-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.pr-item{display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px}
.pr-item:last-child{border-bottom:none}
.pr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pr-dot-g{background:var(--green-l)}.pr-dot-a{background:#F59E0B}.pr-dot-r{background:var(--red)}
.pr-num{font-weight:500;color:var(--text);margin-bottom:1px}
.pr-claim{color:var(--text2)}
.pr-ev{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
</style>

<script>
/* ── Case data ── */
var _i={};
try{var _r=sessionStorage.getItem('aeroCaseData');if(_r)_i=JSON.parse(_r);}catch(e){}
var C={
  ref:    _i.ref       ||'AC-2026-0089',
  name:   _i.claimant  ||'Daniel Hartley',
  sol:    _i.solicitor ||'Pemberton & Associates Solicitors LLP',
  solRef: 'PA/2026/03871/KW',
  solAddr:'Clarke & Partners Solicitors, 22 Bridge Street, Manchester, M3 3BT',
  flight: _i.flight    ||'HC 1184 — LTN to BCN (diverted VLC)',
  flightNum:'HC 1184',
  dep:'London Luton Airport (LTN)',
  arr:'Barcelona El Prat Airport (BCN)',
  diverted:'Valencia Airport (VLC)',
  value:  _i.value     ||'£39,000+',
  type:   _i.type      ||'EC 261/2004 — delay / diversion',
  date:   _i.date      ||'22 May 2026',
  flightDate:'14 March 2026',
  std:'07:25', atd:'07:31', sta:'10:50', ata:'18:45',
  delay:'7 hours 55 minutes',
  framework: _i.framework||'EC Regulation 261/2004',
  points: _i.points    ||[],
  assignedTo:_i.assignedTo||'S. Booth',
  user:'S. Booth'
};

/* ── Document state ── */
var docStates={
  loa:{status:'approved', edits:'', generated:true},
  lor:{status:'draft',    edits:'', generated:false},
  defence:{status:'empty',edits:'',generated:false},
  witness:{status:'empty',edits:'',generated:false},
  n181:{status:'empty',  edits:'',generated:false},
  p36:{status:'empty',   edits:'',generated:false},
  settlement:{status:'empty',edits:'',generated:false},
};
var currentDoc=null;
var isEditing=false;
var isGenerating=false;

/* ── Evidence used per document ── */
var EV_USED={
  lor:['TOPS — Flight Details','Eurocontrol ATFM Data','Ogimet METAR BCN','NOTAM BCN 14 Mar','Flightradar24 Track'],
  defence:['TOPS — Flight Details','Eurocontrol ATFM Data','Ogimet METAR BCN','NOTAM BCN 14 Mar','SafetyNet Reports','DPM Notes'],
  witness:['AIMS — Crew Route & FDP','HERMES ACARS Messages','Cabin Crew Incident Report'],
  p36:['TOPS — Flight Details'],
  settlement:['TOPS — Flight Details'],
};

/* ── Today ── */
function today(){
  const d=new Date();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function responseBy(){
  const d=new Date();d.setMonth(d.getMonth()+3);
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}

/* ── Document templates ── */
function buildDoc(id){
  switch(id){
    case 'loa': return buildLOA();
    case 'lor': return buildLOR();
    case 'defence': return buildDefence();
    case 'witness': return buildWitness();
    case 'n181': return buildN181();
    case 'p36': return buildP36();
    case 'settlement': return buildSettlement();
    default: return '';
  }
}

function buildLOA(){
return `PRIVATE AND CONFIDENTIAL
BY EMAIL AND FIRST CLASS POST

${today()}

${C.sol}
${C.solAddr}

Dear Sirs,

RE: ${C.name.toUpperCase()} v. TESTAIRWAYS
YOUR REF: ${C.solRef}    OUR REF: ${C.ref}
FLIGHT: ${C.flightNum} — ${C.dep} TO ${C.arr}
DATE OF TRAVEL: ${C.flightDate}

ACKNOWLEDGEMENT OF LETTER OF CLAIM

We act on behalf of TestAirways in connection with the above matter.

We write to acknowledge receipt of your letter of claim dated ${C.date}, received by our Legal Department on ${C.date}. The matter has been assigned to our legal team and we are in the process of investigating the circumstances surrounding the above-referenced flight.

In accordance with the Pre-Action Protocol, we will provide a substantive Letter of Response no later than ${responseBy()}. We will notify you promptly should we require any extension to that period.

Without prejudice to our investigation, we note that the disruption to flight ${C.flightNum} on ${C.flightDate} arose from circumstances which we believe were beyond the reasonable control of TestAirways. Our full position will be set out in our Letter of Response.

Nothing in this letter constitutes an admission of liability. TestAirways reserves all rights and defences available to it.

Yours faithfully,

${C.assignedTo}
Legal Department, TestAirways`;
}

function buildLOR(){
return `PRIVATE AND CONFIDENTIAL
WITHOUT PREJUDICE SAVE AS TO COSTS

${today()}

${C.sol}
${C.solAddr}

Dear Sirs,

RE: ${C.name.toUpperCase()} v. TESTAIRWAYS — LETTER OF RESPONSE
YOUR REF: ${C.solRef}    OUR REF: ${C.ref}
FLIGHT: ${C.flightNum} — ${C.dep} TO ${C.arr}
DATE OF TRAVEL: ${C.flightDate}

We act on behalf of TestAirways. We refer to your letter of claim dated ${C.date} and to our Letter of Acknowledgement. We now provide our substantive response.

BACKGROUND

1. Flight ${C.flightNum} was scheduled to depart ${C.dep} at ${C.std} on ${C.flightDate}, with a scheduled arrival at ${C.arr} at ${C.sta}. The aircraft departed at ${C.atd}.

2. At approximately 09:55 (UTC), when the aircraft was approximately 40 nautical miles north-east of Barcelona, the crew received notification of significant deterioration in meteorological conditions at ${C.arr}. Acting on mandatory instructions from Air Traffic Control and in the interests of passenger safety, the aircraft diverted to ${C.diverted}.

3. The aircraft arrived at ${C.diverted} at 10:48 local time. Passengers were transported by coach to Barcelona, arriving at approximately 18:45 local time. The total delay against the scheduled arrival was ${C.delay}.

RESPONSE TO POINTS OF CLAIM

Point 1 — Statutory Compensation: EC Regulation 261/2004, Article 7(1)(a)

4. TestAirways acknowledges that flight ${C.flightNum} arrived at its final destination ${C.delay} after the scheduled arrival time and that, in isolation, this delay would engage the provisions of Article 7(1)(a) of EC Regulation 261/2004. However, TestAirways denies that any compensation is payable by reason of the extraordinary circumstances defence set out below.

5. The distance from ${C.dep} to ${C.arr} is approximately 1,435 kilometres. For the avoidance of doubt, TestAirways notes that the applicable compensation under Article 7(1)(a), if payable, would be €250 and not €400 as asserted in your letter of claim. The €400 figure applies to flights of between 1,500 and 3,500 kilometres under Article 7(1)(b), which is not engaged on the facts of this claim.

Point 2 — Extraordinary Circumstances: Article 5(3)

6. TestAirways relies upon the defence of extraordinary circumstances pursuant to Article 5(3) of EC Regulation 261/2004. The diversion of flight ${C.flightNum} was caused by severe meteorological conditions at ${C.arr} on ${C.flightDate} which rendered continued operation to ${C.arr} incompatible with safe flight operations.

7. The meteorological evidence obtained by TestAirways confirms that at the relevant time, ${C.arr} was subject to active convective activity with embedded cumulonimbus cloud, significant wind shear, and visibility below instrument landing system minima. The relevant METAR and SIGMET records, together with NOTAM documentation for ${C.arr}, are enclosed with this letter as Exhibit TA/1.

8. TestAirways further relies upon the Eurocontrol Air Traffic Flow Management (ATFM) regulation data confirming that the airspace in the vicinity of ${C.arr} was subject to network-level restrictions at the material time. This data is enclosed as Exhibit TA/2.

9. The crew of flight ${C.flightNum} acted in accordance with mandatory Air Traffic Control instructions in diverting to ${C.diverted}. The diversion was not a discretionary operational decision but a safety imperative imposed by external circumstances entirely beyond TestAirways' control. TestAirways relies upon the two-limb test established in Wallentin-Hermann v Alitalia (Case C-549/07): the circumstances were (a) not inherent in the normal exercise of the carrier's activity, and (b) beyond its actual control.

10. TestAirways further avers that all reasonable measures were taken to avoid the resulting delay. Pre-departure weather monitoring was conducted, fuel loads were calculated to permit diversion to an alternate aerodrome, and the crew were briefed on potential meteorological conditions on the route. Once the decision to divert was made, the crew operated expeditiously to minimise further delay to passengers.

Point 3 — Duty of Care: Article 9

11. TestAirways denies that it failed to fulfil its obligations under Article 9 of EC Regulation 261/2004. Ground handling arrangements at ${C.diverted} were activated promptly following the diversion decision. TestAirways will adduce evidence from ground handling records at Valencia Airport confirming the provision of refreshments and written information to passengers during the ground delay.

12. In the event that the Court finds any shortfall in the provision of Article 9 care — which is denied — TestAirways avers that any such shortfall arose from the extraordinary and unanticipated nature of the diversion and not from any failure of duty on the part of TestAirways or its handling agents.

Point 4 — Consequential Losses: £38,250

13. TestAirways denies liability for the consequential losses alleged in Point 4 of your letter of claim. Pursuant to Article 12 of EC Regulation 261/2004, any further compensation available to a passenger under national law is that available under the Montreal Convention. The Montreal Convention does not provide for recovery of the alleged loss of a commercial contract.

14. Further and in any event, TestAirways puts your client to strict proof of (a) the existence of the alleged contractual arrangement with Meridian Consulting SL; (b) that any contract was lost solely by reason of your client's non-attendance at the meeting on ${C.flightDate}; (c) that your client took all reasonable steps to mitigate his alleged loss, including by seeking to reschedule the meeting; and (d) that the quantum of £38,250 accurately reflects the net loss alleged.

15. TestAirways will seek independent verification of the letter from Meridian Consulting SL relied upon by your client and reserves the right to challenge the authenticity and contents of that document.

Point 5 — Travel and Subsistence Costs: £141.80

16. TestAirways does not dispute that your client incurred additional travel costs as a result of the diversion, subject to verification of the receipts stated to be enclosed with your letter of claim. TestAirways will consider these costs upon receipt of the supporting documentation and will address them in any schedule of agreed or disputed sums.

CONCLUSION

17. For the reasons set out above, TestAirways denies liability to pay statutory compensation under EC Regulation 261/2004 by reason of the extraordinary circumstances defence. TestAirways further denies liability for the consequential losses alleged. TestAirways is prepared to give consideration to the reasonable Article 9 care costs and verified travel and subsistence costs upon production of supporting documentation.

18. TestAirways remains open to resolving this matter by way of Alternative Dispute Resolution. Any proposal for settlement should be directed to the undersigned.

Yours faithfully,

${C.assignedTo}
Legal Department, TestAirways

ENCLOSURES:
Exhibit TA/1: METAR, SIGMET and NOTAM records for BCN, ${C.flightDate}
Exhibit TA/2: Eurocontrol ATFM regulation data, ${C.flightDate}
Exhibit TA/3: Flight operations data — flight ${C.flightNum}, ${C.flightDate}`;
}

function buildDefence(){
return `IN THE COUNTY COURT AT [COURT NAME]

CLAIM NO: [TO BE INSERTED]

BETWEEN:

                                                                        Defendant

─────────────────────────────────────────

─────────────────────────────────────────

INTRODUCTION

1. The Defendant is TestAirways, a commercial airline operating scheduled passenger services. The Defendant denies that it is liable to pay compensation to the Claimant pursuant to EC Regulation 261/2004 (as retained in UK law following the end of the Brexit transition period) or at all, for the reasons set out below.

ADMISSIONS AND DENIALS

2. Paragraphs 1 and 2 of the Particulars of Claim are admitted. The Claimant was a ticketed passenger on flight ${C.flightNum} departing ${C.dep} on ${C.flightDate}, scheduled to arrive at ${C.arr} at ${C.sta}.

3. Paragraph 3 of the Particulars of Claim is admitted in part. It is admitted that flight ${C.flightNum} departed at approximately ${C.atd}. The Defendant does not admit the precise circumstances of the delay or diversion as alleged and puts the Claimant to proof thereof.

4. Paragraphs 4 and 5 of the Particulars of Claim are admitted in part. It is admitted that the aircraft diverted to ${C.diverted}. The Defendant avers that the diversion was necessitated by severe meteorological conditions at ${C.arr} constituting extraordinary circumstances within the meaning of Article 5(3) of EC Regulation 261/2004.

5. Paragraph 6 of the Particulars of Claim is denied. The Defendant will adduce evidence that reasonable care was provided to passengers at ${C.diverted} in accordance with Article 9 of EC Regulation 261/2004.

6. Paragraph 7 of the Particulars of Claim is admitted in part only. It is admitted that passengers arrived in Barcelona at approximately 18:45 local time. The Defendant denies that the total delay was 7 hours 55 minutes and puts the Claimant to proof of the precise arrival time at the final destination.

EXTRAORDINARY CIRCUMSTANCES DEFENCE

7. The Defendant relies upon the extraordinary circumstances defence pursuant to Article 5(3) of EC Regulation 261/2004. The diversion of flight ${C.flightNum} was caused by meteorological conditions at ${C.arr} on ${C.flightDate} which were incompatible with the safe operation of the flight.

8. The meteorological conditions prevailing at ${C.arr} at the material time included active convective weather, embedded cumulonimbus cloud, and visibility below operational minima. The Defendant relies upon the following evidence in support of this defence:

   (a) METAR and TAF records for ${C.arr} on ${C.flightDate}, confirming the meteorological conditions prevailing at the time of the diversion decision (Exhibit TA/1);

   (b) SIGMET documentation confirming the active airspace weather warning in force at the material time (Exhibit TA/1);

   (c) NOTAM records for ${C.arr} on ${C.flightDate} (Exhibit TA/1);

   (d) Eurocontrol Air Traffic Flow Management regulation data confirming network-level airspace restrictions (Exhibit TA/2);

   (e) Flight operations data confirming the crew's compliance with Air Traffic Control instructions (Exhibit TA/3).

9. The circumstances set out above were:

   (a) not inherent in the normal exercise of the Defendant's activity as an air carrier; and

   (b) beyond the Defendant's actual control,

   applying the test established by the Court of Justice of the European Union in Wallentin-Hermann v Alitalia (Case C-549/07) [2008] ECR I-11061.

10. The Defendant avers that it took all reasonable measures to avoid the delay resulting from the diversion, including pre-departure meteorological monitoring, calculation of fuel loads sufficient to permit diversion, crew briefing on route meteorology, and expeditious ground handling arrangements at ${C.diverted}.

RESPONSE TO CONSEQUENTIAL LOSS CLAIM

11. The Defendant denies liability for the sum of £38,250 alleged to represent the value of a lost commercial contract. The Defendant avers that:

   (a) The Montreal Convention does not provide for recovery of commercial contract losses of the nature alleged;

   (b) The Claimant has not discharged the burden of proving causation between the delay and the alleged loss of contract;

   (c) The Claimant has not demonstrated that he took reasonable steps to mitigate his alleged loss; and

   (d) The quantum alleged is not proved.

QUANTUM

12. In the event (which is denied) that the Defendant is found liable to pay statutory compensation, the applicable figure is €250 pursuant to Article 7(1)(a) of EC Regulation 261/2004, the flight distance of approximately 1,435 kilometres falling within the sub-1,500 kilometre category. The Claimant's assertion that €400 is payable is incorrect.

STATEMENT OF TRUTH

I believe that the facts stated in this Defence are true. I understand that proceedings for contempt of court may be brought against anyone who makes, or causes to be made, a false statement in a document verified by a statement of truth without an honest belief in its truth.

Name:   ${C.assignedTo}
Position: Legal Department, TestAirways
Date:   ${today()}

Defendant's solicitors: TestAirways Legal Department

}

var currentDocId = null;
var docEditMode = {};
var docApproved = {};

function openDoc(id){
  currentDocId = id;
  document.querySelectorAll('.doc-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderWorkspace();
}

function renderWorkspace(){
  const m = document.getElementById('main');
  if(!currentDocId){
    m.innerHTML = `<div class="empty-workspace"><i class="ti ti-file-pencil"></i><p>Select a document from the library to open, generate, or review.</p></div>`;
    return;
  }

  const id = currentDocId;
  const state = docStates[id];
  const isApproved = !!docApproved[id];
  const isEdit = !!docEditMode[id];
  const hasContent = state.generated || state.status==='approved';

  const docNames = {
    loa:'Letter of Acknowledgement',lor:'Letter of Response',
    defence:'Defence (CPR Part 16)',witness:'Witness Statement (CPR Part 32)',
    n181:'Directions Questionnaire (N181)',p36:'Part 36 Offer Letter',
    settlement:'Settlement Agreement'
  };
  const docIcons = {
    loa:'ti-mail',lor:'ti-file-text',defence:'ti-shield',
    witness:'ti-user',n181:'ti-forms',p36:'ti-scale',settlement:'ti-file-check'
  };

  // evidence pills
  const evList = EV_USED[id]||[];
  const evStrip = evList.length
    ? `<div class="ev-strip"><span class="ev-strip-label">Evidence used</span>`
      +evList.map(e=>`<span class="ev-pill"><i class="ti ti-database"></i>${e}</span>`).join('')
      +`</div>` : '';

  // actions
  let actions = '';
  if(!hasContent){
    actions = `<button class="btn-action primary" onclick="generateDoc('${id}')"><i class="ti ti-sparkles" style="font-size:11px"></i> Generate draft</button>`;
  } else if(isApproved){
    actions = `<button class="btn-action success"><i class="ti ti-check" style="font-size:11px"></i> Approved</button>`
      +`<button class="btn-action" onclick="downloadDoc('${id}')"><i class="ti ti-download" style="font-size:11px"></i> Download</button>`;
  } else {
    actions = (isEdit
      ?`<button class="btn-action" onclick="saveEdit('${id}')"><i class="ti ti-check" style="font-size:11px"></i> Save edits</button>`
      :`<button class="btn-action" onclick="editDoc('${id}')"><i class="ti ti-pencil" style="font-size:11px"></i> Edit</button>`)
      +`<button class="btn-action" onclick="downloadDoc('${id}')"><i class="ti ti-download" style="font-size:11px"></i> Download</button>`
      +`<button class="btn-action primary" onclick="approveDoc('${id}')"><i class="ti ti-check" style="font-size:11px"></i> Approve & sign off</button>`;
  }

  // letter content
  const letterText = state.edits || buildDoc(id);
  const safeText = letterText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const letterHtml = hasContent
    ? `<div class="letter-body" id="letter-${id}" ${isEdit?'contenteditable="true"':''}>${safeText}</div>`
    : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--text3);text-align:center"><i class="ti ti-sparkles" style="font-size:32px;margin-bottom:12px;opacity:0.4;display:block"></i><p style="font-size:13px;max-width:240px;line-height:1.6">Click Generate draft to create this document from the case data and evidence on file.</p></div>`;

  const statusTxt = isApproved ? 'Approved — ready for use'
    : hasContent ? (isEdit ? 'Editing…' : 'Draft — pending solicitor sign-off')
    : 'Not yet generated';
  const statusCls = isApproved ? 'status-text approved' : 'status-text';

  m.innerHTML = `
    <div class="case-hdr">
      <div class="ch-ref">${C.ref}</div>
      <div class="ch-name">${C.name} v. TestAirways</div>
      <div class="ch-meta">
        <span><i class="ti ti-plane"></i>${C.flight}</span>
        <span><i class="ti ti-currency-pound"></i>${C.value}</span>
        <span><i class="ti ti-user"></i>Assigned: ${C.assignedTo}</span>
      </div>
    </div>

    <div class="doc-workspace">
      <div class="dw-header">
        <div class="dw-title"><i class="ti ${docIcons[id]}" style="font-size:14px;color:var(--green)"></i>${docNames[id]}</div>
        <div class="dw-actions">${actions}</div>
      </div>
      ${evStrip}
      ${letterHtml}
      <div class="status-bar">
        <div class="${statusCls}">${statusTxt}</div>
        <div class="send-note"><i class="ti ti-info-circle" style="font-size:11px"></i>Internal email sending — coming soon</div>
      </div>
    </div>

    <div class="points-ref">
      <div class="pr-header"><i class="ti ti-list-check" style="font-size:13px;color:var(--text3)"></i>Points of claim — reference</div>
      ${renderPointsRef()}
    </div>`;
}

function renderPointsRef(){
  const defaultPoints = [
    {n:1,claim:'Delay in excess of 3 hours — Art 7(1)(a)',evidenceStatus:'green',evidenceDoc:'TOPS / Flight data'},
    {n:2,claim:'Extraordinary circumstances — burden on carrier',evidenceStatus:'amber',evidenceDoc:'METAR · SIGMET · Eurocontrol'},
    {n:3,claim:'Article 9 — duty of care obligations',evidenceStatus:'red',evidenceDoc:'Valencia ground records'},
    {n:4,claim:'Consequential loss — £38,250 contract',evidenceStatus:'red',evidenceDoc:'No counter-evidence yet'},
    {n:5,claim:'Travel & subsistence — £141.80',evidenceStatus:'amber',evidenceDoc:'Receipts pending'},
  ];
  const pts = C.points.length ? C.points : defaultPoints;
  return pts.map(p=>{
    const dc = p.evidenceStatus==='green'?'pr-dot-g':p.evidenceStatus==='amber'?'pr-dot-a':'pr-dot-r';
    return `<div class="pr-item"><div class="pr-dot ${dc}"></div><div><div class="pr-num">Point ${p.n}</div><div class="pr-claim">${p.claim}</div><div class="pr-ev">${p.evidenceDoc||''}</div></div></div>`;
  }).join('');
}

async function generateDoc(id){
  // Show generating state
  const actionsEl = document.querySelector('.dw-actions');
  if(actionsEl) actionsEl.innerHTML = `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--blue-text)"><div class="ai-spinner"></div>Generating from case data…</div>`;

  // Call Claude API for AI-enhanced generation
  const docNames = {lor:'Letter of Response',defence:'Defence (CPR Part 16)',witness:'Witness Statement',p36:'Part 36 Offer',settlement:'Settlement Agreement',n181:'Directions Questionnaire'};

  const baseDoc = buildDoc(id);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        system:`You are a senior aviation solicitor at an airline's in-house legal team. Draft professional, legally accurate documents in response to EC261 flight delay claims. Use precise legal language appropriate for England and Wales civil litigation. Address each point of claim specifically. Do not include markdown formatting or backticks. Return only the document text.`,
        messages:[{role:'user',content:`Draft a ${docNames[id]||id} for this case. Use the base template provided and enhance the legal arguments based on the case details.\n\nCase: ${C.name} v. TestAirways\nRef: ${C.ref}\nFlight: ${C.flightNum} ${C.dep} to ${C.arr}, ${C.flightDate}\nDisruption: Diverted to ${C.diverted} due to weather\nDelay: ${C.delay}\nClaim value: ${C.value}\nAssigned to: ${C.assignedTo}\n\nBase template:\n${baseDoc.slice(0,3000)}`}]
      })
    });
    const data = await resp.json();
    const aiText = data.content?.find(b=>b.type==='text')?.text||'';
    docStates[id].edits = aiText.trim()||baseDoc;
  } catch(e) {
    docStates[id].edits = baseDoc;
  }

  docStates[id].generated = true;
  docStates[id].status = 'draft';
  renderWorkspace();
  updateDocBtn(id,'draft');
}

function editDoc(id){
  docEditMode[id] = true;
  renderWorkspace();
  setTimeout(()=>{
    const el=document.getElementById('letter-'+id);
    if(el){el.focus();}
  },100);
}

function saveEdit(id){
  const el=document.getElementById('letter-'+id);
  if(el) docStates[id].edits = el.innerText||el.textContent||docStates[id].edits;
  docEditMode[id] = false;
  renderWorkspace();
}

function approveDoc(id){
  const el=document.getElementById('letter-'+id);
  if(el) docStates[id].edits = el.innerText||el.textContent||docStates[id].edits||buildDoc(id);
  docApproved[id] = true;
  docStates[id].status = 'approved';
  updateDocBtn(id,'approved');
  renderWorkspace();
}

function downloadDoc(id){
  const text = docStates[id].edits || buildDoc(id);
  const names={loa:'Letter-of-Acknowledgement',lor:'Letter-of-Response',defence:'Defence',witness:'Witness-Statement',n181:'Directions-Questionnaire-N181',p36:'Part-36-Offer',settlement:'Settlement-Agreement'};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download=C.ref+'-'+names[id]+'.txt';
  a.click();
}

function updateDocBtn(id, status){
  const statusMap={
    draft:{cls:'ds-draft',txt:'Draft'},
    approved:{cls:'ds-approved',txt:'Approved'},
    ready:{cls:'ds-ready',txt:'Ready'},
    empty:{cls:'ds-empty',txt:'Not started'}
  };
  const s = statusMap[status]||statusMap.empty;
  document.querySelectorAll('.doc-btn').forEach(btn=>{
    const nameEl=btn.querySelector('.doc-btn-name');
    if(!nameEl)return;
    const tagEl=btn.querySelector('.doc-status');
    if(!tagEl)return;
    // match by onclick
    const onclick=btn.getAttribute('onclick')||'';
    if(onclick.includes("'"+id+"'")){
      tagEl.className='doc-status '+s.cls;
      tagEl.textContent=s.txt;
    }
  });
}

/* ── Points of claim reference (sidebar) ── */
function renderPointsRefSidebar(){
  const defaultPoints = [
    {n:1,claim:'Delay — Art 7(1)(a)',evidenceStatus:'green'},
    {n:2,claim:'Extraordinary circumstances',evidenceStatus:'amber'},
    {n:3,claim:'Article 9 duty of care',evidenceStatus:'red'},
    {n:4,claim:'Consequential loss £38,250',evidenceStatus:'red'},
    {n:5,claim:'Travel costs £141.80',evidenceStatus:'amber'},
  ];
  const pts = C.points.length ? C.points : defaultPoints;
  document.getElementById('points-ref').innerHTML =
    '<div class="pr-header"><i class="ti ti-list-check" style="font-size:12px;color:var(--text3)"></i>Points of claim</div>'
    +pts.map(p=>{
      const dc=p.evidenceStatus==='green'?'pr-dot-g':p.evidenceStatus==='amber'?'pr-dot-a':'pr-dot-r';
      return `<div class="pr-item"><div class="pr-dot ${dc}"></div><div><div class="pr-num">Point ${p.n}</div><div class="pr-claim">${p.claim}</div></div></div>`;
    }).join('');
}

/* ── Init ── */
document.getElementById('main').innerHTML = `<div class="empty-workspace"><i class="ti ti-file-pencil"></i><p>Select a document from the library on the left to open, generate, or review it.</p></div>`;
renderPointsRefSidebar();
// Auto-open LOA as it's already approved
setTimeout(()=>{
  const loaBtn = document.querySelector('.doc-btn');
  if(loaBtn){loaBtn.classList.add('active');currentDocId='loa';renderWorkspace();}
},100);
</script>
