<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Module 6: MI Reporting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">  renderGlobalNav('mi');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:calc(100vh - 48px)}

/* topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--navy);color:#fff;border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}
.btn-export{font-size:11px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px}
.btn-export:hover{background:var(--surface3)}

/* filter bar */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.filter-label{font-size:11px;color:var(--text3);font-weight:500}
.filter-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);transition:all 0.15s}
.filter-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.filter-select{font-size:11px;padding:4px 9px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);cursor:pointer}

/* layout */
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* stat row */
.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.stat-label i{font-size:12px}
.stat-val{font-size:22px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.stat-sub{font-size:11px}
.sub-up{color:var(--green)}
.sub-warn{color:var(--amber)}
.sub-red{color:var(--red)}
.sub-neu{color:var(--text3)}

/* chart grid */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.chart-grid-full{margin-bottom:14px}

/* panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px}
.panel-title i{font-size:14px}
.panel-sub{font-size:11px;color:var(--text3);margin-top:1px}
.panel-body{padding:16px}
.chart-wrap{position:relative;height:220px}
.chart-wrap-sm{position:relative;height:180px}
.chart-wrap-lg{position:relative;height:260px}

/* table */
.mi-table{width:100%;border-collapse:collapse;font-size:12px}
.mi-table th{text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:0 10px 10px 0;border-bottom:1px solid var(--border)}
.mi-table td{padding:9px 10px 9px 0;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.mi-table tr:last-child td{border-bottom:none}
.mi-table tr:hover td{background:var(--surface2)}
.outcome-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.op-defended{background:var(--green-faint);color:var(--green)}
.op-settled{background:var(--amber-faint);color:var(--amber)}
.op-open{background:var(--blue-faint);color:var(--blue-text)}
.op-escalated{background:var(--red-faint);color:var(--red)}
.cat-pill{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;font-family:var(--mono)}
.cat-a{background:var(--blue-faint);color:var(--blue-text)}
.cat-b{background:var(--amber-faint);color:var(--amber)}
.cat-c{background:var(--red-faint);color:var(--red)}

/* workload bars */
.workload-item{margin-bottom:12px}
.wl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wl-name{font-size:12px;font-weight:500;color:var(--text)}
.wl-count{font-size:11px;color:var(--text3)}
.wl-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.wl-fill{height:100%;border-radius:3px;transition:width 0.4s}

/* metric tiles */
.metric-tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-tile{padding:11px 13px;background:var(--surface2);border-radius:var(--r2);border:1px solid var(--border)}
.mt-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
.mt-val{font-size:18px;font-weight:500;color:var(--text)}
.mt-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* risk register */
.risk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.risk-item:last-child{border-bottom:none}
.risk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.risk-high{background:var(--red)}
.risk-med{background:var(--amber)}
.risk-low{background:var(--green-l)}
.risk-case{font-size:11px;font-weight:500;color:var(--text);margin-bottom:1px}
.risk-reason{font-size:11px;color:var(--text2)}
.risk-val{font-size:11px;font-weight:500;font-family:var(--mono);margin-left:auto;color:var(--text);white-space:nowrap}

/* cpr status */
.cpr-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.cpr-item:last-child{border-bottom:none}
.cpr-ref{font-family:var(--mono);font-size:10px;color:var(--text3);width:110px;flex-shrink:0}
.cpr-name{flex:1;color:var(--text);font-weight:500}
.cpr-days{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.cpr-urgent{background:var(--red-faint);color:var(--red)}
.cpr-warn{background:var(--amber-faint);color:var(--amber)}
.cpr-ok{background:var(--green-faint);color:var(--green)}

/* ── Global nav ── */
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07)}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px;flex-shrink:0}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff;letter-spacing:-0.01em}
.gn-links{display:flex;align-items:center;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;transition:all 0.15s;white-space:nowrap}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-link i{font-size:13px}
.gn-right{display:flex;align-items:center;gap:8px;margin-left:8px}
.gn-av{width:26px;height:26px;border-radius:50%;background:#1C2E44;border:1.5px solid rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.gn-user{font-size:12px;color:rgba(255,255,255,0.5)}
</style>
<script src="shared_data.js"></script>
<script src="_nav.js"></script>
</head>
<body>
<div id="global-nav-wrap"></div>
<div class="app">
    <!-- Filter bar -->
  <div class="filter-bar">
    <span class="filter-label">Period:</span>
    <button class="filter-btn" onclick="setPeriod('mtd',this)">MTD</button>
    <button class="filter-btn on" onclick="setPeriod('ytd',this)">YTD</button>
    <button class="filter-btn" onclick="setPeriod('12m',this)">12 months</button>
    <button class="filter-btn" onclick="setPeriod('all',this)">All time</button>
    <div class="filter-divider"></div>
    <span class="filter-label">Type:</span>
    <select class="filter-select" onchange="setType(this.value)">
      <option value="all">All claim types</option>
      <option value="atc">ATC restriction</option>
      <option value="weather">Weather</option>
      <option value="industrial">Industrial action</option>
      <option value="technical">Technical</option>
      <option value="other">Other</option>
    </select>
    <div class="filter-divider"></div>
    <span class="filter-label">Solicitor:</span>
    <select class="filter-select" onchange="setSolicitor(this.value)">
      <option value="all">All</option>
      <option value="sb">S. Booth</option>
      <option value="jp">J. Patel</option>
      <option value="kr">K. Rahman</option>
      <option value="al">A. Lewis</option>
    </select>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
/* ── Data ── */
const DATA = {
  stats:{
    open:8, defended:18, settled:7, escalated:2, dismissed:3,
    totalClaims:38, exposureGross:'£284,500', exposureNet:'£3,750',
    avgClose:24, defenceRate:72, savingYTD:'£280,750'
  },
  volumeByMonth:{
    labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    received:[4,3,6,5,8,7,null,null,null,null,null,null],
    closed:[2,4,4,6,7,5,null,null,null,null,null,null]
  },
  byType:{
    labels:['ATC','Weather','Industrial action','Technical','Birdstrike','Other'],
    counts:[14,10,6,4,2,2],
    colors:['#2A6FDB','#5B4FCF','#B45309','#C0392B','#1A7A4A','#94A3B8']
  },
  outcomes:{
    labels:['Defended','Settled','Escalated','Dismissed','Open'],
    counts:[18,7,2,3,8],
    colors:['#22A863','#F59E0B','#C0392B','#94A3B8','#2A6FDB']
  },
  byCat:{
    labels:['Cat A — €250','Cat B — €400','Cat C — Complex'],
    counts:[22,10,6],
    colors:['#2A6FDB','#B45309','#C0392B']
  },
  timeToClose:{
    labels:['<7d','7–14d','14–21d','21–30d','>30d'],
    defended:[2,5,6,3,2],
    settled:[0,1,2,2,2]
  },
  exposure:{
    labels:['Jan','Feb','Mar','Apr','May'],
    alleged:[48000,52000,71000,63000,50500],
    actual:[250,500,750,1500,750]
  },
  workload:[
    {name:'S. Booth',     cases:11, open:4, color:'#2A6FDB'},
    {name:'J. Patel',     cases:10, open:2, color:'#5B4FCF'},
    {name:'K. Rahman',    cases:9,  open:1, color:'#1A7A4A'},
    {name:'A. Lewis',     cases:8,  open:1, color:'#B45309'},
  ],
  recentCases:[
    {ref:'AC-2026-0089',name:'Hartley v. TestAirways',type:'Weather/Diversion',cat:'C',value:'£39,000+',stage:'Evidence',days:3,solicitor:'S. Booth'},
    {ref:'AC-2026-0091',name:'Walsh v. TestAirways',type:'ATC Restriction',cat:'A',value:'€250',stage:'Triage',days:8,solicitor:'J. Patel'},
    {ref:'AC-2026-0094',name:'Morrison v. TestAirways',type:'Weather',cat:'A',value:'€250',stage:'Intake',days:15,solicitor:'K. Rahman'},
    {ref:'AC-2026-0087',name:'Chen v. TestAirways',type:'Cancellation',cat:'B',value:'€400',stage:'Defence',days:5,solicitor:'S. Booth'},
    {ref:'AC-2026-0083',name:'Okafor v. TestAirways',type:'Weather/Diversion',cat:'C',value:'£12,000',stage:'Evidence',days:12,solicitor:'J. Patel'},
    {ref:'AC-2025-0044',name:'Williams v. TestAirways',type:'ATC Restriction',cat:'A',value:'€250',stage:'Closed',days:null,solicitor:'S. Booth',outcome:'defended'},
    {ref:'AC-2025-0038',name:'Brown v. TestAirways',type:'Weather',cat:'B',value:'€400',stage:'Closed',days:null,solicitor:'J. Patel',outcome:'defended'},
    {ref:'AC-2025-0052',name:'Moore v. TestAirways',type:'Technical',cat:'A',value:'€250',stage:'Closed',days:null,solicitor:'K. Rahman',outcome:'settled'},
  ],
  riskRegister:[
    {case:'AC-2026-0089 — Hartley',reason:'Consequential loss claim unresolved · No FDR data on file',level:'high',val:'£39,000+'},
    {case:'AC-2026-0087 — Chen',reason:'CPR response deadline in 5 days · Defence not yet filed',level:'high',val:'€400'},
    {case:'AC-2026-0083 — Okafor',reason:'Valencia ground records not received · Art 9 exposure unresolved',level:'med',val:'£12,000'},
    {case:'AC-2026-0091 — Walsh',reason:'AI triage pending · Evidence checklist not started',level:'med',val:'€250'},
    {case:'AC-2026-0094 — Morrison',reason:'LOA not yet sent · 15 days remaining',level:'low',val:'€250'},
  ],
  cprDeadlines:[
    {ref:'AC-2026-0089',name:'Hartley',days:3},
    {ref:'AC-2026-0087',name:'Chen',days:5},
    {ref:'AC-2026-0091',name:'Walsh',days:8},
    {ref:'AC-2026-0083',name:'Okafor',days:12},
    {ref:'AC-2026-0094',name:'Morrison',days:15},
    {ref:'AC-2026-0079',name:'Singh',days:18},
    {ref:'AC-2026-0076',name:'Taylor',days:22},
  ]
};

let charts = {};
let activePeriod = 'ytd';
let activeType = 'all';
let activeSolicitor = 'all';

// Period multipliers for demo data scaling
const PERIOD_SCALE = {mtd:0.2, ytd:1, '12m':1.4, all:1.8};

function setPeriod(p, btn){
  activePeriod = p;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}
function setType(v){ activeType=v; applyFilters(); }
function setSolicitor(v){ activeSolicitor=v; applyFilters(); }

function applyFilters(){
  const scale = PERIOD_SCALE[activePeriod]||1;
  // Update stats
  const d = document.getElementById('content');
  if(!d) return;
  // Re-render with scaled data
  const scaledData = JSON.parse(JSON.stringify(DATA));
  scaledData.stats.open = Math.round(DATA.stats.open * (activePeriod==='mtd'?0.3:1));
  scaledData.stats.defended = Math.round(DATA.stats.defended * scale);
  scaledData.stats.settled = Math.round(DATA.stats.settled * scale);
  scaledData.stats.defenceRate = activePeriod==='mtd'?68:activePeriod==='12m'?75:activePeriod==='all'?74:72;
  scaledData.stats.avgClose = activePeriod==='mtd'?19:activePeriod==='12m'?26:activePeriod==='all'?27:24;
  scaledData.stats.exposureNet = activePeriod==='mtd'?'£620':activePeriod==='12m'?'£5,200':activePeriod==='all'?'£9,800':'£3,750';
  scaledData.stats.savingYTD = activePeriod==='mtd'?'£48,000':activePeriod==='12m'?'£392,000':activePeriod==='all'?'£680,000':'£280,750';
  // Filter workload by solicitor
  if(activeSolicitor!=='all'){
    const map={sb:'S. Booth',jp:'J. Patel',kr:'K. Rahman',al:'A. Lewis'};
    scaledData.workload = DATA.workload.filter(w=>w.name===map[activeSolicitor]);
  }
  render(scaledData);
}

function render(overrideData){
  if(overrideData) Object.assign(DATA.stats, overrideData.stats);
  document.getElementById('content').innerHTML = buildContent();
  requestAnimationFrame(()=>{
    buildCharts();
  });
}

function buildContent(){
  /* stats */
  const stats = `<div class="stat-row">
    ${statCard('Open cases','8','ti-briefcase','var(--blue-text)','4 require action','sub-warn')}
    ${statCard('Defended YTD','18','ti-shield','var(--green)','72% defence rate','sub-up')}
    ${statCard('Settled YTD','7','ti-scale','var(--amber)','Avg £536 per case','sub-neu')}
    ${statCard('Gross exposure','£284,500','ti-alert-triangle','var(--red)','Alleged value open cases','sub-red')}
    ${statCard('Net paid out','£3,750','ti-coin','var(--green)','YTD vs £284,500 alleged','sub-up')}
    ${statCard('Avg days to close','24d','ti-clock','var(--text3)','Target: 28 days','sub-up')}
  </div>`;

  /* row 1 — volume + outcomes + category */
  const row1 = `<div class="chart-grid-3">
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-trending-up"></i>Claim volume</div><div class="panel-sub">Claims received vs closed by month</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-volume"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-chart-pie"></i>Outcomes</div><div class="panel-sub">YTD case results</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-outcomes"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-tag"></i>By claim type</div><div class="panel-sub">Volume by disruption category</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-type"></canvas></div></div>
    </div>
  </div>`;

  /* row 2 — exposure + time to close + category split */
  const row2 = `<div class="chart-grid-3">
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-currency-pound"></i>Financial exposure</div><div class="panel-sub">Alleged vs actual paid out</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-exposure"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-clock-hour-4"></i>Time to close</div><div class="panel-sub">Days from intake to resolution</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-ttc"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-layers"></i>EC261 category</div><div class="panel-sub">A / B / C split by volume</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-cat"></canvas></div>
        <div style="display:flex;justify-content:center;gap:14px;margin-top:8px">
          ${[['Cat A — €250','#2A6FDB'],['Cat B — €400','#B45309'],['Cat C — Complex','#C0392B']].map(([l,c])=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div>${l}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;

  /* row 3 — workload + metrics + CPR */
  const wlMax = Math.max(...DATA.workload.map(w=>w.cases));
  const workloadItems = DATA.workload.map(w=>`
    <div class="workload-item">
      <div class="wl-top">
        <div class="wl-name">${w.name}</div>
        <div class="wl-count">${w.cases} total · ${w.open} open</div>
      </div>
      <div class="wl-bar"><div class="wl-fill" style="width:${w.cases/wlMax*100}%;background:${w.color}"></div></div>
    </div>`).join('');

  const metricsHtml = `<div class="metric-tiles">
    <div class="metric-tile"><div class="mt-label">Defence rate</div><div class="mt-val">72%</div><div class="mt-sub">18 of 25 closed cases</div></div>
    <div class="metric-tile"><div class="mt-label">Avg claim value</div><div class="mt-val">€318</div><div class="mt-sub">Across all open cases</div></div>
    <div class="metric-tile"><div class="mt-label">EC261 saving YTD</div><div class="mt-val">£280,750</div><div class="mt-sub">Alleged vs actual paid</div></div>
    <div class="metric-tile"><div class="mt-label">CPR compliance</div><div class="mt-val">100%</div><div class="mt-sub">No missed deadlines</div></div>
    <div class="metric-tile"><div class="mt-label">Cat A defence rate</div><div class="mt-val">89%</div><div class="mt-sub">ATC & weather claims</div></div>
    <div class="metric-tile"><div class="mt-label">Avg days — Cat A</div><div class="mt-val">14d</div><div class="mt-sub">Intake to close</div></div>
  </div>`;

  const cprRows = DATA.cprDeadlines.map(d=>{
    const cls = d.days<=3?'cpr-urgent':d.days<=7?'cpr-warn':'cpr-ok';
    const txt = d.days<=3?d.days+'d — URGENT':d.days<=7?d.days+'d — this week':d.days+'d';
    return `<div class="cpr-item"><div class="cpr-ref">${d.ref}</div><div class="cpr-name">${d.name}</div><span class="cpr-days ${cls}">${txt}</span></div>`;
  }).join('');

  const row3 = `<div class="chart-grid-3">
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-users"></i>Workload by solicitor</div><div class="panel-sub">Open and total cases assigned</div></div>
      <div class="panel-body">${workloadItems}</div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-calculator"></i>Key metrics</div><div class="panel-sub">YTD performance summary</div></div>
      <div class="panel-body">${metricsHtml}</div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-calendar-due"></i>CPR deadline tracker</div><div class="panel-sub">All open cases by deadline urgency</div></div>
      <div class="panel-body" style="padding:8px 16px">${cprRows}</div>
    </div>
  </div>`;

  /* urgency row — TOP of page after stats */
  const riskRows = DATA.riskRegister.map(r=>`
    <div class="risk-item">
      <div class="risk-dot risk-${r.level}"></div>
      <div style="flex:1"><div class="risk-case">${r.case}</div><div class="risk-reason">${r.reason}</div></div>
      <div class="risk-val">${r.val}</div>
    </div>`).join('');

  const tableRows = DATA.recentCases.map(c=>{
    const isOpen = c.stage !== 'Closed';
    const stageHtml = isOpen
      ? `<span class="outcome-pill op-open">${c.stage}</span>`
      : `<span class="outcome-pill op-${c.outcome}">${c.outcome.charAt(0).toUpperCase()+c.outcome.slice(1)}</span>`;
    const catCls = c.cat==='A'?'cat-a':c.cat==='B'?'cat-b':'cat-c';
    const daysHtml = isOpen && c.days
      ? `<span class="cpr-days ${c.days<=3?'cpr-urgent':c.days<=7?'cpr-warn':'cpr-ok'}">${c.days}d</span>`
      : '—';
    return `<tr>
      <td style="font-family:var(--mono);font-size:10px;color:var(--text3)">${c.ref}</td>
      <td style="font-weight:500">${c.name}</td>
      <td>${c.type}</td>
      <td><span class="cat-pill ${catCls}">${c.cat}</span></td>
      <td style="font-family:var(--mono)">${c.value}</td>
      <td>${stageHtml}</td>
      <td>${daysHtml}</td>
      <td style="color:var(--text2)">${c.solicitor}</td>
    </tr>`;
  }).join('');

  const row4 = `<div class="chart-grid-2">
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-alert-triangle" style="color:var(--red)"></i>Risk register</div><div class="panel-sub">Cases requiring immediate attention</div></div>
      <div class="panel-body" style="padding:8px 16px">${riskRows}</div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title"><i class="ti ti-chart-bar"></i>Stage pipeline</div><div class="panel-sub">Visual pipeline by stage</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="ch-pipeline"></canvas></div></div>
    </div>
  </div>`;

  const tablePanel = `<div class="panel chart-grid-full">
    <div class="panel-header"><div class="panel-title"><i class="ti ti-table"></i>Full case register</div><div class="panel-sub">All cases — open and closed</div></div>
    <div class="panel-body" style="padding:0 16px">
      <table class="mi-table">
        <thead><tr>
          <th>Ref</th><th>Case</th><th>Type</th><th>Cat</th><th>Value</th><th>Status</th><th>CPR</th><th>Solicitor</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;

  const urgencyRow = row4; // risk register + pipeline — shown first
  return stats + urgencyRow + row1 + row2 + row3 + tablePanel;
}

function statCard(label, val, icon, iconCol, sub, subCls){
  return `<div class="stat">
    <div class="stat-label" style="color:${iconCol}"><i class="ti ${icon}"></i>${label}</div>
    <div class="stat-val">${val}</div>
    <div class="stat-sub ${subCls}">${sub}</div>
  </div>`;
}

function buildCharts(){
  const fontOpts = {family:'DM Sans',size:11};
  const gridColor = '#E2E8F0';
  const tickColor = '#94A3B8';

  function destroyIfExists(id){
    if(charts[id]){charts[id].destroy();delete charts[id];}
  }

  // Volume — line
  destroyIfExists('volume');
  const cvol = document.getElementById('ch-volume');
  if(cvol){charts['volume'] = new Chart(cvol,{type:'bar',data:{
    labels:DATA.volumeByMonth.labels,
    datasets:[
      {label:'Received',data:DATA.volumeByMonth.received,backgroundColor:'rgba(42,111,219,0.15)',borderColor:'#2A6FDB',borderWidth:1.5,borderRadius:3},
      {label:'Closed',data:DATA.volumeByMonth.closed,backgroundColor:'rgba(34,168,99,0.15)',borderColor:'#22A863',borderWidth:1.5,borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:fontOpts,color:tickColor,boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:fontOpts,color:tickColor}},y:{grid:{color:gridColor},ticks:{font:fontOpts,color:tickColor,stepSize:2}}}}});}

  // Outcomes — doughnut
  destroyIfExists('outcomes');
  const cout = document.getElementById('ch-outcomes');
  if(cout){charts['outcomes'] = new Chart(cout,{type:'doughnut',data:{
    labels:DATA.outcomes.labels,
    datasets:[{data:DATA.outcomes.counts,backgroundColor:DATA.outcomes.colors,borderWidth:2,borderColor:'#fff'}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{font:fontOpts,color:tickColor,boxWidth:10,padding:10}}}}});}

  // By type — horizontal bar
  destroyIfExists('type');
  const ctype = document.getElementById('ch-type');
  if(ctype){charts['type'] = new Chart(ctype,{type:'bar',data:{
    labels:DATA.byType.labels,
    datasets:[{data:DATA.byType.counts,backgroundColor:DATA.byType.colors,borderRadius:3,borderWidth:0}]
  },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{font:fontOpts,color:tickColor,stepSize:2}},y:{grid:{display:false},ticks:{font:fontOpts,color:tickColor}}}}});}

  // Exposure — bar (alleged vs actual)
  destroyIfExists('exposure');
  const cexp = document.getElementById('ch-exposure');
  if(cexp){charts['exposure'] = new Chart(cexp,{type:'bar',data:{
    labels:DATA.exposure.labels,
    datasets:[
      {label:'Alleged (£)',data:DATA.exposure.alleged,backgroundColor:'rgba(192,57,43,0.15)',borderColor:'#C0392B',borderWidth:1.5,borderRadius:3},
      {label:'Actual paid (£)',data:DATA.exposure.actual,backgroundColor:'rgba(34,168,99,0.8)',borderColor:'#22A863',borderWidth:0,borderRadius:3}
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:fontOpts,color:tickColor,boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:fontOpts,color:tickColor}},y:{grid:{color:gridColor},ticks:{font:fontOpts,color:tickColor,callback:v=>'£'+v.toLocaleString()}}}}});}

  // Time to close — grouped bar
  destroyIfExists('ttc');
  const cttc = document.getElementById('ch-ttc');
  if(cttc){charts['ttc'] = new Chart(cttc,{type:'bar',data:{
    labels:DATA.timeToClose.labels,
    datasets:[
      {label:'Defended',data:DATA.timeToClose.defended,backgroundColor:'rgba(34,168,99,0.7)',borderRadius:3,borderWidth:0},
      {label:'Settled',data:DATA.timeToClose.settled,backgroundColor:'rgba(245,158,11,0.7)',borderRadius:3,borderWidth:0}
    ]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:fontOpts,color:tickColor,boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{font:fontOpts,color:tickColor}},y:{grid:{color:gridColor},ticks:{font:fontOpts,color:tickColor,stepSize:2}}}}});}

  // Category split — doughnut
  destroyIfExists('cat');
  const ccat = document.getElementById('ch-cat');
  if(ccat){charts['cat'] = new Chart(ccat,{type:'doughnut',data:{
    labels:DATA.byCat.labels,
    datasets:[{data:DATA.byCat.counts,backgroundColor:DATA.byCat.colors,borderWidth:2,borderColor:'#fff'}]
  },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}});}

  // Pipeline — horizontal bar
  destroyIfExists('pipeline');
  const cpipe = document.getElementById('ch-pipeline');
  if(cpipe){charts['pipeline'] = new Chart(cpipe,{type:'bar',data:{
    labels:['Intake','Triage','Evidence','Defence','Resolve'],
    datasets:[{data:[2,2,2,2,0],backgroundColor:['#EFF6FF','#FEF3C7','#EEEDFE','#E6F5EE','#F1F5F9'],borderColor:['#2A6FDB','#F59E0B','#8B5CF6','#22A863','#94A3B8'],borderWidth:1.5,borderRadius:4}]
  },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gridColor},ticks:{font:fontOpts,color:tickColor,stepSize:1}},y:{grid:{display:false},ticks:{font:fontOpts,color:tickColor}}}}});}
}

function exportReport(){
  const txt = `261Claims — MI Report\nGenerated: ${new Date().toLocaleDateString('en-GB')}\n\n`
    +`PORTFOLIO SUMMARY\n`
    +`Open cases: ${DATA.stats.open}\n`
    +`Defended YTD: ${DATA.stats.defended}\n`
    +`Settled YTD: ${DATA.stats.settled}\n`
    +`Defence rate: ${DATA.stats.defenceRate}%\n`
    +`Gross exposure: ${DATA.stats.exposureGross}\n`
    +`Net paid out: ${DATA.stats.exposureNet}\n`
    +`Saving YTD: ${DATA.stats.savingYTD}\n`
    +`Avg days to close: ${DATA.stats.avgClose}\n\n`
    +`CASE REGISTER\n`
    +DATA.recentCases.map(c=>`${c.ref} | ${c.name} | ${c.type} | Cat ${c.cat} | ${c.value} | ${c.stage} | ${c.solicitor}`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download='261Claims-MI-Report-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
}

render();
</script>
</body>
