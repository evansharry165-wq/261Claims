<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>261Claims — Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<script>
/* ════════════════════════════════════════════════════════════════
   261Claims — Global Navigation Component v3.0
   Include this AFTER shared_data.js on every page.
   Call: renderGlobalNav('active-module-id')
   Modules: dashboard, intake, cases, cpr, evidence, drafting, mi
════════════════════════════════════════════════════════════════ */
function renderGlobalNav(activeModule){
  var u = USERS[STATE.getActiveUser()] || USERS.SB;
  var navLinks = [
    {id:'dashboard', href:'index.html',                     icon:'ti-layout-dashboard', label:'Dashboard'},
    {id:'intake',    href:'module1-intake.html',            icon:'ti-file-upload',      label:'Intake'},
    {id:'cases',     href:'module2-case-management.html',   icon:'ti-layout-kanban',    label:'Cases'},
    {id:'cpr',       href:'module3-cpr.html',               icon:'ti-calendar-due',     label:'CPR'},
    {id:'evidence',  href:'module4-evidence.html',          icon:'ti-folder-open',      label:'Evidence'},
    {id:'drafting',  href:'module5-drafting.html',          icon:'ti-file-pencil',      label:'Drafting'},
    {id:'mi',        href:'module6-mi.html',                icon:'ti-chart-bar',        label:'MI'},
    {id:'education', href:'module7-education.html',        icon:'ti-school',            label:'Education Hub'},
  ];
  var linksHtml = navLinks.map(function(l){
    var active = l.id === activeModule ? ' active' : '';
    return '<a href="'+l.href+'" class="gn-link'+active+'"><i class="ti '+l.icon+'"></i> '+l.label+'</a>';
  }).join('');

  var html = '<nav class="global-nav" id="global-nav">'
    +'<a href="index.html" class="gn-logo">'
    +'<div class="gn-mark"><i class="ti ti-plane"></i></div>'
    +'<span class="gn-name">261Claims</span>'
    +'</a>'
    +'<div class="gn-links">'+linksHtml+'</div>'
    +'<div class="gn-right">'
    +'<div class="gn-user-btn" id="gn-user-btn" onclick="toggleGlobalUserMenu()">'
    +'<div class="gn-av" id="gn-av" style="background:'+u.colour+'">'+u.initials+'</div>'
    +'<span class="gn-user" id="gn-user">'+u.name+'</span>'
    +'<i class="ti ti-chevron-down" style="font-size:10px;color:rgba(255,255,255,0.4);margin-left:2px"></i>'
    +'</div>'
    +'</div>'
    +'</nav>'
    +'<div class="gn-user-dropdown" id="gn-dropdown">'
    +'<div class="gn-ud-head">Switch user — demo</div>'
    +Object.values(USERS).map(function(usr){
      var active = usr.id === STATE.getActiveUser() ? ' gn-ud-active' : '';
      return '<div class="gn-ud-item'+active+'" onclick="switchGlobalUser(\''+usr.id+'\')">'
        +'<div class="gn-ud-av" style="background:'+usr.colour+'">'+usr.initials+'</div>'
        +'<div><div class="gn-ud-name">'+usr.full+'</div><div class="gn-ud-role">'+usr.role+'</div></div>'
        +(usr.id===STATE.getActiveUser()?'<i class="ti ti-check" style="margin-left:auto;color:var(--blue)"></i>':'')
        +'</div>';
    }).join('')
    +'<div class="gn-ud-item gn-ud-reset" onclick="if(confirm(\'Reset all case data to defaults?\'))STATE.reset()">'
    +'<i class="ti ti-refresh" style="font-size:13px;color:var(--text3)"></i>'
    +'<div style="font-size:11px;color:var(--text3)">Reset demo data</div>'
    +'</div>'
    +'</div>';

  /* Inject nav CSS if not already present */
  if(!document.getElementById('gn-styles')){
    var style = document.createElement('style');
    style.id = 'gn-styles';
    style.textContent = `
.global-nav{background:#0B1628;height:48px;display:flex;align-items:center;padding:0 20px;gap:0;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px;flex-shrink:0}
.gn-mark{width:28px;height:28px;background:#2A6FDB;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.02em}
.gn-links{display:flex;align-items:center;gap:2px;flex:1;overflow:hidden}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.3);color:#fff}
.gn-link i{font-size:12px}
.gn-right{display:flex;align-items:center;gap:8px;margin-left:8px;flex-shrink:0}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer;transition:all 0.15s}
.gn-user-btn:hover{background:rgba(255,255,255,0.12)}
.gn-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.gn-user{font-size:11px;font-weight:500;color:rgba(255,255,255,0.8)}
.gn-user-dropdown{display:none;position:fixed;top:52px;right:14px;background:#fff;border:1px solid #E2E8F0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.14);width:240px;overflow:hidden;z-index:500}
.gn-user-dropdown.open{display:block}
.gn-ud-head{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;padding:10px 14px 6px;border-bottom:1px solid #F1F5F9}
.gn-ud-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.1s}
.gn-ud-item:hover{background:#F8FAFC}
.gn-ud-active{background:#EFF6FF}
.gn-ud-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.gn-ud-name{font-size:12px;font-weight:500;color:#0F172A}
.gn-ud-role{font-size:10px;color:#94A3B8}
.gn-ud-reset{border-top:1px solid #F1F5F9;gap:8px}
    `;
    document.head.appendChild(style);
  }

  /* Find or create nav container */
  var existing = document.getElementById('global-nav-wrap');
  if(!existing){
    existing = document.createElement('div');
    existing.id = 'global-nav-wrap';
    document.body.insertBefore(existing, document.body.firstChild);
  }
  existing.innerHTML = html;
}

function toggleGlobalUserMenu(){
  var dd = document.getElementById('gn-dropdown');
  if(dd) dd.classList.toggle('open');
}

function switchGlobalUser(id){
  STATE.setActiveUser(id);
  document.getElementById('gn-dropdown').classList.remove('open');
  /* Update avatar + name in nav */
  var u = USERS[id];
  var av = document.getElementById('gn-av');
  var nm = document.getElementById('gn-user');
  if(av){ av.textContent=u.initials; av.style.background=u.colour; }
  if(nm) nm.textContent = u.name;
  /* Trigger page re-render if available */
  if(typeof render === 'function') render();
  if(typeof renderPage === 'function') renderPage();
  if(typeof init === 'function') init();
}

/* Close dropdown on outside click */
document.addEventListener('click', function(e){
  var dd = document.getElementById('gn-dropdown');
  var btn = document.getElementById('gn-user-btn');
  if(dd && btn && !btn.contains(e.target) && !dd.contains(e.target)){
    dd.classList.remove('open');
  }
});

</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1628;--blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;--green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;--red:#C0392B;--red-faint:#FCF0EF;--amber:#B45309;--amber-faint:#FEF3C7;--purple:#4338CA;--purple-faint:#EEEDFE;--border:#E2E8F0;--border2:#CBD5E1;--text:#0F172A;--text2:#475569;--text3:#94A3B8;--surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--r2:12px;--r3:16px}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.body{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden}
/* Left panel */
.left-panel{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.lp-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.lp-title{font-size:13px;font-weight:600;margin-bottom:2px}
.lp-sub{font-size:11px;color:var(--text3);margin-bottom:10px}
/* Upload section - now has two modes */
.upload-mode-tabs{display:flex;gap:4px;margin-bottom:10px}
.um-tab{flex:1;padding:6px 8px;border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text3);text-align:center;transition:all 0.15s}
.um-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.upload-btn{width:100%;padding:9px;border:1.5px dashed var(--border2);border-radius:var(--r2);background:var(--surface2);cursor:pointer;font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);transition:all 0.15s}
.upload-btn:hover{border-color:var(--blue);color:var(--blue-text);background:var(--blue-faint)}
/* Supplementary upload panel */
.supp-panel{background:var(--surface3);border-radius:var(--r2);padding:10px;margin-top:8px;display:none}
.supp-panel.open{display:block}
.supp-label{font-size:11px;font-weight:500;margin-bottom:6px;color:var(--text2)}
.supp-field{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;margin-bottom:6px}
.supp-field:focus{border-color:var(--blue)}
.supp-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;margin-bottom:6px;cursor:pointer}
.case-list{flex:1;overflow-y:auto}
.case-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.case-row:hover{background:var(--surface2)}
.case-row.active{background:var(--blue-faint);border-left:3px solid var(--blue)}
.cr-icon{width:32px;height:32px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cr-ref{font-size:9px;font-family:var(--mono);color:var(--text3);margin-bottom:1px}
.cr-name{font-size:12px;font-weight:500;margin-bottom:2px}
.cr-meta{font-size:10px;color:var(--text3)}
.cr-days{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap;margin-left:auto}
.new-badge{font-size:9px;font-weight:600;background:var(--blue-faint);color:var(--blue-text);padding:1px 5px;border-radius:4px;margin-left:4px}
/* Right panel */
.right-panel{overflow-y:auto;background:var(--surface2);display:flex;flex-direction:column}
.rp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);text-align:center;padding:40px;gap:12px}
.rp-empty i{font-size:48px;opacity:0.15}
.rp-empty p{font-size:13px;max-width:280px;line-height:1.6}
.cw{padding:20px}
.cw-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 16px;margin-bottom:12px}
.cw-ref{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:2px}
.cw-name{font-size:15px;font-weight:600;margin-bottom:5px;letter-spacing:-0.01em}
.cw-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--text2)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:16px;margin-bottom:12px}
.section-title{font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ai-badge{font-size:9px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:8px;padding:1px 5px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.field-value{font-size:12px;font-weight:500;padding:7px 10px;background:var(--blue-faint);border-radius:var(--r);border:1px solid #BFDBFE}
.triage-box{background:var(--amber-faint);border:1px solid #FDE68A;border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--amber);line-height:1.6}
.verdict-box-defend{background:var(--green-faint);border:1px solid rgba(26,122,74,0.2);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--green);font-weight:500}
.verdict-box-concede{background:var(--red-faint);border:1px solid rgba(192,57,43,0.15);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--red);font-weight:500}
.action-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:5px;padding:9px 16px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:none;transition:all 0.15s}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{opacity:0.9}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{background:var(--surface2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:0.9}
.btn-sm{padding:6px 12px;font-size:11px}
/* Document uploads display */
.doc-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border)}
.doc-icon{width:28px;height:28px;background:var(--blue-faint);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--blue-text);flex-shrink:0}
.doc-label{font-size:11px;font-weight:500}
.doc-type{font-size:10px;color:var(--text3)}
.doc-time{font-size:10px;color:var(--text3);margin-left:auto}
/* Stage advance */
.stage-advance{background:var(--navy);border-radius:var(--r2);padding:12px 14px;margin-top:12px;display:flex;align-items:center;justify-content:space-between}
.sa-text{font-size:12px;color:rgba(255,255,255,0.7)}
.sa-stage{font-size:13px;font-weight:600;color:#fff}
</style>
</head>
<body>
<div class="app">
<div id="global-nav-wrap"></div>
<div class="body">
  <div class="left-panel">
    <div class="lp-header">
      <div class="lp-title">Intake queue</div>
      <div class="lp-sub" id="lp-sub">Cases awaiting action</div>
      <!-- Upload mode selector -->
      <div class="upload-mode-tabs">
        <div class="um-tab active" id="tab-new" onclick="setUploadMode('new')">New LOC</div>
        <div class="um-tab" id="tab-supp" onclick="setUploadMode('supp')">Add to case</div>
      </div>
      <button class="upload-btn" id="upload-btn" onclick="triggerUpload()">
        <i class="ti ti-upload" style="font-size:13px"></i>
        <span id="upload-btn-label">Upload letter of claim</span>
      </button>
      <!-- Supplementary upload panel -->
      <div class="supp-panel" id="supp-panel">
        <div class="supp-label">Assign document to case</div>
        <select class="supp-select" id="supp-case-select">
          <option value="">Select case…</option>
        </select>
        <input class="supp-field" id="supp-doc-label" placeholder="Document label (e.g. Medical report, Solicitor response…)">
        <select class="supp-select" id="supp-doc-type">
          <option value="LOC">Letter of Claim</option>
          <option value="Solicitor correspondence">Solicitor correspondence</option>
          <option value="Medical report">Medical report</option>
          <option value="Expert report">Expert report</option>
          <option value="Court order">Court order</option>
          <option value="Evidence document">Evidence document</option>
          <option value="Witness statement">Witness statement</option>
          <option value="ADR decision">ADR decision</option>
          <option value="Other">Other</option>
        </select>
        <button class="upload-btn" onclick="triggerSuppUpload()" style="margin-top:4px"><i class="ti ti-paperclip" style="font-size:13px"></i> Attach document</button>
      </div>
    </div>
    <div class="case-list" id="case-list"></div>
  </div>
  <div class="right-panel" id="right-panel">
    <div class="rp-empty">
      <i class="ti ti-inbox"></i>
      <p>Select a case from your queue to review it, or upload a new letter of claim to intake a new case.</p>
      <p style="font-size:10px;color:var(--text3)">Switch to <strong>Add to case</strong> above to attach supplementary documents to an active case.</p>
    </div>
  </div>
</div>
</div>
<input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleUpload(event)">
<input type="file" id="supp-file-input" accept=".pdf,.doc,.docx,.txt,.jpg,.png" style="display:none" onchange="handleSuppUpload(event)">
<script>
var activeCase = null;
var uploadMode = 'new';
var pendingRef = null;

window.addEventListener('DOMContentLoaded', function(){
  renderGlobalNav('intake');
  /* Check for ref param — opening from cases list */
  var params = new URLSearchParams(window.location.search);
  var ref = params.get('ref');
  if(ref){ var c=STATE.getCase(ref); if(c) { activeCase=c; } }
  populateSuppCaseSelect();
  renderList();
  if(activeCase) openCaseView(activeCase.ref);
});

function setUploadMode(mode){
  uploadMode = mode;
  document.getElementById('tab-new').classList.toggle('active', mode==='new');
  document.getElementById('tab-supp').classList.toggle('active', mode==='supp');
  document.getElementById('supp-panel').classList.toggle('open', mode==='supp');
  document.getElementById('upload-btn-label').textContent = mode==='new'?'Upload letter of claim':'Browse file to attach';
  if(mode==='supp') document.getElementById('upload-btn').style.display='none';
  else document.getElementById('upload-btn').style.display='flex';
}

function populateSuppCaseSelect(){
  var sel = document.getElementById('supp-case-select');
  var cases = STATE.getCases().filter(function(c){return c.stage!=='resolve';});
  sel.innerHTML = '<option value="">Select case…</option>'
    + cases.map(function(c){
        return '<option value="'+c.ref+'">'+c.ref+' — '+c.claimant+'</option>';
      }).join('');
}

function triggerUpload(){ document.getElementById('file-input').click(); }
function triggerSuppUpload(){
  var caseRef = document.getElementById('supp-case-select').value;
  var label = document.getElementById('supp-doc-label').value.trim();
  if(!caseRef){ alert('Please select a case.'); return; }
  if(!label){ alert('Please enter a document label.'); return; }
  pendingRef = caseRef;
  document.getElementById('supp-file-input').click();
}

function handleUpload(e){
  var file = e.target.files[0]; if(!file) return;
  var rp = document.getElementById('right-panel');
  rp.innerHTML='<div class="cw"><div class="section-card"><div class="section-title"><i class="ti ti-sparkles" style="color:var(--blue)"></i>AI extracting claim data… <span class="ai-badge">Processing</span></div><div style="font-size:12px;color:var(--text3)">Analysing: '+file.name+'</div></div></div>';
  setTimeout(function(){ showDemoExtraction(file.name); }, 1800);
  e.target.value='';
}

function handleSuppUpload(e){
  var file = e.target.files[0]; if(!file) return;
  var ref = pendingRef;
  var label = document.getElementById('supp-doc-label').value.trim();
  var docType = document.getElementById('supp-doc-type').value;
  STATE.addDocument(ref, { label:label||file.name, docType:docType, filename:file.name, size:file.size });
  STATE.addActivity(ref, 'Document attached: '+label+' ('+docType+')', 'upload');
  pendingRef = null;
  document.getElementById('supp-doc-label').value='';
  /* Show confirmation */
  var c = STATE.getCase(ref);
  alert('✓ Document "'+label+'" attached to '+c.claimant+' ('+ref+')');
  renderList();
  if(activeCase && activeCase.ref===ref) openCaseView(ref);
  e.target.value='';
}

function showDemoExtraction(filename){
  var rp = document.getElementById('right-panel');
  rp.innerHTML='<div class="cw">'
    +'<div class="cw-header"><div class="cw-ref">NEW — PENDING ASSIGNMENT</div><div class="cw-name">Alexandra Davies v. TestAirways</div>'
    +'<div class="cw-meta"><span><i class="ti ti-plane" style="font-size:11px"></i> HC 771 — LGW to PMI</span><span><i class="ti ti-currency-pound" style="font-size:11px"></i>€400</span><span>'+filename+'</span></div></div>'
    +'<div class="section-card"><div class="section-title"><i class="ti ti-sparkles" style="color:var(--blue)"></i>AI-extracted claim data <span class="ai-badge">Auto-filled</span></div>'
    +'<div class="field-grid">'
    +'<div><div class="field-label">Claimant</div><div class="field-value">Alexandra Davies</div></div>'
    +'<div><div class="field-label">Flight number</div><div class="field-value">HC 771</div></div>'
    +'<div><div class="field-label">Route</div><div class="field-value">LGW → PMI</div></div>'
    +'<div><div class="field-label">Disruption</div><div class="field-value">Delay — 3h 45m</div></div>'
    +'<div><div class="field-label">Claim value</div><div class="field-value">€400</div></div>'
    +'<div><div class="field-label">Solicitor</div><div class="field-value">Slater & Gordon</div></div>'
    +'</div></div>'
    +'<div class="section-card"><div class="section-title"><i class="ti ti-brain" style="color:var(--amber)"></i>AI triage assessment</div>'
    +'<div class="triage-box"><strong>Category A — DEFEND</strong><br>ATC restriction confirmed via Eurocontrol. Strong extraordinary circumstances defence. Recommend fast-track to evidence stage.</div></div>'
    +'<div class="action-btns">'
    +'<button class="btn btn-navy" onclick="alert(\'Case accepted — added to queue\')"><i class="ti ti-check"></i> Accept & assign to me</button>'
    +'<button class="btn btn-outline" onclick="alert(\'Flagged for senior review\')"><i class="ti ti-flag"></i> Flag for review</button>'
    +'</div></div>';
}

function renderList(){
  var uid = STATE.getActiveUser();
  var cases = getCasesForUser(uid, 'intake');
  document.getElementById('lp-sub').textContent = cases.length + ' case'+(cases.length!==1?'s':'')+' in your queue';
  var el = document.getElementById('case-list');
  if(!cases.length){
    el.innerHTML='<div style="padding:32px 16px;text-align:center;color:var(--text3);font-size:12px"><i class="ti ti-inbox" style="font-size:28px;display:block;margin-bottom:10px;opacity:0.3"></i>No cases in your intake queue</div>';
    return;
  }
  el.innerHTML = cases.map(function(c){
    var isActive = activeCase && activeCase.ref===c.ref;
    var docCount = (c.documents||[]).length;
    return '<div class="case-row'+(isActive?' active':'')+'" onclick="openCaseView(\''+c.ref+'\')">'
      +'<div class="cr-icon" style="background:var(--blue-faint);color:var(--blue-text)"><i class="ti ti-file-text"></i></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="cr-ref">'+c.ref+'</div>'
      +'<div class="cr-name">'+c.claimant+' <span class="new-badge">New</span></div>'
      +'<div class="cr-meta">'+c.flightNum+' · '+c.value+(docCount?' · '+docCount+' doc'+(docCount>1?'s':''):'')+'</div>'
      +'</div>'
      +'<div class="cr-days" style="background:var(--surface3);color:var(--text3)">'+c.cprDaysLeft+'d</div>'
      +'</div>';
  }).join('');
}

function openCaseView(ref){
  activeCase = STATE.getCase(ref);
  if(!activeCase) return;
  renderList();
  var c = activeCase;
  var rp = document.getElementById('right-panel');

  var docsHtml = '';
  if(c.documents && c.documents.length){
    docsHtml = '<div class="section-card"><div class="section-title"><i class="ti ti-paperclip" style="color:var(--purple)"></i>Attached documents ('+c.documents.length+')</div>'
      +'<div class="doc-list">'+c.documents.map(function(d){
        return '<div class="doc-item"><div class="doc-icon"><i class="ti ti-file"></i></div>'
          +'<div style="flex:1"><div class="doc-label">'+d.label+'</div><div class="doc-type">'+d.docType+'</div></div>'
          +'<div class="doc-time">'+(d.uploadedAt||'')+'</div></div>';
      }).join('')+'</div></div>';
  }

  var pointsHtml = '';
  if(c.points && c.points.length){
    pointsHtml = c.points.map(function(p){
      var col=p.evidenceStatus==='green'?'var(--green-l)':p.evidenceStatus==='amber'?'var(--amber)':'var(--red)';
      return '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
        +'<div style="width:7px;height:7px;border-radius:50%;background:'+col+';flex-shrink:0;margin-top:4px"></div>'
        +'<div style="flex:1"><div style="font-size:12px;font-weight:500">'+p.claim+'</div><div style="font-size:10px;color:var(--text3)">'+p.evidenceDoc+'</div></div></div>';
    }).join('');
  }

  var verdictBox = c.classification==='CONCEDE'
    ? '<div class="verdict-box-concede"><i class="ti ti-alert-triangle" style="font-size:12px"></i> <strong>CONCEDE</strong> — '+c.triageNote+'</div>'
    : '<div class="verdict-box-defend"><i class="ti ti-shield" style="font-size:12px"></i> <strong>DEFEND</strong> — '+c.triageNote+'</div>';

  rp.innerHTML='<div class="cw">'
    +'<div class="cw-header"><div class="cw-ref">'+c.ref+'</div><div class="cw-name">'+c.claimant+' v. '+c.airline+'</div>'
    +'<div class="cw-meta"><span><i class="ti ti-plane" style="font-size:11px"></i>'+c.flightNum+' · '+c.depFull+' to '+c.arrFull+'</span><span>'+c.flightDate+'</span><span>'+c.value+'</span><span>'+c.solicitor+'</span></div></div>'
    +(c.triageNote?'<div class="section-card"><div class="section-title"><i class="ti ti-brain" style="color:var(--amber)"></i>AI triage</div>'+verdictBox+'</div>':'')
    +(pointsHtml?'<div class="section-card"><div class="section-title"><i class="ti ti-list-check"></i>Claim points</div>'+pointsHtml+'</div>':'')
    +docsHtml
    +'<div class="action-btns">'
    +'<button class="btn btn-navy" onclick="startCPRClock(\''+c.ref+'\')"><i class="ti ti-clock"></i> Start CPR clock</button>'
    +'<button class="btn btn-outline" onclick="window.location.href=\'module2-case-workspace.html?ref='+c.ref+'\'"><i class="ti ti-external-link"></i> Open full workspace</button>'
    +'</div>'
    +'</div>';
}

function startCPRClock(ref){
  STATE.advanceStage(ref);
  STATE.addActivity(ref, 'CPR clock started — deadline set', 'action');
  alert('CPR clock started. Case moved to CPR stage.');
  activeCase = null;
  renderList();
  document.getElementById('right-panel').innerHTML='<div class="rp-empty"><i class="ti ti-circle-check" style="font-size:48px;opacity:0.15;color:var(--green)"></i><p>Case advanced to CPR. Find it in the CPR module.</p></div>';
}

function render(){ renderList(); }
</script>
<script>
window.addEventListener("DOMContentLoaded", function(){
  renderGlobalNav("intake");
  render();
});
</script>
</body>
</html>
