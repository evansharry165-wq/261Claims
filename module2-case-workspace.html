<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DefendAble — Case</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1A1A2E;--ink2:#2D2D44;--ink3:#6B6B80;--ink4:#9B9BAA;--rule:#D8D8E0;--rule2:#EBEBF0;--surface:#FFFFFF;--surface2:#F7F7F9;--surface3:#EFEFF2;--accent:#1B3A6B;--accent2:#254E91;--accent-faint:#EEF2F8;--confirm:#1A5C3A;--confirm-faint:#EEF7F2;--caution:#7A4E00;--caution-faint:#FDF4E3;--alert:#8B1A1A;--alert-faint:#FBF0F0;--navy:var(--ink);--navy2:var(--ink2);--navy3:var(--ink2);--blue:var(--accent2);--blue-faint:var(--accent-faint);--blue-text:var(--accent);--green:var(--confirm);--green-l:#2A7A4F;--green-faint:var(--confirm-faint);--amber:var(--caution);--amber-faint:var(--caution-faint);--red:var(--alert);--red-faint:var(--alert-faint);--border:var(--rule);--border2:var(--rule2);--text:var(--ink);--text2:var(--ink2);--text3:var(--ink3);--font:'Helvetica Neue','Arial',sans-serif;--font-serif:'Georgia','Times New Roman',serif;--font-doc:'Georgia','Times New Roman',serif;--mono:'Courier New','Courier',monospace;--purple:#4338CA;--purple-faint:var(--accent-faint);--r:3px;--r2:4px;--r3:5px}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:calc(100vh - 48px);min-height:0}

/* topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}

/* layout */
.body{flex:1;display:grid;grid-template-columns:1fr 300px;grid-template-rows:minmax(0,1fr);overflow:hidden;min-height:0}
.main{overflow-y:auto;padding:20px 24px;min-height:0;min-width:0}
.sidebar{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}

/* stage rail */
.stage-rail{display:flex;align-items:center;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:12px 16px;overflow-x:auto;gap:0}
.rail-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px;position:relative;cursor:pointer;user-select:none}
.rail-step:not(:last-child)::after{content:'';position:absolute;top:11px;right:-50%;width:100%;height:1.5px;background:var(--border2);z-index:0}
.rail-pip{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--border2);background:var(--surface3);color:var(--text3);position:relative;z-index:1;transition:all 0.2s}
.rail-pip.done{background:var(--green-faint);border-color:var(--green-l);color:var(--green)}
.rail-pip.active{background:var(--blue-faint);border-color:var(--blue);color:var(--blue-text);box-shadow:0 0 0 3px rgba(42,111,219,0.1)}
.rail-label{font-size:10px;font-weight:500;margin-top:4px;text-align:center;color:var(--text3)}
.rail-label.done{color:var(--green)}
.rail-label.active{color:var(--blue-text)}

/* case header */
.case-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 18px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ch-ref{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:2px}
.ch-name{font-size:18px;font-weight:400;color:var(--text);margin-bottom:5px;letter-spacing:-0.01em;font-family:var(--font-serif)}
.ch-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text2)}
.ch-meta span{display:flex;align-items:center;gap:4px}
.ch-meta i{font-size:12px;color:var(--text3)}
.ch-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}

/* stage card */
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-bottom:14px}
.sc-header{padding:13px 16px 11px;border-bottom:1px solid var(--border);border-left:4px solid var(--border2)}
.sc-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.sc-title{font-size:14px;font-weight:500;color:var(--text)}
.sc-body{padding:14px 16px}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.chk{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);transition:all 0.15s;cursor:pointer}
.chk:hover{border-color:var(--border2)}
.chk.done{background:var(--green-faint);border-color:#BBF7D0}
.chk.blocked{opacity:0.45;pointer-events:none}
.chk-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.chk.done .chk-box{background:var(--green-l);border-color:var(--green-l)}
.chk-box i{display:none;color:#fff;font-size:10px}
.chk.done .chk-box i{display:block}
.chk-label{font-size:12px;font-weight:500;color:var(--text);flex:1}
.chk.done .chk-label{color:var(--text3);text-decoration:line-through}
.chk-tag{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;white-space:nowrap;margin-left:auto}
.t-req{background:var(--red-faint);color:var(--red)}
.t-opt{background:var(--surface3);color:var(--text3)}

/* inline inputs */
.chk-input-wrap{margin-top:6px;padding:0 11px 9px 39px}
.chk-select{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);cursor:pointer;width:100%;max-width:260px}
.chk-select:focus{outline:none;border-color:var(--blue)}
.chk-text{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);width:100%;max-width:340px}
.chk-text:focus{outline:none;border-color:var(--blue)}
.chk-save{font-size:11px;padding:5px 11px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);margin-left:6px}
.chk-saved{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:4px}

/* LOA block — compact */
.loa-wrap{margin-top:6px;padding:0 11px 9px 39px}
.loa-opts{display:flex;flex-direction:column;gap:4px}
.loa-opt{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text);cursor:pointer}
.loa-opt input{accent-color:var(--navy);width:13px;height:13px;cursor:pointer}

/* AI recommendation */
.ai-block{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.ai-header{padding:10px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ai-title{font-size:12px;font-weight:500;color:var(--text);flex:1}
.ai-badge{font-size:10px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:20px;padding:2px 7px}
.ai-body{padding:12px 13px;font-size:12px}
.ai-spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.verdict-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:2px;margin-bottom:8px;border:1px solid var(--rule);background:transparent}
.vp-defend{color:var(--confirm);border-color:#A8C8B4}
.vp-escalate{color:var(--alert);border-color:#C8A0A0}
.vp-missing{color:var(--caution);border-color:#D4B896}
.pt-list{display:flex;flex-direction:column;gap:5px}
.pt-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-size:11px}
.pt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pt-g{background:var(--green-l)}.pt-a{background:#F59E0B}.pt-r{background:var(--red)}
.pt-label{font-weight:500;color:var(--text);margin-bottom:1px}
.pt-detail{color:var(--text2)}
.pt-verdict{margin-left:auto;font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;white-space:nowrap}
.pv-d{background:var(--green-faint);color:var(--green)}
.pv-m{background:var(--amber-faint);color:var(--amber)}
.pv-e{background:var(--red-faint);color:var(--red)}
.esc-note{margin-top:8px;padding:8px 10px;background:var(--red-faint);border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0;font-size:11px;color:var(--text2)}

/* financial position */
.fin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden}
.fin-header{padding:10px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.fin-icon{width:28px;height:28px;border-radius:var(--r);background:var(--blue-faint);color:var(--blue-text);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fin-title{font-size:13px;font-weight:500;color:var(--text)}
.fin-body{padding:12px 13px}
.fin-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:5px;color:var(--text2)}
.fin-val{font-weight:500;color:var(--text)}
.fin-bars{margin:10px 0 6px}
.fin-bar-wrap{margin-bottom:8px}
.fin-bar-label{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;justify-content:space-between}
.fin-bar-track{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden}
.fin-bar-fill{height:100%;border-radius:4px;transition:width 0.3s}
.fin-bar-claim .fin-bar-fill{background:var(--blue)}
.fin-bar-defence .fin-bar-fill{background:var(--amber)}
.fin-net{font-size:24px;font-weight:500;margin:6px 0 2px;letter-spacing:-0.02em}
.fin-net-pos{color:var(--green)}
.fin-net-neg{color:var(--red)}
.fin-net-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.fin-rec{font-size:12px;font-weight:500;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);color:var(--text);line-height:1.5}

/* CPR block — compact */
.cpr-block{border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;margin-bottom:14px}
.cpr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.cpr-label{font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.cpr-date{font-size:14px;font-weight:500;color:var(--red);font-family:var(--mono)}
.cpr-note{font-size:11px;color:var(--text2);margin-bottom:8px}
.cal-row{display:flex;gap:6px;flex-wrap:wrap}
.btn-cal{font-size:11px;padding:5px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font);display:inline-flex;align-items:center;gap:4px}
.btn-cal:hover{background:var(--surface3)}

/* docs */
.doc-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);margin-bottom:6px}
.doc-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.doc-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.doc-note{font-size:11px;color:var(--text3)}
.doc-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.dt-att{background:var(--blue-faint);color:var(--blue-text)}
.dt-up{background:var(--green-faint);color:var(--green)}
.dt-req{background:var(--red-faint);color:var(--red)}
.dt-opt{background:var(--surface3);color:var(--text3)}
.btn-upload{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font)}
.btn-upload:hover{background:var(--surface3)}

/* advance */
.advance-wrap{margin-top:6px}
.btn-advance{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.15s}
.btn-advance:hover:not(:disabled){background:var(--navy2)}
.btn-advance:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.advance-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:5px;min-height:15px}

/* sidebar */
.sb-header{padding:13px 15px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:12px;font-weight:500;color:var(--text)}
.sb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.audit-scroll{flex:1;overflow-y:auto;padding:10px 13px}
.audit-entry{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.audit-entry:last-child{border-bottom:none}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.a-create{background:var(--green-l)}.a-action{background:var(--green-l)}
.a-stage{background:var(--blue)}.a-note{background:var(--amber)}
.a-upload{background:#8B5CF6}.a-ai{background:var(--blue)}
.a-text{font-size:11px;color:var(--text);line-height:1.4}
.a-time{font-size:10px;color:var(--text3);margin-top:1px}
.note-bar{padding:9px 11px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}
.note-bar input{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.note-bar input:focus{outline:none;border-color:var(--blue)}
.note-bar button{font-size:11px;padding:5px 9px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--font);color:var(--text2)}
input[type=file]{display:none}

/* LOA draft panel */
.loa-draft{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-top:10px}
.loa-draft-hdr{padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.loa-draft-title{font-size:11px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.loa-draft-actions{display:flex;gap:5px}
.btn-loa{font-size:10px;padding:3px 9px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:inline-flex;align-items:center;gap:3px}
.btn-loa:hover{background:var(--surface3)}
.btn-loa.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-loa.primary:hover{background:var(--navy2)}
.btn-loa.approved{background:var(--green-faint);color:var(--green);border-color:#BBF7D0;cursor:default}
.loa-text{padding:16px 18px;font-size:11px;line-height:1.8;color:var(--text);background:var(--surface);font-family:Georgia,serif;white-space:pre-wrap;max-height:320px;overflow-y:auto;border-bottom:1px solid var(--border)}
.loa-footer{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.loa-status{font-size:10px;color:var(--text3)}
.loa-status.approved{color:var(--green);font-weight:500}

/* LOA draft panel */
.loa-draft{margin-top:10px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.loa-draft-header{padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.loa-draft-title{font-size:11px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px}
.loa-draft-actions{display:flex;gap:5px}
.btn-loa{font-size:10px;padding:4px 9px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:inline-flex;align-items:center;gap:3px}
.btn-loa:hover{background:var(--surface3)}
.btn-loa.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-loa.primary:hover{background:var(--navy2)}
.btn-loa.approved{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}
.loa-text{padding:16px 20px;font-size:11px;line-height:1.8;color:var(--text);background:var(--surface);font-family:Georgia,serif;white-space:pre-wrap;max-height:360px;overflow-y:auto;border-bottom:1px solid var(--border)}
.loa-text[contenteditable=true]{outline:none;border:1px solid var(--blue);border-radius:0}
.loa-footer{padding:8px 12px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between}
.loa-status{font-size:10px;color:var(--text3)}
.loa-status.approved{color:var(--green);font-weight:500}
.loa-send-note{font-size:10px;color:var(--amber);display:flex;align-items:center;gap:4px;margin-top:6px;padding:6px 9px;background:var(--amber-faint);border-radius:var(--r);border:1px solid #FDE68A}

.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500}
.user-modal.open{display:flex;justify-content:flex-end;padding:52px 20px 0}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow:hidden;max-height:calc(100vh - 70px);overflow-y:auto}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .15s}
.ud-item:hover{background:var(--surface2)}
.ud-item.current{background:var(--blue-faint)}
.ud-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.ud-name{font-size:12px;font-weight:500;color:var(--text)}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);font-size:14px;display:none}
.ud-item.current .ud-tick{display:block}

</style>
</head>
<body>
<script src="shared_theme.js"></script>
<script src="case_embed.js"></script>
<script src="shared_data.js"></script>
<script src="case_helpers.js"></script>
<script>
/* URL param → sessionStorage — runs before case init */
(function(){
  try{
    var p=new URLSearchParams(window.location.search);
    var ref=p.get('ref');
    if(!ref) return;
    // Try sessionStorage case store first
    var stored=null;
    try{stored=JSON.parse(sessionStorage.getItem('dfa_case')||'null');}catch(e){}
    if(stored&&stored.ref===ref){
      // Already correct — write to aeroCaseData for legacy readers
      sessionStorage.setItem('aeroCaseData',JSON.stringify({
        ref:stored.ref,claimant:stored.claimant,solicitor:stored.solicitor,
        flight:stored.flight,flightNum:stored.flightNum,dep:stored.dep,arr:stored.arr,
        flightDate:stored.flightDate,value:stored.value,type:stored.type,
        date:stored.locDate||stored.date,framework:'EC Regulation 261/2004',
        points:stored.points||[],jurisdiction:stored.jurisdiction||'england-wales',
        lang:stored.lang||'en',disruptionType:stored.disruptionType||'',
        classification:stored.classification||'',stage:stored.stage||'',
        cprDaysLeft:stored.cprDaysLeft!=null?stored.cprDaysLeft:undefined,
        evidencePct:stored.evidencePct||0,loaStatus:stored.loaStatus||'',
        triageNote:stored.triageNote||'',
        assignedTo:stored.assignedTo||(stored.assignedTo_name||'')
      }));
      return;
    }
    // Find case in embedded ALL_CASES data
    if(typeof ALL_CASES==='undefined') return;
    var cd=ALL_CASES.find(function(c){return c.ref===decodeURIComponent(ref);});
    if(!cd) return;
    var u=typeof USERS!=='undefined'&&USERS[cd.assignedTo]?USERS[cd.assignedTo].name:cd.assignedTo;
    var payload={
      ref:cd.ref,claimant:cd.claimant,solicitor:cd.solicitor,
      flight:cd.flight,flightNum:cd.flightNum,dep:cd.dep,arr:cd.arr,
      flightDate:cd.flightDate,value:cd.value,type:cd.type,
      date:cd.locDate,framework:'EC Regulation 261/2004',
      points:cd.points||[],jurisdiction:cd.jurisdiction||'england-wales',
      lang:cd.lang||'en',disruptionType:cd.disruptionType||'',
      classification:cd.classification||'',stage:cd.stage||'',
      cprDaysLeft:cd.cprDaysLeft!=null?cd.cprDaysLeft:undefined,
      evidencePct:cd.evidencePct||0,loaStatus:cd.loaStatus||'',
      triageNote:cd.triageNote||'',assignedTo:u
    };
    sessionStorage.setItem('aeroCaseData',JSON.stringify(payload));
    sessionStorage.setItem('dfa_case',JSON.stringify(cd));
  }catch(e){}
})();
</script>

<script>
var _i={};
try{var _raw=sessionStorage.getItem('aeroCaseData');if(_raw)_i=JSON.parse(_raw);}catch(e){}
var _selected=null;
try{_selected=JSON.parse(sessionStorage.getItem('dfa_case')||'null');}catch(e){}
if(_selected&&_selected.ref){
  _i.ref=_selected.ref;_i.claimant=_selected.claimant;_i.solicitor=_selected.solicitor;_i.flight=_selected.flight;_i.flightNum=_selected.flightNum;_i.dep=_selected.dep;_i.arr=_selected.arr;_i.flightDate=_selected.flightDate;_i.value=_selected.value;_i.type=_selected.type;_i.date=_selected.locDate||_selected.date;_i.points=_selected.points||[];_i.jurisdiction=_selected.jurisdiction;_i.lang=_selected.lang;_i.disruptionType=_selected.disruptionType;_i.classification=_selected.classification;_i.cat=_selected.cat;_i.triageNote=_selected.triageNote;_i.assignedTo=_selected.assignedTo;
}
var _caseRef=_i.ref||'DEF-2026-EW-0091';
var _caseData=typeof getCase==='function'?getCase(_caseRef):null;
var C={
  ref:_caseRef,name:_i.claimant||'Rebecca Walsh',sol:_i.solicitor||'Clarke & Partners',flight:_i.flight||'HC 307 — MAN → AMS',flightNum:_i.flightNum||'HC 307',dep:_i.dep||'MAN',arr:_i.arr||'AMS',flightDate:_i.flightDate||'9 April 2026',value:_i.value||'€250',type:_i.type||'EC261 — ATC delay',date:_i.date||'Today',points:_i.points||[],jurisdiction:_i.jurisdiction||'england-wales',disruptionType:_i.disruptionType||'ATC Restrictions',classification:_i.classification||'',cat:_i.cat||(_caseData&&_caseData.cat)||'',triageNote:_i.triageNote||'',assignedTo:_i.assignedTo||getActiveUser()
};
var J=getJurisdiction(C.jurisdiction);
var checked={jurisdiction:!!C.jurisdiction,claim:!!C.type,points:false};
var rationaleOpen=false;
var audit=[];
function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}
function ts(){return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function log(t,type){audit.unshift({t:t,type:type||'action',time:ts()});renderAudit();}
function updateUser(){var uid=getActiveUser(),u=USERS[uid]||USERS.SB;document.getElementById('top-av').textContent=u.initials;document.getElementById('top-user').textContent=u.name;}
function allDone(){return checked.jurisdiction&&checked.claim&&checked.points&&!!C.classification;}
function toggleCheck(id){checked[id]=!checked[id];log((checked[id]?'Completed ':'Reopened ')+id.replace(/_/g,' '),'action');render();}
function setClassification(v){C.classification=v;log('Triage classification set to '+v,'ai');render();}
function saveTriageNote(){var el=document.getElementById('triage-note');C.triageNote=el?el.value:C.triageNote;log('Triage note saved','note');render();}
function sendTriageEmail(){
  var subject=encodeURIComponent('Triage — '+C.ref+' | '+C.name+' | '+C.flight);
  var body=encodeURIComponent(
    'Case reference: '+C.ref+'\n'
    +'Claimant: '+C.name+'\n'
    +'Flight: '+C.flight+' — '+C.dep+' to '+C.arr+'\n'
    +'Date: '+C.flightDate+'\n'
    +'Disruption: '+C.disruptionType+'\n'
    +'Classification: '+(C.classification||'PENDING')+'\n'
    +'Value: '+C.value+'\n\n'
    +'Action required: Please provide operational delay records '
    +'(Operational delay records system reference) and confirm disruption cause for the above '
    +'flight.\n\n'
    +'Triage notes: '+(C.triageNote||'None recorded')
  );
  window.open('mailto:ops@airline.com?subject='+subject+'&body='+body);
}
function storeCase(stage){
  var full=getCase(C.ref)||{};
  var nextStage=stage||full.stage||'triage';
  var updated=Object.assign({},full,{ref:C.ref,claimant:C.name,solicitor:C.sol,flight:C.flight,flightNum:C.flightNum,dep:C.dep,arr:C.arr,flightDate:C.flightDate,value:C.value,type:C.type,locDate:C.date,stage:nextStage,jurisdiction:C.jurisdiction,lang:C.lang||J.lang,disruptionType:C.disruptionType,classification:C.classification,triageNote:C.triageNote,points:C.points,assignedTo:full.assignedTo||C.assignedTo||getActiveUser(),cprDaysLeft:full.cprDaysLeft||21,evidencePct:full.evidencePct||0,loaStatus:full.loaStatus||'',activity:(full.activity||[]).concat([{text:'Triage completed — '+nextStage,time:'Just now',type:'stage'}])});
  try{sessionStorage.setItem('dfa_case',JSON.stringify(updated));sessionStorage.setItem('aeroCaseData',JSON.stringify({ref:updated.ref,claimant:updated.claimant,solicitor:updated.solicitor,flight:updated.flight,flightNum:updated.flightNum,dep:updated.dep,arr:updated.arr,flightDate:updated.flightDate,value:updated.value,type:updated.type,date:updated.locDate,framework:'EC Regulation 261/2004',points:updated.points,jurisdiction:updated.jurisdiction,lang:updated.lang,disruptionType:updated.disruptionType,classification:updated.classification||'',stage:updated.stage||'',cprDaysLeft:updated.cprDaysLeft!=null?updated.cprDaysLeft:undefined,evidencePct:updated.evidencePct,loaStatus:updated.loaStatus,triageNote:updated.triageNote,assignedTo:(USERS[updated.assignedTo]&&USERS[updated.assignedTo].name)||updated.assignedTo}));}catch(e){}
  if(typeof advanceCaseStage==='function')advanceCaseStage(C.ref,nextStage);
}
function advanceToCPR(){if(!allDone())return;storeCase('cpr');if(typeof shellGo==='function'&&shellGo('deadlines','Triage completed — proceeding to CPR'))return;window.location.href='module3-cpr-workspace.html?ref='+encodeURIComponent(C.ref);}
function openEvidence(){storeCase('evidence');if(typeof shellGo==='function'&&shellGo('evidence','Opened evidence from triage'))return;window.location.href='case.html?ref='+encodeURIComponent(C.ref)+'&tab=evidence';}
function addNote(){var el=document.getElementById('note-input');var v=(el.value||'').trim();if(!v)return;log(v,'note');el.value='';}
function stageRail(){var steps=[['Intake','done','ti-check'],['Triage','active','ti-search'],['CPR','','ti-calendar-due'],['Evidence','','ti-folder-open'],['Drafting','','ti-file-pencil'],['Resolve','','ti-circle-check']];return '<div class="stage-rail">'+steps.map(function(s){return '<div class="rail-step"><div class="rail-pip '+s[1]+'"><i class="ti '+s[2]+'"></i></div><div class="rail-label '+s[1]+'">'+s[0]+'</div></div>';}).join('')+'</div>';}

function aiRationale(){
  var missing=C.points.filter(function(p){return p.evidenceStatus==='red';}).length;
  var checks=C.points.filter(function(p){return p.evidenceStatus==='amber';}).length;
  var reason=missing?'missing evidence on '+missing+' pleaded issue'+(missing>1?'s':''):(checks?'amber evidence requiring review':'key evidence already supports defence');
  return 'AI rationale: '+C.disruptionType+' is usually defendable where objective operational records are available. This case is marked '+(C.classification||'PENDING')+' because there is '+reason+', CPR response timing is '+(J.responseWindow||21)+' days, and jurisdiction rules are '+J.name+'.';
}
function similarCases(){
  return ALL_CASES.filter(function(c){return c.ref!==C.ref&&(c.disruptionType===C.disruptionType||c.jurisdiction===C.jurisdiction);}).slice(0,4);
}
function nextCaseTasks(){
  return [
    {icon:'ti-calendar-due',txt:'Confirm CPR acknowledgement / response deadline before evidence work'},
    {icon:'ti-folder-open',txt:'Request key evidence for '+C.disruptionType},
    {icon:'ti-file-pencil',txt:'Preserve AI rationale for drafting and repository learning'}
  ];
}

function parseClaimValue(val){
  var s=String(val||'').trim();
  var numMatch=s.replace(/,/g,'').match(/([\d]+(?:\.\d+)?)/);
  var amount=numMatch?parseFloat(numMatch[1]):0;
  var currency=/€|eur/i.test(s)?'EUR':'GBP';
  return {amount:amount,currency:currency,display:s};
}
function claimToGbp(parsed){return parsed.currency==='EUR'?Math.round(parsed.amount*0.86):parsed.amount;}
function formatGbp(n){return '£'+n.toLocaleString('en-GB');}
function defenceCostForCase(){
  if(C.classification==='ESCALATE')return {low:3500,high:8000,label:'£3,500–£8,000',mid:5750,escalate:true};
  var costs={A:800,B:1500,C:3500};
  var n=costs[C.cat]||costs.A;
  return {low:n,high:n,label:formatGbp(n),mid:n,escalate:false};
}
function hasExtraordinaryEvidence(){
  return (C.points||[]).some(function(p){
    return /extraordinary|circonstances extraordinaires|circunstancias extraordinarias/i.test(p.claim||'')
      &&(p.evidenceStatus==='green'||p.evidenceStatus==='amber');
  });
}
function financialRecommendation(claimGbp,defence){
  if(C.classification==='ESCALATE')return 'Senior review required — high exposure, obtain counsel opinion before proceeding';
  if(claimGbp<defence.mid)return 'Consider commercial settlement — defence cost exceeds claim value';
  if(claimGbp>defence.mid&&hasExtraordinaryEvidence())return 'DEFEND — positive financial case';
  if(claimGbp>defence.mid)return 'Financial case supports defence — confirm extraordinary circumstances evidence before proceeding';
  return 'Review financial position against defence strategy';
}
function renderFinancialCard(){
  if(!C.cat||!C.classification)return '';
  var parsed=parseClaimValue(C.value);
  var claimGbp=claimToGbp(parsed);
  var defence=defenceCostForCase();
  var net=claimGbp-defence.mid;
  var netPos=net>=0;
  var rec=financialRecommendation(claimGbp,defence);
  var claimLabel=parsed.currency==='EUR'?(parsed.display+' ≈ '+formatGbp(claimGbp)):parsed.display;
  return '<div class="fin-card"><div class="fin-header"><div class="fin-title">Financial position — <span class="fin-ref">'+escapeHtml(C.ref)+'</span></div></div><div class="fin-body">'
    +'<table class="fin-table"><tbody>'
    +'<tr><td>Claim value</td><td>'+escapeHtml(claimLabel)+'</td></tr>'
    +'<tr><td>Estimated defence cost</td><td>'+escapeHtml(defence.label)+(defence.escalate?' <span style="font-size:10px;color:var(--text3)">(Cat '+escapeHtml(C.cat)+' complex)</span>':' <span style="font-size:10px;color:var(--text3)">(Cat '+escapeHtml(C.cat)+')</span>')+'</td></tr>'
    +'<tr class="fin-net-row"><td>Net position</td><td class="'+(netPos?'fin-net-pos':'fin-net-neg')+'">'+(netPos?'+':'−')+escapeHtml(formatGbp(Math.abs(net)))+'</td></tr>'
    +'</tbody></table>'
    +'<div class="fin-rec">'+escapeHtml(rec)+'</div></div></div>';
}

function render(){updateUser();renderMain();renderAudit();}
function renderMain(){
  var pts=C.points&&C.points.length?C.points:[{n:1,claim:'Delay compensation under Article 7',evidenceStatus:'amber',evidenceDoc:'Confirm flight data'},{n:2,claim:'Extraordinary circumstances defence',evidenceStatus:'amber',evidenceDoc:'Identify disruption evidence'},{n:3,claim:'Article 9 care / expenses',evidenceStatus:'red',evidenceDoc:'Check passenger care records'}];
  C.points=pts;
  var cls=C.classification||'PENDING';
  var clsClass=cls==='ESCALATE'?'vp-escalate':cls==='DEFEND'?'vp-defend':'vp-missing';
  var ptsHtml='<div class="pt-list">'+pts.map(function(p){var code=p.evidenceStatus==='green'?'g':p.evidenceStatus==='red'?'r':'a';var pv=code==='g'?'pv-d':code==='r'?'pv-e':'pv-m';return '<div class="pt-item"><div class="pt-dot pt-'+code+'"></div><div><div class="pt-label">'+escapeHtml(p.claim)+'</div><div class="pt-detail">'+escapeHtml(p.evidenceDoc||'Pending')+'</div></div><span class="pt-verdict '+pv+'">'+(code==='g'?'Ready':code==='r'?'Missing':'Check')+'</span></div>';}).join('')+'</div>';
  var rationaleBlock='<div style="border:1px solid var(--border);margin-bottom:14px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--surface);user-select:none" onclick="rationaleOpen=!rationaleOpen;renderMain()">'
    +'<div style="font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.07em">AI recommendation rationale</div>'
    +'<i class="ti ti-chevron-down" style="font-size:12px;color:var(--text3);transition:transform .2s;transform:rotate('+(rationaleOpen?'180':'0')+'deg)"></i>'
    +'</div>'
    +(rationaleOpen?'<div style="padding:12px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.7">'+escapeHtml(aiRationale())+'</div>':'')
    +'</div>';
  var emailRow='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);margin-bottom:14px">'
    +'<i class="ti ti-mail" style="font-size:15px;color:var(--text3)"></i>'
    +'<div style="flex:1;min-width:0"><div style="font-size:12px;color:var(--text2)">Coordinate with internal teams via Outlook</div>'
    +'<div style="font-size:11px;color:var(--text3)">Send case details · Operational delay records system request · Ops team brief</div></div>'
    +'<button onclick="sendTriageEmail()" style="font-size:11px;padding:5px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0"><i class="ti ti-send"></i> Email team</button>'
    +'</div>';
  var triageNoteBlock='<div style="margin-bottom:14px">'
    +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:6px">Defence assessment</div>'
    +'<textarea id="triage-note" rows="4" style="width:100%;padding:9px 11px;border:1px solid var(--border);font-family:var(--font);font-size:12px;color:var(--text);line-height:1.6;resize:vertical;background:var(--surface);box-sizing:border-box">'+escapeHtml(C.triageNote||'')+'</textarea>'
    +'<button onclick="saveTriageNote()" style="margin-top:6px;font-size:11px;padding:5px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font)">Save assessment</button>'
    +'</div>';
  document.getElementById('main').innerHTML=stageRail()
    +'<div class="case-hdr"><div><div class="ch-ref">'+escapeHtml(C.ref)+'</div><div class="ch-name">'+escapeHtml(C.name)+' v. [Airline]</div><div class="ch-meta"><span><i class="ti ti-plane"></i>'+escapeHtml(C.flight)+'</span><span><i class="ti ti-cash"></i>'+escapeHtml(C.value)+'</span><span><i class="ti ti-world"></i>'+J.flag+' '+escapeHtml(J.name)+'</span><span><i class="ti ti-calendar"></i>LOC received '+escapeHtml(C.date)+'</span></div></div><span class="ch-badge" style="background:'+stageBg('triage')+';color:'+stageColor('triage')+'"><i class="ti ti-search"></i>Triage</span></div>'
    +(J.important?'<div class="stage-card"><div class="sc-header" style="border-left-color:var(--red)"><div class="sc-label" style="color:var(--red)">Jurisdiction alert</div><div class="sc-title">'+escapeHtml(J.name)+' procedure</div></div><div class="sc-body" style="font-size:12px;line-height:1.6;color:var(--text2)">'+escapeHtml(J.important)+'</div></div>':'')
    +'<div class="ai-block"><div class="ai-body"><div class="verdict-pill '+clsClass+'"><i class="ti '+(cls==='ESCALATE'?'ti-alert-triangle':cls==='DEFEND'?'ti-shield-check':'ti-progress')+'"></i>'+escapeHtml(cls)+'</div></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><button class="chk '+(C.classification==='DEFEND'?'done':'')+'" onclick="setClassification(\'DEFEND\')"><span class="chk-box"><i class="ti ti-check"></i></span><span class="chk-label">Classify as DEFEND</span></button><button class="chk '+(C.classification==='ESCALATE'?'done':'')+'" onclick="setClassification(\'ESCALATE\')"><span class="chk-box"><i class="ti ti-check"></i></span><span class="chk-label">Escalate for senior review</span></button></div>'
    +emailRow
    +ptsHtml
    +(cls==='ESCALATE'?'<div class="esc-note">Escalate because this case includes high-value or weak-evidence issues requiring senior legal review.</div>':'')
    +renderFinancialCard()
    +rationaleBlock
    +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin:16px 0 8px">Confirm before proceeding</div>'
    +'<div class="checklist">'+checkHtml('jurisdiction','Jurisdiction and limitation checked',J.limitationNote)+checkHtml('claim','Claim type and value verified',C.type+' · '+C.value)+checkHtml('points','Points of claim reviewed',pts.length+' pleaded issue'+(pts.length!==1?'s':''))+'</div>'
    +triageNoteBlock
    +'<div class="advance-wrap"><button class="btn-advance" '+(allDone()?'':'disabled')+' onclick="advanceToCPR()"><i class="ti ti-arrow-right"></i> Complete triage and open CPR</button><div class="advance-hint">'+(allDone()?'Ready to continue to CPR deadlines.':'Complete all required checks and choose a classification to continue.')+'</div></div>';
}
function checkHtml(id,label,sub){return '<div class="chk '+(checked[id]?'done':'')+'" onclick="toggleCheck(\''+id+'\')"><span class="chk-box"><i class="ti ti-check"></i></span><span class="chk-label">'+escapeHtml(label)+'</span><span class="chk-tag t-req">Required</span></div><div class="chk-input-wrap" style="font-size:11px;color:var(--text3);padding-top:0">'+escapeHtml(sub)+'</div>';}
function renderAudit(){var el=document.getElementById('audit-scroll');if(!el)return;document.getElementById('audit-count').textContent=audit.length+' entr'+(audit.length===1?'y':'ies');el.innerHTML=audit.length?audit.map(function(a){return '<div class="audit-entry"><div class="a-dot a-'+escapeHtml(a.type)+'"></div><div><div class="a-text">'+escapeHtml(a.t)+'</div><div class="a-time">'+escapeHtml(a.time)+'</div></div></div>';}).join(''):'<div class="audit-entry"><div class="a-dot a-create"></div><div><div class="a-text">Case opened for triage</div><div class="a-time">Now</div></div></div>';}
log('Case activated — '+C.name+' v. [Airline]','create');
log('Claim: '+C.type+' · '+C.value,'create');
render();
</script>
</body>
