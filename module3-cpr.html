<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>261Claims — CPR Deadlines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="shared_data.js"></script>
<script src="_nav.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1628;--blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;--green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;--red:#C0392B;--red-faint:#FCF0EF;--amber:#B45309;--amber-faint:#FEF3C7;--purple:#4338CA;--purple-faint:#EEEDFE;--border:#E2E8F0;--text:#0F172A;--text2:#475569;--text3:#94A3B8;--surface:#fff;--surface2:#F8FAFC;--surface3:#F1F5F9;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:8px;--r2:12px;--r3:16px}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}
.body{flex:1;display:grid;grid-template-columns:1fr 360px;overflow:hidden;gap:0}
.left{overflow-y:auto;padding:20px 24px}
.right{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:18px;font-weight:600;letter-spacing:-0.02em}
.ph-sub{font-size:12px;color:var(--text3);margin-top:2px}
.ph-actions{display:flex;gap:8px}
.btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border:none;transition:all 0.15s}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{opacity:0.9}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:11px}

/* Deadline cards */
.deadline-section{margin-bottom:18px}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.deadline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all 0.15s;border-left:4px solid}
.deadline-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08);transform:translateY(-1px)}
.dc-urgent{border-left-color:var(--red)}
.dc-warn{border-left-color:var(--amber)}
.dc-ok{border-left-color:var(--green-l)}
.dc-icon{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dc-ref{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:2px}
.dc-claimant{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.dc-flight{font-size:11px;color:var(--text2)}
.dc-right{margin-left:auto;text-align:right;flex-shrink:0}
.dc-days{font-size:20px;font-weight:700;line-height:1}
.dc-days-label{font-size:10px;color:var(--text3);margin-top:1px}
.dc-deadline{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.dc-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.loa-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.loa-approved{background:var(--green-faint);color:var(--green)}
.loa-sent{background:var(--amber-faint);color:var(--amber)}
.loa-none{background:var(--surface3);color:var(--text3)}
.stage-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}

/* Calendar */
.cal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cal-title{font-size:13px;font-weight:600}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:26px;height:26px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.cal-nav button:hover{background:var(--surface2)}
.cal-grid{padding:10px 14px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-dates{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-date{min-height:32px;border-radius:var(--r);padding:3px 4px;font-size:11px;color:var(--text2);position:relative;cursor:default}
.cal-date.other-month{color:var(--text3);opacity:0.5}
.cal-date.today{background:var(--navy);color:#fff;font-weight:600}
.cal-date.has-deadline{cursor:pointer}
.cal-date.has-deadline:hover{background:var(--surface2)}
.cal-date-num{font-size:11px;font-weight:500}
.deadline-dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.deadline-dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:1px}
.cal-legend{padding:10px 16px;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3);margin-bottom:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-selected-info{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);font-size:11px}
.csi-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px}
.csi-case{padding:6px 0;border-bottom:1px solid var(--border)}
.csi-case:last-child{border-bottom:none}
.csi-ref{font-family:var(--mono);font-size:10px;color:var(--text3)}
.csi-name{font-size:11px;font-weight:500}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:40px;opacity:0.2;display:block;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
<div id="global-nav-wrap"></div>
<div class="body">
  <div class="left">
    <div class="page-header">
      <div><div class="ph-title" id="ph-title">CPR Deadlines</div><div class="ph-sub" id="ph-sub"></div></div>
      <div class="ph-actions">
        <button class="btn btn-outline btn-sm" onclick="exportICS()"><i class="ti ti-calendar-export"></i> Export to calendar</button>
        <button class="btn btn-outline btn-sm" onclick="openGoogleCal()"><i class="ti ti-brand-google"></i> Google Calendar</button>
      </div>
    </div>
    <div id="deadline-list"></div>
  </div>
  <div class="right">
    <div class="cal-header">
      <div class="cal-title" id="cal-month-title">—</div>
      <div class="cal-nav">
        <button onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
        <button onclick="goToday()" title="Today" style="font-size:9px;font-weight:600;color:var(--text2)">Today</button>
        <button onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-days-header" id="cal-days-header"></div>
      <div class="cal-dates" id="cal-dates"></div>
    </div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Urgent — ≤3 days</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>This week — ≤7 days</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-l)"></div>Upcoming</div>
    </div>
    <div class="cal-selected-info" id="cal-selected-info" style="display:none"></div>
  </div>
</div>
</div>
<script>
var calYear, calMonth, selectedDate = null;

window.addEventListener('DOMContentLoaded', function(){
  renderGlobalNav('cpr');
  var now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  renderPage();
});

function getAllDeadlines(){
  /* Return ALL cases with CPR deadlines — not just current user */
  return STATE.getCases().filter(function(c){ return c.cprDeadlineISO; })
    .sort(function(a,b){ return a.cprDaysLeft - b.cprDaysLeft; });
}

function getMyDeadlines(){
  var uid = STATE.getActiveUser();
  return getAllDeadlines().filter(function(c){ return c.assignedTo === uid; });
}

function renderPage(){
  var uid = STATE.getActiveUser();
  var u = USERS[uid];
  document.getElementById('ph-title').textContent = 'CPR Deadlines — ' + u.full;
  var my = getMyDeadlines();
  var all = getAllDeadlines();
  document.getElementById('ph-sub').textContent = my.length + ' of your cases · ' + all.length + ' total open · click any case to open workspace';
  renderDeadlineList(my, all);
  renderCalendar();
}

function renderDeadlineList(my, all){
  var html = '';

  /* My urgent */
  var myUrgent = my.filter(function(c){return c.cprDaysLeft<=7;});
  var myComing = my.filter(function(c){return c.cprDaysLeft>7;});
  var teamOnly = all.filter(function(c){return c.assignedTo!==STATE.getActiveUser() && c.cprDaysLeft<=7;});

  if(myUrgent.length){
    html += '<div class="deadline-section"><div class="section-label"><i class="ti ti-alarm" style="font-size:11px;color:var(--red)"></i>Your urgent deadlines</div>';
    html += myUrgent.map(function(c){ return deadlineCard(c); }).join('');
    html += '</div>';
  }

  if(myComing.length){
    html += '<div class="deadline-section"><div class="section-label"><i class="ti ti-calendar" style="font-size:11px;color:var(--amber)"></i>Your upcoming deadlines</div>';
    html += myComing.map(function(c){ return deadlineCard(c); }).join('');
    html += '</div>';
  }

  if(teamOnly.length){
    html += '<div class="deadline-section"><div class="section-label"><i class="ti ti-users" style="font-size:11px;color:var(--text3)"></i>Team urgent deadlines</div>';
    html += teamOnly.map(function(c){ return deadlineCard(c, true); }).join('');
    html += '</div>';
  }

  if(!my.length && !teamOnly.length){
    html = '<div class="empty-state"><i class="ti ti-calendar-check"></i><p>No CPR deadlines on file. Cases move here once LOA is sent and CPR clock is started.</p></div>';
  }

  document.getElementById('deadline-list').innerHTML = html;
}

function deadlineCard(c, isTeam){
  var urg = daysUrgency(c.cprDaysLeft);
  var iconBg = urg==='urgent'?'#FCF0EF':urg==='warn'?'#FEF3C7':'#E6F5EE';
  var iconCol = urg==='urgent'?'var(--red)':urg==='warn'?'var(--amber)':'var(--green)';
  var loaCls = c.loaStatus==='approved'?'loa-approved':c.loaStatus==='sent'?'loa-sent':'loa-none';
  var loaLabel = c.loaStatus==='approved'?'LOA Approved':c.loaStatus==='sent'?'LOA Sent':'LOA Pending';
  var sc = stageColor(c.stage); var sb = stageBg(c.stage);
  var assignee = USERS[c.assignedTo];

  /* Format the CPR deadline date */
  var deadlineStr = '—';
  if(c.cprDeadlineISO){
    var d = new Date(c.cprDeadlineISO);
    var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    deadlineStr = d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
  }

  return '<div class="deadline-card dc-'+urg+'" onclick="openCase(\''+c.ref+'\')">'
    +'<div class="dc-icon" style="background:'+iconBg+';color:'+iconCol+'"><i class="ti ti-calendar-due"></i></div>'
    +'<div style="flex:1;min-width:0">'
    +'<div class="dc-ref">'+c.ref+(isTeam?' · Assigned to '+(assignee?assignee.name:'?'):'')+'</div>'
    +'<div class="dc-claimant">'+c.claimant+' <span class="stage-badge" style="background:'+sb+';color:'+sc+'">'+stageLabel(c.stage)+'</span></div>'
    +'<div class="dc-flight">'+c.flightNum+' · '+c.dep+' → '+c.arr+' · '+c.airline+' · '+c.value+'</div>'
    +'<div class="dc-actions"><span class="loa-badge '+loaCls+'">'+loaLabel+'</span>'
    +(c.triageNote?'<span style="font-size:10px;color:var(--text3);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block">'+c.triageNote.substring(0,80)+'…</span>':'')
    +'</div>'
    +'</div>'
    +'<div class="dc-right">'
    +'<div class="dc-days" style="color:'+iconCol+'">'+c.cprDaysLeft+'</div>'
    +'<div class="dc-days-label">days left</div>'
    +'<div class="dc-deadline">Due '+deadlineStr+'</div>'
    +'</div>'
    +'</div>';
}

function openCase(ref){
  var c = STATE.getCase(ref);
  if(!c) return;
  window.location.href = 'module3-cpr-workspace.html?ref='+encodeURIComponent(ref);
}

/* ── Calendar ── */
var DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar(){
  document.getElementById('cal-month-title').textContent = MONTH_NAMES[calMonth] + ' ' + calYear;
  document.getElementById('cal-days-header').innerHTML = DAY_NAMES.map(function(d){
    return '<div class="cal-day-name">'+d+'</div>';
  }).join('');

  /* Build deadline map: ISO date → [cases] */
  var deadlineMap = {};
  getAllDeadlines().forEach(function(c){
    if(!c.cprDeadlineISO) return;
    var k = c.cprDeadlineISO.substring(0,10);
    if(!deadlineMap[k]) deadlineMap[k] = [];
    deadlineMap[k].push(c);
  });

  var today = new Date();
  var todayStr = today.toISOString().substring(0,10);

  /* First day of month — adjust to Mon=0 */
  var firstDay = new Date(calYear, calMonth, 1).getDay();
  firstDay = firstDay===0?6:firstDay-1; /* Mon=0 */
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  var cells = [];
  /* Prev month padding */
  for(var i=firstDay-1;i>=0;i--) cells.push({day:daysInPrev-i,month:calMonth-1,year:calYear,other:true});
  /* Current month */
  for(var d=1;d<=daysInMonth;d++){
    var m=calMonth,y=calYear;
    var iso=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({day:d,month:m,year:y,other:false,iso:iso,cases:deadlineMap[iso]||[],isToday:iso===todayStr});
  }
  /* Next month padding */
  var rem = cells.length%7===0?0:7-cells.length%7;
  for(var n=1;n<=rem;n++) cells.push({day:n,month:calMonth+1,year:calYear,other:true});

  document.getElementById('cal-dates').innerHTML = cells.map(function(cell){
    var cls = 'cal-date'+(cell.other?' other-month':'')+(cell.isToday?' today':'')+(cell.cases&&cell.cases.length?' has-deadline':'');
    var dots = '';
    if(cell.cases && cell.cases.length){
      dots = '<div class="deadline-dots">'+cell.cases.slice(0,3).map(function(c){
        var urg=daysUrgency(c.cprDaysLeft);
        var col=urg==='urgent'?'var(--red)':urg==='warn'?'var(--amber)':'var(--green-l)';
        return '<div class="deadline-dot" style="background:'+col+'"></div>';
      }).join('')+'</div>';
    }
    var onclick = (cell.cases&&cell.cases.length&&!cell.other) ? 'onclick="selectCalDate(\''+cell.iso+'\')" ' : '';
    return '<div class="'+cls+'" '+onclick+'><div class="cal-date-num">'+cell.day+'</div>'+dots+'</div>';
  }).join('');
}

function selectCalDate(iso){
  selectedDate = iso;
  var deadlineMap = {};
  getAllDeadlines().forEach(function(c){
    if(!c.cprDeadlineISO) return;
    var k = c.cprDeadlineISO.substring(0,10);
    if(!deadlineMap[k]) deadlineMap[k]=[];
    deadlineMap[k].push(c);
  });
  var cases = deadlineMap[iso]||[];
  var el = document.getElementById('cal-selected-info');
  if(!cases.length){ el.style.display='none'; return; }
  var d=new Date(iso);
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  el.style.display='block';
  el.innerHTML = '<div class="csi-title">'+d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear()+' — '+cases.length+' deadline'+(cases.length>1?'s':'')+'</div>'
    +cases.map(function(c){
      var sc=stageColor(c.stage);var sb=stageBg(c.stage);
      return '<div class="csi-case" style="cursor:pointer" onclick="openCase(\''+c.ref+'\')">'
        +'<div class="csi-ref">'+c.ref+' · '+(USERS[c.assignedTo]?USERS[c.assignedTo].name:'?')+'</div>'
        +'<div class="csi-name">'+c.claimant+' — '+c.airline+'</div>'
        +'<div style="margin-top:3px"><span style="font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px;background:'+sb+';color:'+sc+'">'+stageLabel(c.stage)+'</span></div>'
        +'</div>';
    }).join('');
}

function prevMonth(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function goToday(){ var n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();renderCalendar(); }

/* ICS export */
function exportICS(){
  var cases = getAllDeadlines();
  if(!cases.length){ alert('No deadlines to export.'); return; }
  var ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//261Claims//EN\r\nCALSCALE:GREGORIAN\r\n';
  cases.forEach(function(c){
    if(!c.cprDeadlineISO) return;
    var d=new Date(c.cprDeadlineISO);
    function fmt(dt){return dt.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';}
    ics+='BEGIN:VEVENT\r\n';
    ics+='UID:'+c.ref+'@261claims\r\n';
    ics+='DTSTART;VALUE=DATE:'+c.cprDeadlineISO.replace(/-/g,'')+'\r\n';
    ics+='SUMMARY:CPR Deadline — '+c.ref+' '+c.claimant+'\r\n';
    ics+='DESCRIPTION:'+c.claimant+' v '+c.airline+' | '+c.flightNum+' | '+c.value+'\r\n';
    ics+='END:VEVENT\r\n';
  });
  ics+='END:VCALENDAR';
  var a=document.createElement('a');
  a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
  a.download='261Claims-CPR-Deadlines.ics';
  a.click();
}

function openGoogleCal(){
  var cases=getMyDeadlines();
  if(!cases.length){alert('No deadlines to add.');return;}
  var c=cases[0];
  if(!c.cprDeadlineISO){alert('No deadline date on first case.');return;}
  var d=new Date(c.cprDeadlineISO);
  function fmt(dt){return dt.toISOString().replace(/[-:T]/g,'').split('.')[0]+'Z';}
  var url='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('CPR Deadline — '+c.ref+' '+c.claimant)+'&dates='+fmt(d)+'/'+fmt(new Date(d.getTime()+86400000))+'&details='+encodeURIComponent(c.claimant+' v '+c.airline+' | '+c.flightNum);
  window.open(url,'_blank');
}

function render(){ renderPage(); }
</script>
</body>
</html>
