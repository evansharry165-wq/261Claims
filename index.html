<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;--navy3:#1C2E44;
  --blue:#2A6FDB;--blue-l:#3D84F5;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;height:100vh}

/* ── Left nav ── */
.nav{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;padding:0;overflow:hidden}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:9px}
.nav-mark{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.nav-name{font-size:14px;font-weight:500;color:#fff;letter-spacing:-0.01em}
.nav-tag{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
.nav-section{padding:14px 12px 4px;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);transition:all 0.15s;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.9)}
.nav-item.active{background:rgba(42,111,219,0.3);color:#fff}
.nav-item i{font-size:15px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;font-weight:500;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px}
.nav-badge.amber{background:var(--amber)}
.nav-badge.blue{background:var(--blue)}
.nav-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,0.07)}
.nav-user{display:flex;align-items:center;gap:9px;padding:6px 4px}
.nav-av{width:28px;height:28px;border-radius:50%;background:var(--navy3);border:1.5px solid rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.nav-user-name{font-size:12px;font-weight:500;color:#fff}
.nav-user-role{font-size:10px;color:rgba(255,255,255,0.35)}

/* ── Main ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:500;color:var(--text)}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-new{font-size:12px;font-weight:500;padding:7px 14px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-new:hover{background:var(--navy2)}

.content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Deadline strip ── */
.deadline-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:11px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;overflow-x:auto}
.ds-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);white-space:nowrap;margin-right:4px}
.dl-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r);font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;transition:opacity 0.15s;text-decoration:none}
.dl-chip:hover{opacity:0.85}
.dl-urgent{background:var(--red-faint);color:var(--red);border:1px solid #FECACA}
.dl-warn{background:var(--amber-faint);color:var(--amber);border:1px solid #FDE68A}
.dl-ok{background:var(--green-faint);color:var(--green);border:1px solid #BBF7D0}
.dl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dl-dot-r{background:var(--red)}
.dl-dot-a{background:var(--amber)}
.dl-dot-g{background:var(--green-l)}

/* ── Grid ── */
.grid-top{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid-main{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.grid-bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── Stat cards ── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.stat-label i{font-size:12px}
.stat-val{font-size:26px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.stat-sub{font-size:11px;color:var(--text3)}
.stat-sub.up{color:var(--green)}
.stat-sub.warn{color:var(--amber)}

/* ── Panel card ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px}
.panel-title i{font-size:14px}
.panel-action{font-size:11px;color:var(--blue-text);text-decoration:none;cursor:pointer}
.panel-action:hover{text-decoration:underline}
.panel-body{padding:14px 16px}

/* ── Live cases ── */
.case-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;text-decoration:none}
.case-item:last-child{border-bottom:none}
.case-item:hover .case-name{color:var(--blue-text)}
.ci-stage{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.case-ref{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:1px}
.case-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px;transition:color 0.15s}
.case-meta{font-size:10px;color:var(--text3)}
.case-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.stage-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.sp-intake{background:var(--blue-faint);color:var(--blue-text)}
.sp-triage{background:var(--amber-faint);color:var(--amber)}
.sp-evidence{background:var(--purple-faint);color:var(--purple)}
.sp-defence{background:var(--green-faint);color:var(--green)}
.sp-resolve{background:var(--surface3);color:var(--text3)}
.dl-tag{font-size:10px;font-weight:500}
.dl-tag.urgent{color:var(--red)}
.dl-tag.warn{color:var(--amber)}
.dl-tag.ok{color:var(--green)}

/* ── Repository ── */
.repo-tabs{display:flex;gap:2px;background:var(--surface3);border-radius:var(--r);padding:2px;margin-bottom:12px}
.repo-tab{font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;color:var(--text2);transition:all 0.15s;border:none;background:none;font-family:var(--font)}
.repo-tab.on{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
.repo-section{margin-bottom:10px}
.repo-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.repo-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:5px;cursor:pointer;transition:all 0.15s;text-decoration:none}
.repo-item:hover{border-color:var(--border2);background:var(--surface2)}
.repo-icon{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.repo-name{font-size:11px;font-weight:500;color:var(--text);flex:1}
.repo-meta{font-size:10px;color:var(--text3)}
.repo-val{font-size:11px;font-weight:500;font-family:var(--mono)}

/* ── Activity ── */
.act-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.act-text{font-size:11px;color:var(--text);line-height:1.4;flex:1}
.act-time{font-size:10px;color:var(--text3);margin-top:2px}

/* ── Modules grid ── */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mod-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);text-decoration:none;transition:all 0.15s}
.mod-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.mod-card.soon{opacity:0.45;pointer-events:none}
.mod-card-icon{width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.mod-card-name{font-size:11px;font-weight:500;color:var(--text)}
.mod-card-sub{font-size:10px;color:var(--text3);margin-top:1px}
.mod-card-status{margin-left:auto;font-size:9px;font-weight:500;padding:1px 6px;border-radius:20px}
.ms-live{background:var(--green-faint);color:var(--green)}
.ms-soon{background:var(--surface3);color:var(--text3)}

/* ── Network panels ── */
.net-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.net-link{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r2);text-decoration:none;transition:all 0.15s;cursor:pointer}
.net-link:hover{border-color:var(--border2);background:var(--surface2)}
.net-link-icon{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.net-link-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px}
.net-link-sub{font-size:10px;color:var(--text3)}
.net-link-arrow{margin-left:auto;font-size:14px;color:var(--text3)}
.news-item{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.news-item:last-child{border-bottom:none}
.news-item:hover .news-title{color:var(--blue-text)}
.news-source{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.news-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;transition:color 0.15s}
.news-date{font-size:10px;color:var(--text3)}
.news-tag{font-size:9px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--blue-faint);color:var(--blue-text);margin-left:5px}

/* ── View panels (page switching) ── */
.view{display:none}
.view.active{display:block}

/* ── Repo full page ── */
.repo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.repo-search{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);width:220px}
.repo-search:focus{outline:none;border-color:var(--blue)}
.repo-cat{margin-bottom:16px}
.repo-cat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px}
.repo-cat-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px}
.repo-cat-title{font-size:13px;font-weight:500;color:var(--text)}
.repo-cat-count{font-size:11px;color:var(--text3);margin-left:auto}
.repo-full-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;background:var(--surface);cursor:pointer;transition:all 0.15s;text-decoration:none}
.repo-full-item:hover{border-color:var(--border2);box-shadow:0 2px 6px rgba(0,0,0,0.04)}
.rfi-ref{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:1px}
.rfi-name{font-size:12px;font-weight:500;color:var(--text)}
.rfi-meta{font-size:11px;color:var(--text2);margin-top:1px}
.rfi-right{margin-left:auto;text-align:right}
.rfi-val{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text)}
.rfi-outcome{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;margin-top:3px;display:inline-block}
.out-defended{background:var(--green-faint);color:var(--green)}
.out-settled{background:var(--amber-faint);color:var(--amber)}
</style>
</head>

<script>
/* ── Data ── */
const CASES = [
  {ref:'AC-2026-0089',name:'Hartley v. TestAirways',type:'EC 261 — diversion',flight:'HC 1184 LTN-BCN',value:'£39,000+',stage:'evidence',assigned:'S. Booth',daysLeft:3,cat:'C'},
  {ref:'AC-2026-0091',name:'Walsh v. TestAirways',type:'EC 261 — ATC delay',flight:'HC 307 MAN-AMS',value:'€250',stage:'triage',assigned:'J. Patel',daysLeft:8,cat:'A'},

  {ref:'AC-2026-0079',name:'Singh v. TestAirways',type:'EC 261 — ATC delay',flight:'HC 556 LHR-DUB',value:'€250',stage:'triage',assigned:'A. Lewis',daysLeft:18,cat:'A'},
  {ref:'AC-2026-0076',name:'Taylor v. TestAirways',type:'EC 261 — weather',flight:'HC 330 LGW-ALC',value:'€400',stage:'defence',assigned:'K. Rahman',daysLeft:7,cat:'B'},
  {ref:'AC-2026-0071',name:'Patel v. TestAirways',type:'EC 261 — strike',flight:'HC 118 LTN-AGP',value:'€250',stage:'resolve',assigned:'S. Booth',daysLeft:22,cat:'A'},
];

const REPO = {
  defended:[
    {ref:'AC-2025-0044',name:'Williams v. TestAirways',flight:'HC 201 MAN-AMS',type:'ATC restriction',value:'€250',date:'Mar 2026',cat:'A',outcome:'defended'},
    {ref:'AC-2025-0038',name:'Brown v. TestAirways',flight:'HC 556 LHR-BCN',type:'Weather',value:'€400',date:'Feb 2026',cat:'B',outcome:'defended'},
    {ref:'AC-2025-0031',name:'Davies v. TestAirways',flight:'HC 789 LGW-PMI',type:'ATC restriction',value:'€250',date:'Jan 2026',cat:'A',outcome:'defended'},

    {ref:'AC-2025-0041',name:'Jackson v. TestAirways',flight:'HC 667 LGW-BCN',type:'Weather',value:'€400',date:'Mar 2026',cat:'B',outcome:'settled'},
    {ref:'AC-2025-0035',name:'White v. TestAirways',flight:'HC 223 LTN-PMI',type:'Crew hours',value:'£8,200',date:'Feb 2026',cat:'C',outcome:'settled'},
  ]
};

const ACTIVITY = [
  {text:'Evidence uploaded: METAR/SIGMET — Hartley v. TestAirways',time:'Today, 09:14',dot:'#8B5CF6'},
  {text:'AI triage complete — Walsh v. TestAirways · Verdict: Defendable',time:'Today, 08:52',dot:'var(--blue)'},
  {text:'CPR deadline exported to calendar — Chen v. TestAirways',time:'Yesterday, 17:31',dot:'var(--amber)'},
  {text:'LOA approved by J. Patel — Morrison v. TestAirways',time:'Yesterday, 15:08',dot:'var(--green-l)'},
  {text:'Case activated from intake — AC-2026-0094',time:'Yesterday, 14:40',dot:'var(--green-l)'},
];

const NEWS = [
  {source:'CJEU',title:'Flightright GmbH v Iberia: Technical faults and extraordinary circumstances — new guidance on hidden defects',date:'22 May 2026',tag:'Case law'},
  {source:'CAA',title:'UK261 enforcement update: CAA increases scrutiny of extraordinary circumstances evidence standards',date:'18 May 2026',tag:'Regulatory'},

  {source:'DfT',title:'Post-Brexit UK261 review: Government consultation on compensation thresholds closes 30 June 2026',date:'1 May 2026',tag:'Policy'},
];

const STAGE_STYLE = {

  triage:  {cls:'sp-triage',  icon:'ti-search',        bg:'#FEF3C7',col:'#92400E'},
  evidence:{cls:'sp-evidence', icon:'ti-folder',        bg:'#EEEDFE',col:'#4338CA'},
  defence: {cls:'sp-defence',  icon:'ti-shield',        bg:'#E6F5EE',col:'#065F46'},
  resolve: {cls:'sp-resolve',  icon:'ti-circle-check',  bg:'#F1F5F9',col:'#374151'},
};

function dlStyle(days){return days<=3?'urgent':days<=7?'warn':'ok';}
function dlText(days){return days<=3?days+'d':days<=7?days+'d':days+'d';}
let repoTab='defended';
let currentView='dashboard';

/* ── View switching ── */
function showView(v){
  currentView=v;
  const titles={dashboard:'Good morning, Sarah.',cases:'Live cases',repo:'Repository',network:'Network & news'};
  const subs={
    dashboard:'Friday 30 May 2026 · 8 open cases · 2 deadlines this week',
    cases:'All active cases · sorted by deadline urgency',
    repo:'Closed cases — defended and settled',
    network:'Disruption intelligence & legal news'
  };
  document.getElementById('tb-title').textContent=titles[v];
  document.getElementById('tb-sub').textContent=subs[v];
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{
    if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+v+"'")) el.classList.add('active');
  });
  renderContent();
}

/* ── Render ── */
function renderContent(){
  const el=document.getElementById('content');
  if(currentView==='dashboard') el.innerHTML=renderDashboard();
  else if(currentView==='cases') el.innerHTML=renderCases();
  else if(currentView==='repo') el.innerHTML=renderRepo();
  else if(currentView==='network') el.innerHTML=renderNetwork();
}

/* ── Dashboard ── */
function renderDashboard(){
  const urgent=CASES.filter(c=>c.daysLeft<=3);
  const warn=CASES.filter(c=>c.daysLeft>3&&c.daysLeft<=7);

  const strip='<div class="deadline-strip">'
    +'<div class="ds-label"><i class="ti ti-alarm" style="font-size:12px"></i>Deadlines</div>'
    +urgent.map(c=>`<div class="dl-chip dl-urgent" onclick="showView('cases')"><div class="dl-dot dl-dot-r"></div>${c.ref} — ${c.daysLeft}d</div>`).join('')
    +warn.map(c=>`<div class="dl-chip dl-warn" onclick="showView('cases')"><div class="dl-dot dl-dot-a"></div>${c.ref} — ${c.daysLeft}d</div>`).join('')
    +(urgent.length===0&&warn.length===0?'<div style="font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px"><i class="ti ti-circle-check" style="font-size:13px"></i>No urgent deadlines this week</div>':'')
    +'</div>';

  const myCase=CASES.filter(c=>c.assigned==='S. Booth');

  const stats='<div class="grid-top">'
    +statCard('Open cases','8','ti-briefcase','var(--text3)','4 assigned to you',false)
    +statCard('CPR due this week','2','ti-calendar-due','var(--red)','Hartley · Chen','warn')
    +statCard('Defended YTD','5','ti-shield','var(--green)','£0 paid out','up')
    +statCard('Settled YTD','3','ti-scale','var(--text3)','Avg £4,900',false)
    +'</div>';

  const liveCases='<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-briefcase" style="color:var(--blue)"></i>Live cases</div><a class="panel-action" onclick="showView(\'cases\')">View all</a></div>'
    +'<div class="panel-body" style="padding:0 16px">'
    +CASES.slice(0,5).map(c=>caseRow(c)).join('')
    +'</div></div>';

  const activity='<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-activity" style="color:var(--text3)"></i>Recent activity</div></div>'
    +'<div class="panel-body" style="padding:0 16px">'
    +ACTIVITY.map(a=>`<div class="act-item"><div class="act-dot" style="background:${a.dot}"></div><div><div class="act-text">${a.text}</div><div class="act-time">${a.time}</div></div></div>`).join('')
    +'</div></div>';

  const modules='<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-layout-grid" style="color:var(--text3)"></i>Modules</div></div>'
    +'<div class="panel-body"><div class="mod-grid">'
    +modCard('module1-intake.html','ti-file-upload','#EFF6FF','#1D4ED8','Intake','Upload & read LOC',true)
    +modCard('module2-case-management.html','ti-layout-kanban','#F1F5F9','#374151','Case management','Triage & workflow',true)
    +modCard('module3-cpr.html','ti-calendar-due','#FEF3C7','#92400E','CPR deadlines','Deadline tracking',true)
    +modCard('module4-evidence.html','ti-folder-open','#EEEDFE','#4338CA','Evidence','Evidence packs',true)
    +modCard('module5-drafting.html','ti-file-pencil','#E6F5EE','#065F46','Drafting','Document drafting',true)
    +modCard('module6-mi.html','ti-chart-bar','#0B1628','#fff','MI reporting','Portfolio analytics',true)
    +'</div></div></div>';

  const news='<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-news" style="color:var(--text3)"></i>Legal news</div><a class="panel-action" onclick="showView(\'network\')">Network & news</a></div>'
    +'<div class="panel-body" style="padding:0 16px">'
    +NEWS.slice(0,3).map(n=>`<div class="news-item"><div class="news-source">${n.source}<span class="news-tag">${n.tag}</span></div><div class="news-title">${n.title}</div><div class="news-date">${n.date}</div></div>`).join('')
    +'</div></div>';

  return strip+stats
    +'<div class="grid-main">'+liveCases+activity+'</div>'
    +'<div class="grid-bottom">'+modules+news+'</div>';
}

function statCard(label,val,icon,iconCol,sub,subType){
  return `<div class="stat-card"><div class="stat-label" style="color:${iconCol}"><i class="ti ${icon}"></i>${label}</div><div class="stat-val">${val}</div><div class="stat-sub ${subType||''}">${sub}</div></div>`;
}

function caseRow(c){
  const s=STAGE_STYLE[c.stage];
  const dl=dlStyle(c.daysLeft);
  return `<a class="case-item" href="module2-case-management.html">
    <div class="ci-stage" style="background:${s.bg}"><i class="ti ${s.icon}" style="color:${s.col};font-size:12px"></i></div>
    <div style="flex:1;min-width:0">
      <div class="case-ref">${c.ref}</div>
      <div class="case-name">${c.name}</div>
      <div class="case-meta">${c.flight} · ${c.value}</div>
    </div>
    <div class="case-right">
      <span class="stage-pill ${s.cls}">${c.stage.charAt(0).toUpperCase()+c.stage.slice(1)}</span>
      <span class="dl-tag ${dl}">${c.daysLeft}d deadline</span>
    </div>
  </a>`;
}

function modCard(href,icon,bg,col,name,sub,live){
  return `<a href="${href}" class="mod-card${live?'':' soon'}">
    <div class="mod-card-icon" style="background:${bg}"><i class="ti ${icon}" style="color:${col}"></i></div>
    <div><div class="mod-card-name">${name}</div><div class="mod-card-sub">${sub}</div></div>
    <span class="mod-card-status ${live?'ms-live':'ms-soon'}">${live?'Live':'Soon'}</span>
  </a>`;
}

/* ── Cases view ── */
function renderCases(){
  const sorted=[...CASES].sort((a,b)=>a.daysLeft-b.daysLeft);
  return '<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-briefcase" style="color:var(--blue)"></i>All live cases — sorted by deadline</div></div>'
    +'<div class="panel-body" style="padding:0 16px">'
    +sorted.map(c=>caseRow(c)).join('')
    +'</div></div>';
}

/* ── Repository view ── */
function renderRepo(){
  const tabs='<div class="repo-tabs">'
    +`<button class="repo-tab${repoTab==='defended'?' on':''}" onclick="repoTab='defended';renderContent()">Defended cases (${REPO.defended.length})</button>`
    +`<button class="repo-tab${repoTab==='settled'?' on':''}" onclick="repoTab='settled';renderContent()">Settled cases (${REPO.settled.length})</button>`
    +'</div>';

  const items=REPO[repoTab];

  if(repoTab==='defended'){
    const cats=['A','B','C'];
    const catLabels={A:'Category A — up to 1,500km · €250',B:'Category B — 1,500–3,500km · €400',C:'Category C / complex claims'};
    const catIcons={A:'#EFF6FF:#1D4ED8',B:'#FEF3C7:#92400E',C:'#FCF0EF:#C0392B'};
    return tabs+cats.map(cat=>{
      const catItems=items.filter(i=>i.cat===cat);
      if(!catItems.length) return '';
      const [bg,col]=catIcons[cat].split(':');
      return `<div class="repo-cat">
        <div class="repo-cat-header">
          <div class="repo-cat-icon" style="background:${bg}"><i class="ti ti-shield" style="color:${col};font-size:12px"></i></div>
          <div class="repo-cat-title">${catLabels[cat]}</div>
          <div class="repo-cat-count">${catItems.length} case${catItems.length>1?'s':''}</div>
        </div>
        ${catItems.map(i=>repoItem(i)).join('')}
      </div>`;
    }).join('');
  }

  return tabs+items.map(i=>repoItem(i)).join('');
}

function repoItem(i){
  return `<div class="repo-full-item">
    <div style="flex:1;min-width:0">
      <div class="rfi-ref">${i.ref}</div>
      <div class="rfi-name">${i.name}</div>
      <div class="rfi-meta">${i.flight} · ${i.type}</div>
    </div>
    <div class="rfi-right">
      <div class="rfi-val">${i.value}</div>
      <div class="rfi-outcome ${i.outcome==='defended'?'out-defended':'out-settled'}">${i.outcome.charAt(0).toUpperCase()+i.outcome.slice(1)}</div>
    </div>
  </div>`;
}

/* ── Network view ── */
function renderNetwork(){
  const links='<div class="net-grid">'
    +netLink('https://www.public.nm.eurocontrol.int/PUBPORTAL/gateway/spec/','ti-radar','#EFF6FF','#1D4ED8','Eurocontrol NOP','ATFM restrictions & network data')
    +netLink('https://www.flightradar24.com','ti-plane','#F1F5F9','#374151','Flightradar24','Live flight tracking')
    +netLink('https://notams.aim.faa.gov/notamSearch/disclaimer.html','ti-file-alert','#FEF3C7','#92400E','NOTAM Search','Published aerodrome notices')
    +netLink('https://www.ogimet.com','ti-cloud-storm','#EEEDFE','#4338CA','Ogimet','METAR & TAF weather reports')
    +netLink('https://www.metoffice.gov.uk','ti-cloud','#E6F5EE','#065F46','Met Office','Daily impact hazard forecasts')
    +netLink('https://www.lightningmaps.org/blitzortung/europe/index.php?lang=en','ti-bolt','#FEF3C7','#B45309','Lightning Maps','Live lightning strike data')
    +'</div>';

  const newsAll='<div class="panel">'
    +'<div class="panel-header"><div class="panel-title"><i class="ti ti-news" style="color:var(--text3)"></i>Legal & regulatory news</div></div>'
    +'<div class="panel-body" style="padding:0 16px">'
    +NEWS.map(n=>`<div class="news-item"><div class="news-source">${n.source}<span class="news-tag">${n.tag}</span></div><div class="news-title">${n.title}</div><div class="news-date">${n.date}</div></div>`).join('')
    +'</div></div>';

  return `<div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px">Disruption intelligence — live sources</div>
    ${links}
  </div>
  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px">Legal & regulatory intelligence</div>
  ${newsAll}`;
}

function netLink(href,icon,bg,col,name,sub){
  return `<a href="${href}" target="_blank" rel="noopener" class="net-link">
    <div class="net-link-icon" style="background:${bg}"><i class="ti ${icon}" style="color:${col}"></i></div>
    <div><div class="net-link-name">${name}</div><div class="net-link-sub">${sub}</div></div>
    <i class="ti ti-external-link net-link-arrow"></i>
  </a>`;
}

/* ── Init ── */
renderContent();
</script>
</body>
</html>
