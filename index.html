<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>261Claims — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="shared_data.js">  renderGlobalNav('dashboard');
</script>
<script src="_nav.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;--navy3:#1C2E44;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}

/* ── Global nav ── */
.global-nav{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07)}
.gn-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:20px;flex-shrink:0}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
.gn-name{font-size:14px;font-weight:500;color:#fff;letter-spacing:-0.01em}
.gn-links{display:flex;align-items:center;gap:2px;flex:1}
.gn-link{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);font-size:12px;font-weight:500;color:rgba(255,255,255,0.5);text-decoration:none;transition:all 0.15s;white-space:nowrap}
.gn-link:hover{background:rgba(255,255,255,0.08);color:#fff}
.gn-link.active{background:rgba(42,111,219,0.35);color:#fff}
.gn-link i{font-size:13px}
.gn-right{display:flex;align-items:center;gap:8px;margin-left:8px}
.gn-user-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer;transition:all 0.15s}
.gn-user-btn:hover{background:rgba(255,255,255,0.12)}
.gn-av{width:24px;height:24px;border-radius:50%;background:var(--navy3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.gn-user{font-size:11px;font-weight:500;color:rgba(255,255,255,0.8)}

/* ── Layout ── */
.page{height:calc(100vh - 48px);overflow-y:auto;padding:20px 24px}

/* ── Page header ── */
.page-header{margin-bottom:20px}
.greeting{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-0.02em;margin-bottom:2px}
.greeting-sub{font-size:12px;color:var(--text3)}

/* ── Urgent strip ── */
.urgent-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;min-height:40px}
.us-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);white-space:nowrap;margin-right:4px;display:flex;align-items:center;gap:4px}
.us-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:500;cursor:pointer;text-decoration:none;transition:opacity 0.15s;white-space:nowrap}
.us-chip:hover{opacity:0.8}
.chip-urgent{background:var(--red-faint);color:var(--red);border:1px solid #FECACA}
.chip-warn{background:var(--amber-faint);color:var(--amber);border:1px solid #FDE68A}
.chip-ok{background:var(--green-faint);color:var(--green);border:1px solid #BBF7D0}
.us-clear{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}

/* ── Grid layouts ── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.grid-news{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── Personal stat cards ── */
.pstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;display:flex;flex-direction:column;gap:4px}
.pstat-top{display:flex;align-items:center;justify-content:space-between}
.pstat-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3)}
.pstat-icon{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:12px}
.pstat-val{font-size:24px;font-weight:500;color:var(--text);line-height:1}
.pstat-sub{font-size:11px;color:var(--text3)}
.pstat-sub.warn{color:var(--amber)}
.pstat-sub.urgent{color:var(--red)}
.pstat-sub.good{color:var(--green)}

/* ── Pipeline strip ── */
.pipeline{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:0}
.pipe-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-right:16px;white-space:nowrap}
.pipe-stage{display:flex;flex-direction:column;align-items:center;flex:1;padding:0 8px;position:relative;cursor:pointer;text-decoration:none;transition:opacity 0.15s}
.pipe-stage:hover{opacity:0.8}
.pipe-stage:not(:last-child)::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:24px;background:var(--border)}
.pipe-count{font-size:20px;font-weight:500;line-height:1;margin-bottom:2px}
.pipe-name{font-size:10px;color:var(--text3);font-weight:500}
.pipe-zero{color:var(--border2)}

/* ── My cases panel ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden}
.panel-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:7px}
.panel-title i{font-size:14px}
.panel-link{font-size:11px;color:var(--blue-text);text-decoration:none;display:flex;align-items:center;gap:3px}
.panel-link:hover{text-decoration:underline}

/* ── Case rows ── */
.case-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);text-decoration:none;transition:background 0.15s;cursor:pointer}
.case-row:last-child{border-bottom:none}
.case-row:hover{background:var(--surface2)}
.cr-stage-icon{width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cr-ref{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:1px}
.cr-name{font-size:12px;font-weight:500;color:var(--text)}
.cr-meta{font-size:11px;color:var(--text3);margin-top:1px}
.cr-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.stage-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.days-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.dp-urgent{background:var(--red-faint);color:var(--red)}
.dp-warn{background:var(--amber-faint);color:var(--amber)}
.dp-ok{background:var(--green-faint);color:var(--green)}

/* ── Evidence progress ── */
.ev-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.ev-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.ev-meta{font-size:11px;color:var(--text3)}
.ev-bar-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
.ev-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.ev-fill{height:100%;border-radius:3px}
.ev-pct{font-size:11px;font-weight:500;white-space:nowrap}

/* ── Deadlines list ── */
.dl-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px}
.dl-row:last-child{border-bottom:none}
.dl-ref{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;width:110px}
.dl-name{font-weight:500;color:var(--text);flex:1}
.dl-type{font-size:11px;color:var(--text2)}

/* ── News ── */
.news-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:var(--surface2)}
.news-source{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.news-tag{font-size:9px;font-weight:500;padding:1px 6px;border-radius:20px;background:var(--blue-faint);color:var(--blue-text)}
.news-tag.ops{background:var(--amber-faint);color:var(--amber)}
.news-tag.reg{background:var(--purple-faint);color:var(--purple)}
.news-tag.law{background:var(--green-faint);color:var(--green)}
.news-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px}
.news-date{font-size:10px;color:var(--text3)}

/* ── Network tools ── */
.net-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:12px 16px}
.net-link{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);text-decoration:none;transition:all 0.15s}
.net-link:hover{border-color:var(--border2);background:var(--surface2)}
.net-icon{width:26px;height:26px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.net-name{font-size:11px;font-weight:500;color:var(--text)}
.net-sub{font-size:10px;color:var(--text3)}

/* ── User modal ── */
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:1000;align-items:flex-start;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:230px;box-shadow:0 4px 20px rgba(0,0,0,0.12);overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.15s}
.ud-item:hover{background:var(--surface2)}
.ud-item.current{background:var(--blue-faint)}
.ud-av{width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.ud-name{font-size:12px;font-weight:500;color:var(--text)}
.ud-role{font-size:10px;color:var(--text3)}
.ud-tick{margin-left:auto;color:var(--green);font-size:14px;display:none}
.ud-item.current .ud-tick{display:block}

/* ── Empty state ── */
.empty-row{padding:24px 16px;text-align:center;color:var(--text3);font-size:12px}
</style>
</head>
<body>

<div id="global-nav-wrap"></div>

<div class="page" id="page"></div>

<!-- User switcher -->

      <i class="ti ti-check ud-tick"></i>
    </div>
    
      <i class="ti ti-check ud-tick"></i>
    </div>
    
      <i class="ti ti-check ud-tick"></i>
    </div>
  </div>
</div>

<script>
/* ── State ── */
var activeUser = STATE.getActiveUser(); /* always read from STATE */

/* ── News data ── */
var LEGAL_NEWS = [
  {source:'CJEU',title:'Flightright v Iberia: Hidden technical defects not extraordinary circumstances — carriers cannot rely on manufacturer notices alone',date:'22 May 2026',tag:'Case law',tagCls:'law'},
  {source:'CAA',title:'UK261 enforcement update: Increased scrutiny of extraordinary circumstances evidence standards across major carriers',date:'18 May 2026',tag:'Regulatory',tagCls:'reg'},
  {source:'Supreme Court',title:'Lipton v BA Cityflyer: Pilot illness confirmed not extraordinary — full judgment published with costs guidance',date:'12 May 2026',tag:'Case law',tagCls:'law'},
  {source:'DfT',title:'Post-Brexit UK261 review: Government consultation on compensation thresholds closes 30 June 2026',date:'1 May 2026',tag:'Policy',tagCls:'reg'},
];

var OPS_NEWS = [
  {source:'Eurocontrol',title:'Summer 2026 ATC capacity restrictions: Southern Europe route network — significant ATFM delays forecast June through August',date:'30 May 2026',tag:'Operations',tagCls:'ops'},
  {source:'NATS',title:'London TMA restrictions active 1–14 June: Expected average delays of 18 minutes at peak periods',date:'29 May 2026',tag:'ATC',tagCls:'ops'},
  {source:'Met Office',title:'Convective outlook: Elevated thunderstorm risk across Mediterranean basin this weekend — BCN, PMI, ALC affected',date:'30 May 2026',tag:'Weather',tagCls:'ops'},
  {source:'Eurocontrol NOP',title:'Palma de Mallorca sector congestion: ATFM regulations in force daily 10:00–18:00 UTC through June',date:'28 May 2026',tag:'NOTAM',tagCls:'ops'},
];

var NET_LINKS = [
  {href:'https://www.public.nm.eurocontrol.int/PUBPORTAL/gateway/spec/',icon:'ti-radar',bg:'#EFF6FF',col:'#1D4ED8',name:'Eurocontrol NOP',sub:'ATFM & network data'},
  {href:'https://www.flightradar24.com',icon:'ti-plane',bg:'var(--surface3)',col:'#374151',name:'Flightradar24',sub:'Live flight tracking'},
  {href:'https://notams.aim.faa.gov/notamSearch/disclaimer.html',icon:'ti-file-alert',bg:'#FEF3C7',col:'#92400E',name:'NOTAM Search',sub:'Aerodrome notices'},
  {href:'https://www.ogimet.com',icon:'ti-cloud-storm',bg:'#EEEDFE',col:'#4338CA',name:'Ogimet',sub:'METAR & TAF'},
  {href:'https://www.metoffice.gov.uk',icon:'ti-cloud',bg:'var(--green-faint)',col:'var(--green)',name:'Met Office',sub:'Hazard forecasts'},
  {href:'https://www.lightningmaps.org/blitzortung/europe/index.php?lang=en',icon:'ti-bolt',bg:'#FEF3C7',col:'#B45309',name:'Lightning Maps',sub:'Live strike data'},
];

/* ── User nav ── */
function toggleUserMenu(){ document.getElementById('user-modal').classList.toggle('open'); }
function closeMenu(){ document.getElementById('user-modal').classList.remove('open'); }

function switchUser(id){
  STATE.setActiveUser(id);
  activeUser = STATE.getActiveUser();
  switchGlobalUser(id); /* update nav */
  render();
}

function initNav(){
  var u = USERS[activeUser];
  document.getElementById('nav-av').textContent = u.initials;
  document.getElementById('nav-user').textContent = u.name;
  document.getElementById('ud-'+activeUser).classList.add('current');
}

/* ── Greeting ── */
function greeting(){
  var h = new Date().getHours();
  var salut = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  return salut + ', ' + USERS[activeUser].full.split(' ')[0] + '.';
}
function dateStr(){
  var d = new Date();
  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

/* ── Render ── */
function render(){ activeUser = STATE.getActiveUser(); //_use STATE 
  var u = USERS[activeUser];
  var myCases = getCasesForUser(STATE.getActiveUser());
  var urgentCases = myCases.filter(function(c){ return c.cprDaysLeft <= 3; });
  var warnCases   = myCases.filter(function(c){ return c.cprDaysLeft > 3 && c.cprDaysLeft <= 7; });
  var evidenceCases = myCases.filter(function(c){ return c.stage === 'evidence'; });
  var draftingCases = myCases.filter(function(c){ return c.stage === 'drafting'; });
  var intakeCases   = myCases.filter(function(c){ return c.stage === 'intake'; });

  /* ── Urgent strip ── */
  var urgentHtml = '';
  if(!urgentCases.length && !warnCases.length){
    urgentHtml = '<div class="us-clear"><i class="ti ti-circle-check" style="font-size:13px"></i>No urgent CPR deadlines this week</div>';
  } else {
    urgentHtml = urgentCases.map(function(c){
      return '<a href="module3-cpr-workspace.html" class="us-chip chip-urgent"><i class="ti ti-clock" style="font-size:11px"></i>'+c.ref+' — '+c.cprDaysLeft+'d</a>';
    }).join('') + warnCases.map(function(c){
      return '<a href="module3-cpr-workspace.html" class="us-chip chip-warn"><i class="ti ti-clock" style="font-size:11px"></i>'+c.ref+' — '+c.cprDaysLeft+'d</a>';
    }).join('');
  }

  /* ── Personal stat cards ── */
  var mostUrgent = myCases.reduce(function(min,c){ return c.cprDaysLeft < min ? c.cprDaysLeft : min; }, 999);
  var urgentSub = mostUrgent === 999 ? 'No open cases' : mostUrgent <= 3 ? mostUrgent+'d — act now' : mostUrgent+'d — next deadline';
  var urgentSubCls = mostUrgent <= 3 ? 'urgent' : mostUrgent <= 7 ? 'warn' : '';

  var statsHtml = [
    {label:'My open cases',   val:myCases.length,         icon:'ti-briefcase',    bg:'#EFF6FF',col:'#1D4ED8', sub:u.role,           subcls:''},
    {label:'Intake queue',    val:intakeCases.length,     icon:'ti-inbox',        bg:'#FEF3C7',col:'#92400E', sub:intakeCases.length?'Awaiting action':'Clear',subcls:intakeCases.length?'warn':'good'},
    {label:'Evidence packs',  val:evidenceCases.length,   icon:'ti-folder-open',  bg:'#EEEDFE',col:'#4338CA', sub:evidenceCases.length?'In progress':'None active',subcls:''},
    {label:'Next CPR deadline',val:mostUrgent===999?'—':mostUrgent+'d',icon:'ti-calendar-due',bg:'#FCF0EF',col:'#C0392B', sub:urgentSub, subcls:urgentSubCls},
  ].map(function(s){
    return '<div class="pstat">'
      +'<div class="pstat-top"><div class="pstat-label">'+s.label+'</div>'
      +'<div class="pstat-icon" style="background:'+s.bg+'"><i class="ti '+s.icon+'" style="color:'+s.col+';font-size:13px"></i></div>'
      +'</div>'
      +'<div class="pstat-val">'+s.val+'</div>'
      +'<div class="pstat-sub '+s.subcls+'">'+s.sub+'</div>'
      +'</div>';
  }).join('');

  /* ── Pipeline strip ── */
  var STAGES = [
    {id:'intake',    label:'Intake',    col:'#1D4ED8'},
    {id:'triage',    label:'Triage',    col:'#92400E'},
    {id:'cpr',       label:'CPR',       col:'#B45309'},
    {id:'evidence',  label:'Evidence',  col:'#4338CA'},
    {id:'drafting',  label:'Drafting',  col:'#065F46'},
    {id:'defence',   label:'Defence',   col:'#1A7A4A'},
    {id:'resolve',   label:'Resolve',   col:'#374151'},
  ];
  var STAGE_LINKS = {
    intake:'module1-intake.html',triage:'module2-case-management.html',
    cpr:'module3-cpr.html',evidence:'module4-evidence.html',
    drafting:'module5-drafting.html',defence:'module5-drafting-workspace.html',
    resolve:'module2-case-workspace.html'
  };
  var pipelineHtml = STAGES.map(function(s){
    var count = myCases.filter(function(c){ return c.stage===s.id; }).length;
    var colStyle = count > 0 ? 'color:'+s.col : 'color:var(--border2)';
    return '<a href="'+(STAGE_LINKS[s.id]||'#')+'" class="pipe-stage">'
      +'<div class="pipe-count" style="'+colStyle+'">'+count+'</div>'
      +'<div class="pipe-name">'+s.label+'</div>'
      +'</a>';
  }).join('');

  /* ── My cases sorted by urgency ── */
  var sortedCases = myCases.slice().sort(function(a,b){ return a.cprDaysLeft - b.cprDaysLeft; });
  var caseRowsHtml = sortedCases.length
    ? sortedCases.map(function(c){
        var urg = daysUrgency(c.cprDaysLeft);
        var sc = stageColor(c.stage); var sb = stageBg(c.stage);
        return '<div class="case-row" onclick="openCase(\''+c.ref+'\')">'
          +'<div class="cr-stage-icon" style="background:'+sb+'"><i class="ti '+stageIcon(c.stage)+'" style="color:'+sc+';font-size:12px"></i></div>'
          +'<div style="flex:1;min-width:0">'
          +'<div class="cr-ref">'+c.ref+'</div>'
          +'<div class="cr-name">'+c.claimant+' v. TestAirways</div>'
          +'<div class="cr-meta">'+c.flight+' · '+c.value+'</div>'
          +'</div>'
          +'<div class="cr-right">'
          +'<span class="stage-pill" style="background:'+sb+';color:'+sc+'">'+stageLabel(c.stage)+'</span>'
          +'<span class="days-pill dp-'+urg+'">'+urgencyLabel(c.cprDaysLeft)+'</span>'
          +'</div></div>';
      }).join('')
    : '<div class="empty-row">No open cases assigned to you.</div>';

  /* ── Evidence progress ── */
  var evHtml = evidenceCases.length
    ? evidenceCases.map(function(c){
        var pct = c.evidencePct || 0;
        var col = evPctColor(pct);
        return '<div class="ev-row">'
          +'<div style="flex:1;min-width:0">'
          +'<div class="ev-name">'+c.claimant+'</div>'
          +'<div class="ev-meta">'+c.ref+' · '+c.disruptionType+'</div>'
          +'</div>'
          +'<div class="ev-bar-wrap">'
          +'<div class="ev-bar"><div class="ev-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
          +'<span class="ev-pct" style="color:'+col+'">'+pct+'%</span>'
          +'</div></div>';
      }).join('')
    : '<div class="empty-row">No cases at evidence stage.</div>';

  /* ── CPR deadlines list ── */
  var deadlineHtml = sortedCases.filter(function(c){ return c.cprDaysLeft <= 21; }).length
    ? sortedCases.filter(function(c){ return c.cprDaysLeft <= 21; }).map(function(c){
        var urg = daysUrgency(c.cprDaysLeft);
        return '<div class="dl-row">'
          +'<div class="dl-ref">'+c.ref+'</div>'
          +'<div class="dl-name">'+c.claimant+'</div>'
          +'<div class="dl-type">'+c.type.split('—')[0].trim()+'</div>'
          +'<span class="days-pill dp-'+urg+'" style="margin-left:8px">'+urgencyLabel(c.cprDaysLeft)+'</span>'
          +'</div>';
      }).join('')
    : '<div class="empty-row">No deadlines in the next 21 days.</div>';

  /* ── Legal news ── */
  var legalNewsHtml = LEGAL_NEWS.map(function(n){
    return '<div class="news-item">'
      +'<div class="news-source">'+n.source+'<span class="news-tag '+n.tagCls+'">'+n.tag+'</span></div>'
      +'<div class="news-title">'+n.title+'</div>'
      +'<div class="news-date">'+n.date+'</div>'
      +'</div>';
  }).join('');

  /* ── Ops & network news ── */
  var opsNewsHtml = OPS_NEWS.map(function(n){
    return '<div class="news-item">'
      +'<div class="news-source">'+n.source+'<span class="news-tag '+n.tagCls+'">'+n.tag+'</span></div>'
      +'<div class="news-title">'+n.title+'</div>'
      +'<div class="news-date">'+n.date+'</div>'
      +'</div>';
  }).join('');

  /* ── Network tools ── */
  var netToolsHtml = '<div class="net-grid">'
    +NET_LINKS.map(function(n){
      return '<a href="'+n.href+'" target="_blank" rel="noopener" class="net-link">'
        +'<div class="net-icon" style="background:'+n.bg+'"><i class="ti '+n.icon+'" style="color:'+n.col+'"></i></div>'
        +'<div><div class="net-name">'+n.name+'</div><div class="net-sub">'+n.sub+'</div></div>'
        +'</a>';
    }).join('')
    +'</div>';

  /* ── Assemble page ── */
  document.getElementById('page').innerHTML =
    /* Header */
    '<div class="page-header">'
    +'<div class="greeting">'+greeting()+'</div>'
    +'<div class="greeting-sub">'+dateStr()+'</div>'
    +'</div>'

    /* Urgent strip */
    +'<div class="urgent-strip">'
    +'<div class="us-label"><i class="ti ti-alarm" style="font-size:11px"></i>CPR watch</div>'
    +urgentHtml
    +'</div>'

    /* Personal stats */
    +'<div class="grid-4">'+statsHtml+'</div>'

    /* Pipeline */
    +'<div class="pipeline">'
    +'<div class="pipe-label">My pipeline</div>'
    +pipelineHtml
    +'</div>'

    /* My cases + Evidence progress */
    +'<div class="grid-2">'

    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-briefcase" style="color:var(--blue)"></i>My cases</div>'
    +'<a href="module2-case-management.html" class="panel-link">View all <i class="ti ti-arrow-right" style="font-size:11px"></i></a></div>'
    +caseRowsHtml
    +'</div>'

    +'<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-calendar-due" style="color:var(--red)"></i>CPR deadlines</div>'
    +'<a href="module3-cpr.html" class="panel-link">View all <i class="ti ti-arrow-right" style="font-size:11px"></i></a></div>'
    +deadlineHtml
    +'</div>'
    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-folder-open" style="color:var(--purple)"></i>Evidence progress</div>'
    +'<a href="module4-evidence.html" class="panel-link">View all <i class="ti ti-arrow-right" style="font-size:11px"></i></a></div>'
    +evHtml
    +'</div>'
    +'</div>'

    +'</div>'

    /* News section */
    +'<div class="grid-news">'

    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-gavel" style="color:var(--text3)"></i>Legal & regulatory</div></div>'
    +legalNewsHtml
    +'</div>'

    +'<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-radar" style="color:var(--text3)"></i>Network & operations</div></div>'
    +opsNewsHtml
    +'</div>'
    +'<div class="panel">'
    +'<div class="panel-hdr"><div class="panel-title"><i class="ti ti-world" style="color:var(--text3)"></i>Live sources</div></div>'
    +netToolsHtml
    +'</div>'
    +'</div>'

    +'</div>';
}

/* ── Case navigation ── */
var STAGE_WORKSPACE = {
  intake:'module1-intake.html',
  triage:'module2-case-workspace.html',
  cpr:'module3-cpr-workspace.html',
  evidence:'module4-evidence-workspace.html',
  drafting:'module5-drafting-workspace.html',
  defence:'module5-drafting-workspace.html',
  resolve:'module2-case-workspace.html',
};
function openCase(ref){
  var c = getCase(ref);
  if(!c) return;
  try{
    sessionStorage.setItem('aeroCaseData', JSON.stringify({
      ref:c.ref, claimant:c.claimant, solicitor:c.solicitor,
      flight:c.flight, value:c.value, type:c.type,
      date:c.locDate, framework:'EC Regulation 261/2004',
      points:c.points, assignedTo:USERS[c.assignedTo].name
    }));
  }catch(e){}
  window.location.href = (STAGE_WORKSPACE[c.stage]||'module2-case-workspace.html')+'?ref='+ref;
}

/* ── Init ── */
initNav();
render();
</script>
</body>
</html>
