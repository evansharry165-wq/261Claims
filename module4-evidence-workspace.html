<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>261Claims — Evidence Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;
  --blue:#2A6FDB;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:calc(100vh - 48px)}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--purple-faint);color:var(--purple);border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}

.body{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
.main{overflow-y:auto;padding:20px 24px}
.sidebar{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}

/* case header */
.case-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:15px 18px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ch-ref{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:2px}
.ch-name{font-size:16px;font-weight:500;color:var(--text);margin-bottom:5px;letter-spacing:-0.01em}
.ch-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text2)}
.ch-meta span{display:flex;align-items:center;gap:4px}
.ch-meta i{font-size:12px;color:var(--text3)}
.ch-right{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.status-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}

/* collapsible card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:12px;overflow:hidden}
.card-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.card-header:hover{background:var(--surface2)}
.card-header-left{display:flex;align-items:center;gap:9px}
.card-icon{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--text3);margin-top:1px}
.card-chevron{font-size:13px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.card-chevron.open{transform:rotate(180deg)}
.card-body{padding:14px 16px;border-top:1px solid var(--border);display:none}
.card-body.open{display:block}

/* form */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.fl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:3px}
.fi{width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.fi:focus{outline:none;border-color:var(--blue)}
.fi.ai{background:var(--blue-faint);border-color:#BFDBFE;color:var(--blue-text)}
.fs{width:100%;font-size:12px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);cursor:pointer}
.fs:focus{outline:none;border-color:var(--blue)}
.fta{width:100%;font-size:12px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);resize:vertical;min-height:60px;line-height:1.5}
.fta:focus{outline:none;border-color:var(--blue)}
.ai-tag{font-size:9px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:8px;padding:1px 5px;margin-left:3px;vertical-align:middle}
.form-div{height:1px;background:var(--border);margin:12px 0}
.form-sec{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:8px}
.fdp-box{background:var(--surface2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-top:6px}
.fdp-val{font-weight:500;color:var(--text);font-family:var(--mono)}
.fdp-warn{color:var(--red);font-weight:500}
.btn-sm{font-size:11px;font-weight:500;padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2)}

/* disruption type */
.dt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.dt-btn{padding:8px 5px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;text-align:center;font-size:10px;font-weight:500;color:var(--text2);background:var(--surface);transition:all 0.15s;font-family:var(--font);line-height:1.3}
.dt-btn:hover{border-color:var(--border2);background:var(--surface3)}
.dt-btn.primary-sel{background:var(--navy);border-color:var(--navy);color:#fff}
.dt-btn.secondary-sel{background:var(--purple-faint);border-color:var(--purple);color:var(--purple)}
.dt-btn i{display:block;font-size:15px;margin-bottom:4px}
.dt-legend{display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text2)}
.dt-legend span{display:flex;align-items:center;gap:5px}
.dt-swatch{width:10px;height:10px;border-radius:3px}
.dt-mode-row{display:flex;gap:6px;margin-bottom:10px}
.dt-mode-btn{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text2);transition:all 0.15s}
.dt-mode-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* verdict */
.verdict{border-radius:var(--r2);padding:11px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.verdict-defend{background:var(--green-faint);border:1px solid #BBF7D0}
.verdict-incomplete{background:var(--surface3);border:1px solid var(--border2)}
.verdict-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.verdict-title{font-size:13px;font-weight:500}
.verdict-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5}

/* evidence tier */
.ev-tier{margin-bottom:14px}
.ev-tier-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px}
.ev-tier-left{display:flex;align-items:center;gap:8px}
.ev-tier-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ev-tier-title{font-size:12px;font-weight:500;color:var(--text)}
.ev-tier-sub{font-size:11px;color:var(--text3);margin-top:1px}
.ev-tier-right{display:flex;align-items:center;gap:8px}
.ev-tier-count{font-size:11px;color:var(--text3)}
.btn-pull{font-size:10px;font-weight:500;padding:4px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-family:var(--font);color:var(--text2);display:inline-flex;align-items:center;gap:4px;transition:all 0.15s}
.btn-pull:hover{background:var(--surface3)}
.btn-pull.pulling{background:var(--blue-faint);border-color:#BFDBFE;color:var(--blue-text);cursor:default}
.btn-pull.pulled{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}

/* evidence item */
.ev-item{border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;background:var(--surface);overflow:hidden}
.ev-item.ev-uploaded{border-color:#BBF7D0;background:#FAFFFE}
.ev-item.ev-api{border-color:#BFDBFE;background:var(--blue-faint)}
.ev-item.ev-pending{border-left:3px solid var(--blue)}
.ev-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ev-d-green{background:var(--green-l)}
.ev-d-amber{background:#F59E0B}
.ev-d-red{background:var(--red)}
.ev-d-blue{background:var(--blue)}
.ev-d-grey{background:var(--border2)}
.ev-info{flex:1;min-width:0}
.ev-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ev-why{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.ev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ev-source{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.ev-source a{color:var(--blue-text);text-decoration:none}
.ev-source a:hover{text-decoration:underline}
.ev-api-pill{font-size:9px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:10px;padding:1px 6px;display:inline-flex;align-items:center;gap:3px}
.ev-actions{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ev-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.tag-key{background:var(--red-faint);color:var(--red)}
.tag-sec{background:var(--amber-faint);color:var(--amber)}
.tag-wide{background:var(--purple-faint);color:var(--purple)}
.tag-up{background:var(--green-faint);color:var(--green)}
.tag-api{background:var(--blue-faint);color:var(--blue-text)}
.btn-ev{font-size:10px;padding:4px 9px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font);display:inline-flex;align-items:center;gap:3px;transition:background 0.15s;white-space:nowrap}
.btn-ev:hover{background:var(--surface3)}
.btn-ev.done{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}
.btn-ev.api-btn{background:var(--blue-faint);border-color:#BFDBFE;color:var(--blue-text);cursor:not-allowed}
.ev-file{font-size:10px;color:var(--text3);font-family:var(--mono);padding:0 12px 8px 29px}
.ev-api-note{font-size:10px;color:var(--blue-text);padding:0 12px 8px 29px;font-style:italic}

/* empty */
.ev-empty{text-align:center;padding:44px 20px;color:var(--text3)}
.ev-empty i{font-size:32px;display:block;margin-bottom:10px;opacity:0.4}
.ev-empty p{font-size:12px;line-height:1.6}

/* progress */
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:var(--green-l);transition:width 0.4s;border-radius:2px}
.prog-stats{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.prog-stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.prog-stat strong{color:var(--text)}

/* sidebar */
.sb-header{padding:13px 15px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:12px;font-weight:500;color:var(--text)}
.sb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.audit-scroll{flex:1;overflow-y:auto;padding:10px 13px}
.audit-entry{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.audit-entry:last-child{border-bottom:none}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.a-create{background:var(--green-l)}.a-action{background:var(--green-l)}
.a-upload{background:#8B5CF6}.a-note{background:var(--amber)}
.a-save{background:var(--blue)}.a-pull{background:var(--blue)}
.a-text{font-size:11px;color:var(--text);line-height:1.4}
.a-time{font-size:10px;color:var(--text3);margin-top:1px}
.note-bar{padding:9px 11px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}
.note-bar input{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.note-bar input:focus{outline:none;border-color:var(--blue)}
.note-bar button{font-size:11px;padding:5px 9px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--font);color:var(--text2)}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="global-nav-wrap"></div>
<div class="app">
  <div class="body">
    <div class="main" id="main"></div>
    <div class="sidebar">
      <div class="sb-header">
        <div class="sb-title">Audit trail</div>
        <div class="sb-sub" id="audit-count">0 entries</div>
      </div>
      <div class="audit-scroll" id="audit-scroll"></div>
      <div class="note-bar">
        <input type="text" id="note-input" placeholder="Add a note…" onkeydown="if(event.key==='Enter')addNote()">
        <button onclick="addNote()">Add</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="file-input" onchange="handleUpload(event)">

    W:['case_studies','caa_docs','policies','eurocontrol_w','airport_info']
  },
  /* Overnight Delays secondary type */
  'Crew Hours / Overnight Delay':{
    K:['tops','disco','aims','safetynet'],
    S:['connected','lido','hermes','max_ops','dpm','internal_email','ops_review'],
    W:['overnight_docs','crew_docs','caa_docs','ac_ops','case_studies']
  },
};
/* ── Local state ── */
var primaryType='', secondaryType='', dtMode='primary';
var uploads={}, pullState={};
var summaryOpen=false;
var audit=[];
var pendingUpload=null;

var D={
  flightNum:fm?fm[1]:'', dep:am?am[1]:'', arr:am?am[2]:'',
  cat:vm?(parseInt(vm[1])<=250?'A':parseInt(vm[1])<=400?'B':'C'):'',
  std:C.std||'',sta:C.sta||'',atd:C.atd||'',ata:C.ata||'',
  acReg:C.registration||'',crewBase:'',reportTime:'',lastLand:'',
  maxFDP:'',plannedFDP:'',sectors:'',acPlan:'',
  primaryCause:C.disruptionType||'',secondaryCause:'',
  summary:C.triageNote||'',classification:C.classification||'DEFEND'
};
function restoreEvidenceState(){
  if(!C || !C.ref) return;
  var saved = STATE.loadEvidence(C.ref);
  if(!saved) return;
  if(saved.primaryType) primaryType = saved.primaryType;
  if(saved.secondaryType) secondaryType = saved.secondaryType;
  if(saved.uploads) uploads = saved.uploads;
  if(saved.pullState) pullState = saved.pullState;
  if(saved.D) Object.assign(D, saved.D);
}

/* ── Auto-save to STATE ── */
function autoSaveEvidence(){
  if(!C || !C.ref) return;
  try{
    STATE.saveEvidence(C.ref, {
      primaryType:primaryType, secondaryType:secondaryType,
      uploads:uploads, pullState:pullState, D:D
    });
  }catch(e){}
}

function ts(){return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function log(t,type){audit.push({t:t,type:type||'action',time:ts(),by:(C.assignedTo||'')});renderAudit();}

/* ── Build combined evidence list ── */
function getList(tier){
  var seen={}, list=[];
  function add(ids){
    if(!ids)return;
    ids.forEach(function(id){
      if(!seen[id]&&LIB[id]&&LIB[id].tier===tier){seen[id]=true;list.push(id);}
    });
  }
  if(primaryType&&MATRIX[primaryType]){add(MATRIX[primaryType][tier]);}
  if(secondaryType&&MATRIX[secondaryType]){add(MATRIX[secondaryType][tier]);}
  return list;
}

/* ── Readiness ── */
function getReadiness(){
  var allIds=[], seen={};
  ['K','S','W'].forEach(function(t){getList(t).forEach(function(id){if(!seen[id]){seen[id]=true;allIds.push(id);}});});
  var total=allIds.length;
  var up=allIds.filter(function(id){return uploads[id]||if(true){ pullState[id]==='done';}).length;
  return {total:total,up:up,pct:total?Math.round(up/total*100):0};
}

/* ── FDP calc ── */
function calcBuffer(){
  function m(s){if(!s)return null;var p=s.split(':');return p.length===2?parseInt(p[0])*60+parseInt(p[1]):null;}
  var max=m(D.maxFDP), pl=m(D.plannedFDP);
  if(max===null||pl===null)return null;
  var buf=max-pl;
  if(buf<0)return {val:null,breach:true,diff:Math.abs(buf)};
  var h=Math.floor(buf/60),mn=buf%60;
  return {val:(h<10?'0':'')+h+':'+(mn<10?'0':'')+mn,breach:false};
}

/* ── Verdict ── */
function getVerdict(){
  if(!primaryType)return null;
  var r=getReadiness();
  var keyList=getList('K');
  var keyUp=keyList.filter(function(id){return uploads[id]||if(true){ pullState[id]==='done';}).length;
  if(keyUp===keyList.length&&keyList.length>0)
    return {cls:'verdict-defend',icon:'ti-shield-check',col:'var(--green)',title:'Defendable',sub:'All key evidence is on file. This case is ready to proceed to defence drafting.'};
  return {cls:'verdict-incomplete',icon:'ti-alert-triangle',col:'var(--amber)',title:'Evidence incomplete — cannot proceed to defence',sub:'Key evidence is outstanding. Upload or pull the required documents before this case can be defended.'};
}

  m.innerHTML=hdr+summary+typeCard+evHtml;

function renderAudit(){
  var el=document.getElementById('audit-scroll');
  document.getElementById('audit-count').textContent=audit.length+' entr'+(audit.length===1?'y':'ies');
  if(!audit.length){el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px 0">No activity yet</div>';return;}
  el.innerHTML=audit.slice().reverse().map(function(e){
    return '<div class="audit-entry"><div class="a-dot a-'+e.type+'"></div>'
      +'<div><div class="a-text">'+e.t+'</div>'
      +'<div class="a-time">'+e.time+' · '+e.by+'</div></div></div>';
  }).join('');
}

/* ── Actions ── */
function selectType(id){
  if(dtMode==='primary'){primaryType=id;}
  else{secondaryType=(secondaryType===id)?'':id;}
  log((dtMode==='primary'?'Primary':'Secondary')+' disruption type: '+id,'action');
  render();
}

function saveForm(){
  log('Disruption record saved — '+(D.flightNum||C.flight)+' · '+D.classification,'save');
}

function pullTier(tierId,idsStr){
  pullState['_tier_'+tierId]='pulling';
  render();
  setTimeout(function(){
    pullState['_tier_'+tierId]='done';
    log('Pull initiated — '+tierId.toUpperCase()+' evidence tier (connection pending — documents will populate when API is live)','pull');
    render();
  },1800);
}

function triggerUpload(id,name){pendingUpload={id:id,name:name};document.getElementById('file-input').click();}
function handleUpload(e){
  var f=e.target.files[0];
  if(!f||!pendingUpload)return;
  uploads[pendingUpload.id]=f.name;
  log('Uploaded: "'+f.name+'" — '+pendingUpload.name,'upload');
  e.target.value='';pendingUpload=null;render();
}

function addNote(){
  var inp=document.getElementById('note-input');
  var val=inp.value.trim();
  if(!val)return;
  log(val,'note');
  inp.value='';
}

window.addEventListener('DOMContentLoaded', function(){
  renderGlobalNav('evidence');
  restoreEvidenceState();
  if(C && C.claimant){
    log('Evidence module opened — ' + C.claimant + ' v. ' + (C.airline||'airline'), 'create');

  render();
