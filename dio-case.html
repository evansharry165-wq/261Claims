<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DefendAble — DIO Case</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1A1A2E;--ink2:#2D2D44;--ink3:#6B6B80;--ink4:#9B9BAA;--rule:#D8D8E0;--rule2:#EBEBF0;--surface:#FFFFFF;--surface2:#F7F7F9;--accent:#1B3A6B;--accent-faint:#EEF2F8;--confirm:#1A5C3A;--confirm-faint:#EEF7F2;--caution:#7A4E00;--caution-faint:#FDF4E3;--alert:#8B1A1A;--alert-faint:#FBF0F0;--navy:var(--ink);--blue:var(--accent);--border:var(--rule);--text:var(--ink);--font:'Helvetica Neue','Arial',sans-serif;--font-serif:'Georgia','Times New Roman',serif;--mono:'Courier New',monospace;--r:3px;--r3:5px}
html,body{min-height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.top-bar{background:var(--navy);height:48px;display:flex;align-items:center;padding:0 20px;gap:16px}
.top-bar a{color:rgba(255,255,255,0.85);text-decoration:none;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.top-bar a:hover{color:#fff}
.top-bar .gn-user-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px 10px 3px 4px;cursor:pointer}
.top-bar .gn-av{width:24px;height:24px;border-radius:50%;background:#164E63;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.top-bar .gn-user{font-size:11px;color:rgba(255,255,255,0.85)}
.user-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:500;justify-content:flex-end;padding:52px 20px 0}
.user-modal.open{display:flex}
.user-dropdown{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r3);width:240px;overflow:hidden}
.ud-header{padding:10px 14px;border-bottom:1px solid var(--rule);font-size:10px;text-transform:uppercase;color:var(--ink3)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.ud-item:hover,.ud-item.current{background:var(--accent-faint)}
.ud-av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px}
.ud-name{font-size:12px;font-weight:500}
.ud-role{font-size:10px;color:var(--ink3)}
.ud-tick{margin-left:auto;color:var(--confirm);display:none}
.ud-item.current .ud-tick{display:block}
.gn-mark{width:28px;height:28px;background:var(--blue);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;text-decoration:none}
.wrap{max-width:960px;margin:0 auto;padding:20px 20px 48px}
.back-link{font-size:12px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:14px}
.back-link:hover{text-decoration:underline}
.facts{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r3);padding:12px 14px;margin-bottom:20px;font-size:12px}
.facts-row{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:8px}
.facts-row span{color:var(--ink3)}
.facts-row strong{color:var(--ink);font-weight:500}
.facts-meta{display:flex;gap:16px;font-size:11px;color:var(--ink3);padding-top:8px;border-top:1px solid var(--rule2)}
.facts-meta strong{color:var(--ink)}
.section-rule{display:flex;align-items:center;padding-bottom:8px;margin-bottom:12px;border-bottom:1px solid var(--rule)}
.section-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r3);overflow:hidden}
.panel-hdr{padding:10px 14px;border-bottom:1px solid var(--rule2);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.ev-item{padding:12px 14px;border-bottom:1px solid var(--rule2);font-size:12px}
.ev-item:last-child{border-bottom:none}
.ev-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-red{background:var(--alert)}
.dot-amber{background:var(--caution)}
.dot-green{background:var(--confirm)}
.ev-claim{font-weight:500;line-height:1.35}
.ev-doc{font-size:11px;color:var(--ink3);line-height:1.45;margin-bottom:6px}
.ev-hint{font-size:10px;color:var(--ink4);font-style:italic;margin-bottom:8px}
.ev-req{font-size:10px;color:var(--caution);margin-bottom:8px;padding:6px 8px;background:var(--caution-faint);border-radius:var(--r)}
.btn{font-size:11px;font-weight:500;padding:7px 12px;border-radius:var(--r);border:1px solid var(--accent);background:var(--accent-faint);color:var(--accent);cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.9}
.btn-upload{border-color:var(--accent);background:var(--accent);color:#fff;width:100%;justify-content:center}
.confirm{font-size:11px;color:var(--confirm);margin-top:6px;display:flex;align-items:center;gap:4px}
.empty{padding:16px;font-size:12px;color:var(--ink4);text-align:center}
.dropzone{border:2px dashed var(--rule);border-radius:var(--r3);padding:28px 16px;text-align:center;background:var(--surface);cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:14px}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-faint)}
.dropzone p{font-size:12px;color:var(--ink3);margin-top:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4);display:block;margin-bottom:4px}
input,select,textarea{width:100%;font-family:var(--font);font-size:12px;padding:8px 10px;border:1px solid var(--rule);border-radius:var(--r);background:var(--surface)}
textarea{min-height:56px;resize:vertical}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);padding:9px 16px;font-size:12px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--confirm);color:#fff;padding:10px 16px;border-radius:var(--r3);font-size:12px;display:none;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.show{display:block}
</style>
</head>
<body>
<script src="shared_data.js"></script>
<script src="shared_theme.js"></script>
<script src="case_helpers.js"></script>
<script src="dio_helpers.js"></script>

<header class="top-bar">
  <a href="dio.html" class="gn-mark"><i class="ti ti-archive"></i></a>
  <a href="dio.html"><i class="ti ti-arrow-left"></i> Return to dashboard</a>
  <div class="gn-user-btn" onclick="toggleUserMenu()"><div class="gn-av" id="nav-av">EH</div><span class="gn-user" id="nav-user">E. Hughes</span></div>
</header>

<div class="wrap" id="app"></div>
<input type="file" id="point-file" style="display:none" accept="*/*">
<input type="file" id="bulk-file" style="display:none" accept="*/*">
<div class="toast" id="toast"></div>

<script>
var CASE_REF='', CASE_DATA=null, pendingPointId=null;

function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];});}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3200);
}

function pointStatus(p){
  var st=DIO.getEvidenceState(CASE_REF);
  var ov=(st.pointOverrides||{})[String(p.n)];
  if(ov)return ov;
  return p.evidenceStatus;
}

function getUploadName(reqId){
  var st=DIO.getEvidenceState(CASE_REF);
  return st.uploads&&st.uploads[reqId]?st.uploads[reqId]:null;
}

function saveState(st){
  DIO.saveEvidenceState(CASE_REF,st);
}

function loadState(){
  var st=DIO.getEvidenceState(CASE_REF);
  if(!st.evidenceRequests)st.evidenceRequests={};
  if(!st.uploads)st.uploads={};
  if(!st.audit)st.audit=[];
  if(!st.pointOverrides)st.pointOverrides={};
  return st;
}

function logAudit(text){
  var st=loadState();
  st.audit.unshift({t:text,time:new Date().toLocaleString('en-GB')});
  st.audit=st.audit.slice(0,30);
  saveState(st);
}

function requestIdForPoint(p){
  var req=DIO.findRequestForPoint(CASE_REF,p);
  if(req)return req.id;
  return 'point-'+p.n;
}

function triggerUpload(pointN,reqId,label){
  pendingPointId={pointN:pointN,reqId:reqId,label:label};
  document.getElementById('point-file').click();
}

function handlePointUpload(e){
  var f=e.target.files[0];
  e.target.value='';
  if(!f||!pendingPointId)return;
  var st=loadState();
  var id=pendingPointId.reqId;
  if(!st.evidenceRequests[id]){
    st.evidenceRequests[id]={
      id:id,
      name:pendingPointId.label,
      status:'received',
      requestedBy:'DIO filing',
      requestedAt:new Date().toLocaleString('en-GB'),
      requestedAtMs:Date.now(),
      caseRef:CASE_REF
    };
  }else{
    st.evidenceRequests[id].status='received';
  }
  st.uploads[id]=f.name;
  st.pointOverrides[String(pendingPointId.pointN)]='green';
  logAudit('Evidence filed: '+f.name+' — '+pendingPointId.label);
  saveState(st);
  pendingPointId=null;
  showToast('✓ '+f.name+' filed — item marked received');
  render();
}

function fileToCase(){
  var docType=document.getElementById('doc-type').value;
  var notes=document.getElementById('file-notes').value.trim();
  var st=loadState();
  var fname=st.pendingBulkFile||'evidence-upload.pdf';
  var entryId='bulk-'+Date.now();
  st.evidenceRequests[entryId]={
    id:entryId,
    name:docType+(notes?' — '+notes:''),
    status:'received',
    requestedBy:'DIO bulk filing',
    requestedAt:new Date().toLocaleString('en-GB'),
    requestedAtMs:Date.now(),
    caseRef:CASE_REF
  };
  st.uploads[entryId]=fname;
  logAudit('Bulk file to case: '+fname+' ('+docType+')');
  delete st.pendingBulkFile;
  saveState(st);
  showToast('✓ Filed to case — '+fname);
  document.getElementById('file-notes').value='';
  render();
}

function setupDropzone(){
  var dz=document.getElementById('dropzone');
  var bulkInput=document.getElementById('bulk-file');
  if(!dz)return;
  dz.onclick=function(){bulkInput.click();};
  dz.ondragover=function(ev){ev.preventDefault();dz.classList.add('drag');};
  dz.ondragleave=function(){dz.classList.remove('drag');};
  dz.ondrop=function(ev){
    ev.preventDefault();
    dz.classList.remove('drag');
    if(ev.dataTransfer.files[0]){
      var st=loadState();
      st.pendingBulkFile=ev.dataTransfer.files[0].name;
      saveState(st);
      document.getElementById('bulk-filename').textContent=ev.dataTransfer.files[0].name;
    }
  };
  bulkInput.onchange=function(ev){
    var f=ev.target.files[0];
    ev.target.value='';
    if(!f)return;
    var st=loadState();
    st.pendingBulkFile=f.name;
    saveState(st);
    document.getElementById('bulk-filename').textContent=f.name;
  };
}

function render(){
  if(!DIO.ensureDIOAccess())return;
  DIO.ensureDemoEvidenceRequests();
  CASE_REF=new URLSearchParams(window.location.search).get('ref')||'';
  CASE_REF=typeof normaliseCaseRef==='function'?normaliseCaseRef(CASE_REF):CASE_REF;
  CASE_DATA=typeof getCase==='function'?getCase(CASE_REF):null;
  if(!CASE_DATA){
    document.getElementById('app').innerHTML='<p style="padding:24px;color:var(--ink3)">Case not found.</p>';
    return;
  }
  var profile=DIO.getDIOProfile();
  if(CASE_DATA.jurisdiction!==profile.jurisdiction){
    document.getElementById('app').innerHTML='<p style="padding:24px;color:var(--alert)">This case is outside your jurisdiction.</p>';
    return;
  }

  var required=(CASE_DATA.points||[]).filter(function(p){
    var s=pointStatus(p);
    return s==='red'||s==='amber';
  });
  var onFile=(CASE_DATA.points||[]).filter(function(p){
    return pointStatus(p)==='green';
  });

  var reqHtml=required.length?required.map(function(p){
    var s=pointStatus(p);
    var reqId=requestIdForPoint(p);
    var st=DIO.getEvidenceState(CASE_REF);
    var req=(st.evidenceRequests||{})[reqId]||DIO.findRequestForPoint(CASE_REF,p);
    var uploaded=getUploadName(reqId)||(req&&getUploadName(req.id));
    var reqNote=req&&(req.status==='pending'||req.status==='received')
      ?'<div class="ev-req">Requested by '+escapeHtml(req.requestedBy||'Legal')+' · '+escapeHtml(req.requestedAt||'')+'</div>':'';
    var confirm=uploaded?'<div class="confirm"><i class="ti ti-check"></i> '+escapeHtml(uploaded)+' on file</div>':'';
    return '<div class="ev-item"><div class="ev-head"><span class="dot '+(s==='red'?'dot-red':'dot-amber')+'"></span>'
      +'<div class="ev-claim">'+escapeHtml(p.claim)+'</div></div>'
      +'<div class="ev-doc">'+escapeHtml(p.evidenceDoc||'')+'</div>'
      +'<div class="ev-hint">Obtain from: '+escapeHtml(DIO.sourceHint(p.evidenceDoc))+'</div>'
      +reqNote
      +'<button class="btn btn-upload" onclick="triggerUpload('+p.n+',\''+escapeHtml(reqId)+'\',\''+escapeHtml(p.claim).replace(/'/g,"\\'")+'\')"><i class="ti ti-upload"></i> Upload for: '+escapeHtml((p.evidenceDoc||p.claim).slice(0,40))+'</button>'
      +confirm+'</div>';
  }).join(''):'<div class="empty">All required evidence on file</div>';

  var fileHtml=onFile.length?onFile.map(function(p){
    var reqId=requestIdForPoint(p);
    var doc=getUploadName(reqId)||(p.evidenceDoc||'').slice(0,50);
    return '<div class="ev-item"><div class="ev-head"><span class="dot dot-green"></span>'
      +'<div><div class="ev-claim">'+escapeHtml(p.claim)+'</div>'
      +'<div class="ev-doc">'+escapeHtml(doc)+'</div></div></div></div>';
  }).join(''):'<div class="empty">Nothing filed yet</div>';

  var st=loadState();
  var bulkName=st.pendingBulkFile||'';

  document.getElementById('app').innerHTML=
    '<a href="dio.html" class="back-link"><i class="ti ti-arrow-left"></i> Return to dashboard</a>'
    +'<div class="facts"><div class="facts-row">'
    +'<span>Ref</span><strong>'+escapeHtml(CASE_DATA.ref)+'</strong>'
    +'<span>Claimant</span><strong>'+escapeHtml(CASE_DATA.claimant)+'</strong>'
    +'<span>Flight</span><strong>'+escapeHtml(CASE_DATA.flight||CASE_DATA.flightNum||'')+'</strong>'
    +'<span>Route</span><strong>'+escapeHtml((CASE_DATA.dep||'')+' → '+(CASE_DATA.arr||''))+'</strong>'
    +'<span>Date</span><strong>'+escapeHtml(CASE_DATA.flightDate||'')+'</strong>'
    +'<span>Disruption</span><strong>'+escapeHtml(CASE_DATA.disruptionType||'')+'</strong>'
    +'</div><div class="facts-meta">'
    +'<span>Evidence readiness: <strong>'+(CASE_DATA.evidencePct||0)+'%</strong></span>'
    +'<span>CPR deadline: <strong>'+(CASE_DATA.cprDaysLeft||'—')+' days</strong></span>'
    +'</div></div>'

    +'<div class="section-rule"><div class="section-title">What is needed</div></div>'
    +'<div class="grid">'
    +'<div class="panel"><div class="panel-hdr">Evidence required</div>'+reqHtml+'</div>'
    +'<div class="panel"><div class="panel-hdr">Already on file</div>'+fileHtml+'</div>'
    +'</div>'

    +'<div class="section-rule"><div class="section-title">Upload to case</div></div>'
    +'<div class="panel" style="padding:14px">'
    +'<div class="dropzone" id="dropzone"><i class="ti ti-cloud-upload" style="font-size:28px;color:var(--accent)"></i>'
    +'<p>Drop evidence file here or click to browse</p>'
    +'<p id="bulk-filename" style="color:var(--confirm);font-weight:500">'+(bulkName?escapeHtml(bulkName):'')+'</p></div>'
    +'<div class="form-row"><div><label>Case reference</label><input id="case-ref-field" value="'+escapeHtml(CASE_REF)+'" readonly></div>'
    +'<div><label>Document type</label><select id="doc-type">'
    +'<option>METAR</option><option>ATFM data</option><option>ADS-B track</option><option>TOPS record</option>'
    +'<option>NOTAM</option><option>Crew roster</option><option>Other</option></select></div></div>'
    +'<div style="margin-bottom:12px"><label>Notes</label><textarea id="file-notes" placeholder="Optional context for this filing"></textarea></div>'
    +'<button class="btn btn-primary" onclick="fileToCase()"><i class="ti ti-file-check"></i> File to case</button>'
    +'</div>';

  setupDropzone();
}

document.getElementById('point-file').addEventListener('change',handlePointUpload);
window.addEventListener('load',render);
</script>
<script src="shared_user_switch.js"></script>

<div id="user-modal" class="user-modal" onclick="if(event.target===this)closeMenu()">
  <div class="user-dropdown"></div>
</div>
</body>
</html>
