<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aero Claims — Module 2: Case Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1628;--navy2:#132033;
  --blue:#2A6FDB;--blue-l:#3D84F5;--blue-faint:#EFF6FF;--blue-text:#1D4ED8;
  --green:#1A7A4A;--green-l:#22A863;--green-faint:#E6F5EE;
  --red:#C0392B;--red-faint:#FCF0EF;
  --amber:#B45309;--amber-faint:#FEF3C7;
  --purple:#4338CA;--purple-faint:#EEEDFE;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;font-family:var(--font);background:var(--surface2);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;height:100vh}

/* topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-name{font-size:15px;font-weight:500;letter-spacing:-0.02em;color:var(--navy)}
.logo-tag{font-size:12px;color:var(--text3);margin-left:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mod-badge{font-size:11px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:20px;padding:3px 10px}
.av-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--navy2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-back{font-size:12px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;text-decoration:none}
.btn-back:hover{background:var(--surface3)}

/* layout */
.body{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
.main{overflow-y:auto;padding:22px 26px}
.sidebar{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}

/* stage rail */
.stage-rail{display:flex;align-items:center;gap:0;margin-bottom:22px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:14px 18px;overflow-x:auto}
.rail-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:64px;position:relative;cursor:pointer;user-select:none}
.rail-step:not(:last-child)::after{content:'';position:absolute;top:12px;right:-50%;width:100%;height:1.5px;background:var(--border2);z-index:0}
.rail-pip{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--border2);background:var(--surface3);color:var(--text3);position:relative;z-index:1;transition:all 0.2s}
.rail-pip.complete{background:var(--green-faint);border-color:var(--green-l);color:var(--green)}
.rail-pip.active{background:var(--blue-faint);border-color:var(--blue);color:var(--blue-text);box-shadow:0 0 0 3px rgba(42,111,219,0.12)}
.rail-label{font-size:10px;font-weight:500;margin-top:5px;text-align:center;color:var(--text3)}
.rail-label.active{color:var(--blue-text)}
.rail-label.complete{color:var(--green)}

/* case header */
.case-hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:16px 20px;margin-bottom:18px}
.ch-ref{font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:3px}
.ch-name{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em}
.ch-meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--text2)}
.ch-meta span{display:flex;align-items:center;gap:4px}
.ch-meta i{font-size:13px;color:var(--text3)}

/* stage card */
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;margin-bottom:16px}
.sc-top{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.sc-stage-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.sc-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px}
.sc-purpose{font-size:12px;color:var(--text2);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:var(--r);border-left:3px solid var(--border2)}
.sc-body{padding:18px 20px}
.sub-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px;margin-top:16px}
.sub-label:first-child{margin-top:0}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);transition:border-color 0.15s}
.check-item.complete{background:var(--green-faint);border-color:#BBF7D0}
.check-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surface);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.check-box:hover{border-color:var(--blue)}
.check-box.checked{background:var(--green-l);border-color:var(--green-l)}
.check-box.checked i{display:block}
.check-box i{display:none;color:#fff;font-size:11px}
.check-content{flex:1}
.check-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.check-title.done{text-decoration:line-through;color:var(--text3)}
.check-sub{font-size:11px;color:var(--text2);line-height:1.5}
.check-tag{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px}
.tag-required{background:var(--red-faint);color:var(--red)}
.tag-optional{background:var(--surface3);color:var(--text3)}

/* real inputs inside checklist */
.check-input-row{margin-top:7px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.check-select{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);cursor:pointer;min-width:160px}
.check-select:focus{outline:none;border-color:var(--blue)}
.check-input{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font);flex:1;min-width:180px}
.check-input:focus{outline:none;border-color:var(--blue)}
.check-save-btn{font-size:11px;padding:5px 12px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);white-space:nowrap}
.check-save-btn:hover{background:var(--navy2)}
.check-saved-val{font-size:11px;font-weight:500;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:5px}

/* AI recommendation block */
.ai-rec{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:4px}
.ai-rec-header{padding:11px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.ai-rec-title{font-size:12px;font-weight:500;color:var(--text);flex:1}
.ai-badge{font-size:10px;font-weight:500;background:var(--blue-faint);color:var(--blue-text);border-radius:20px;padding:2px 8px}
.ai-rec-body{padding:13px 14px}
.ai-loading{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text3)}
.ai-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* verdict pill */
.verdict-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.vp-defend{background:var(--green-faint);color:var(--green)}
.vp-escalate{background:var(--red-faint);color:var(--red)}
.vp-missing{background:var(--amber-faint);color:var(--amber)}

/* point-by-point assessment */
.point-assessment{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.pa-item{padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface)}
.pa-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pa-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pa-dot-green{background:var(--green-l)}
.pa-dot-amber{background:#F59E0B}
.pa-dot-red{background:var(--red)}
.pa-title{font-size:12px;font-weight:500;color:var(--text)}
.pa-verdict{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px;margin-left:auto}
.pav-defend{background:var(--green-faint);color:var(--green)}
.pav-missing{background:var(--amber-faint);color:var(--amber)}
.pav-escalate{background:var(--red-faint);color:var(--red)}
.pa-body{font-size:11px;color:var(--text2);line-height:1.5;padding-left:16px}
.pa-evidence{font-size:10px;color:var(--text3);font-family:var(--mono);padding-left:16px;margin-top:3px}

/* CPR deadline block */
.cpr-block{border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;background:var(--surface);margin-bottom:4px}
.cpr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.cpr-label{font-size:12px;font-weight:500;color:var(--text)}
.cpr-date{font-size:13px;font-weight:500;color:var(--red);font-family:var(--mono)}
.cpr-sub{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.btn-cal{font-size:11px;padding:6px 12px;border-radius:var(--r);background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px}
.btn-cal:hover{background:var(--navy2)}
.cal-options{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn-cal-opt{font-size:11px;padding:5px 11px;border-radius:var(--r);background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:4px;transition:all 0.15s}
.btn-cal-opt:hover{background:var(--surface3);border-color:var(--border2)}

/* LOA block */
.loa-block{border:1px solid var(--amber);border-radius:var(--r2);padding:13px 15px;background:var(--amber-faint);margin-bottom:4px}
.loa-header{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.loa-title{font-size:12px;font-weight:500;color:var(--amber)}
.loa-body{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.loa-options{display:flex;flex-direction:column;gap:6px}
.loa-opt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);cursor:pointer;padding:3px 0}
.loa-opt input[type=radio]{accent-color:var(--navy);width:14px;height:14px;cursor:pointer}

/* doc upload */
.doc-upload-item{border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;background:var(--surface);margin-bottom:7px}
.dui-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.dui-icon{width:30px;height:30px;border-radius:var(--r);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);flex-shrink:0}
.dui-icon.uploaded{background:var(--green-faint);color:var(--green)}
.dui-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.dui-status{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.st-required{background:var(--red-faint);color:var(--red)}
.st-uploaded{background:var(--green-faint);color:var(--green)}
.st-attached{background:var(--blue-faint);color:var(--blue-text)}
.st-optional{background:var(--surface3);color:var(--text3)}
.dui-why{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:7px;padding-left:40px}
.dui-actions{display:flex;align-items:center;gap:8px;padding-left:40px}
.btn-upload{font-size:11px;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:4px;transition:background 0.15s}
.btn-upload:hover{background:var(--surface3)}
.btn-upload.done{background:var(--green-faint);border-color:#BBF7D0;color:var(--green);cursor:default}
.uploaded-name{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* advance */
.advance-wrap{margin-top:18px}
.btn-advance{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.15s}
.btn-advance:hover:not(:disabled){background:var(--navy2)}
.btn-advance:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}
.advance-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:7px;min-height:16px}

/* sidebar */
.sb-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-size:12px;font-weight:500;color:var(--text)}
.sb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.audit-scroll{flex:1;overflow-y:auto;padding:10px 14px}
.audit-entry{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.audit-entry:last-child{border-bottom:none}
.audit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-stage{background:var(--blue)}.dot-action{background:var(--green-l)}.dot-upload{background:#8B5CF6}.dot-note{background:var(--amber)}.dot-create{background:var(--green-l)}.dot-ai{background:var(--blue)}
.audit-text{font-size:11px;color:var(--text);line-height:1.4}
.audit-time{font-size:10px;color:var(--text3);margin-top:2px}
.note-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.note-bar input{flex:1;font-size:11px;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font)}
.note-bar input:focus{outline:none;border-color:var(--blue)}
.note-bar button{font-size:11px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-family:var(--font);color:var(--text2);white-space:nowrap}
.note-bar button:hover{background:var(--surface3)}
input[type=file]{display:none}

/* escalate flag */
.escalate-block{border:1px solid var(--red);border-radius:var(--r2);padding:12px 14px;background:var(--red-faint);margin-top:10px}
.esc-title{font-size:12px;font-weight:500;color:var(--red);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.esc-body{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.btn-escalate{font-size:11px;padding:6px 12px;border-radius:var(--r);background:var(--red);color:#fff;border:none;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px">
      <a href="index.html" class="btn-back"><i class="ti ti-arrow-left"></i> Home</a>
      <div class="logo">
        <div class="logo-mark"><i class="ti ti-plane"></i></div>
        <span class="logo-name">Aero Claims</span>
        <span class="logo-tag">/ Case management</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="mod-badge">Module 2 — Case management</span>
      <div class="av-row"><div class="av">SB</div><span>S. Booth</span></div>
    </div>
  </div>

  <div class="body">
    <div class="main" id="main"></div>
    <div class="sidebar">
      <div class="sb-header">
        <div class="sb-title">Audit trail</div>
        <div class="sb-sub" id="audit-count">0 entries</div>
      </div>
      <div class="audit-scroll" id="audit-scroll"></div>
      <div class="note-bar">
        <input type="text" id="note-input" placeholder="Add a note to this case…" onkeydown="if(event.key==='Enter')addNote()">
        <button onclick="addNote()">Add</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="file-input" onchange="handleUpload(event)">

<script>
/* ── Case data from sessionStorage ── */
let _incoming = {};
try {
  const raw = sessionStorage.getItem('aeroCaseData');
  if(raw){ _incoming = JSON.parse(raw); sessionStorage.removeItem('aeroCaseData'); }
} catch(e){}

const CASE = {
  ref:          _incoming.ref          || 'AC-2026-0089',
  name:         _incoming.claimant     || 'Daniel Hartley',
  sol:          _incoming.solicitor    || 'Pemberton & Associates Solicitors LLP',
  flight:       _incoming.flight       || 'HC 1184 — LTN to BCN (diverted VLC)',
  value:        _incoming.value        || '£39,000+',
  type:         _incoming.type         || 'EC 261/2004 — delay / diversion',
  date:         _incoming.date         || '22 May 2026',
  framework:    _incoming.framework    || 'EC Regulation 261/2004',
  jurisdiction: _incoming.jurisdiction || 'England & Wales',
  points:       _incoming.points       || [],
  user:         'S. Booth'
};

/* ── Derive from points ── */
const redPts   = CASE.points.filter(p => p.evidenceStatus === 'red').length;
const amberPts = CASE.points.filter(p => p.evidenceStatus === 'amber').length;
const greenPts = CASE.points.filter(p => p.evidenceStatus === 'green').length;
const loaRec   = redPts >= 1 || CASE.points.length === 0;

/* ── CPR deadline (21 days from LOC date) ── */
function calcCPRDeadline(){
  try {
    const parts = CASE.date.match(/(\d+)\s+(\w+)\s+(\d{4})/);
    if(!parts) return null;
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,
      January:0,February:1,March:2,April:3,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
    const d = new Date(parseInt(parts[3]), months[parts[2]], parseInt(parts[1]));
    d.setDate(d.getDate() + 21);
    return d;
  } catch(e){ return null; }
}
const cprDeadline = calcCPRDeadline();
const cprStr = cprDeadline
  ? cprDeadline.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})
  : '12 June 2026';

/* ── State ── */
let currentStage = 0;
let checked   = {};
let uploaded  = {};
let loaChoice = '';
let assignedTo = '';
let strategyNote = '';
let triageRec = null;
let audit = [];

const SOLICITORS = ['S. Booth','J. Patel','K. Rahman','A. Lewis','External counsel'];

/* ── Stages ── */
const STAGES = [
  {
    id:'intake', label:'Intake', icon:'ti-inbox',
    color:'#1D4ED8', faint:'#EFF6FF', dot:'#3B82F6',
    purpose:'Confirm the details extracted from the letter of claim are correct. This stage is complete once you have reviewed the claim summary and decided whether to send a Letter of Acknowledgement.',
    checks:[
      {id:'c_confirm', label:'Case details confirmed as correct', sub:'Review the claimant, flight, claim type, and value extracted from the LOC.', required:true, type:'checkbox'},
      {id:'c_points',  label:'Points of claim reviewed', sub:'Read each point and note any red-flagged items that will need urgent attention in triage.', required:true, type:'checkbox'},
      {id:'c_loa',     label:'Letter of Acknowledgement decision made', sub:'See recommendation below.', required:true, type:'loa'},
    ],
    docs:[
      {id:'d_loc_attached', name:'Letter of claim', why:'Already read and attached from Module 1 intake.', icon:'ti-file-text', attached:true},
      {id:'d_booking', name:'Booking confirmation', why:'Confirms the passenger held a valid ticket. Upload if received with the LOC or separately from the airline booking system.', icon:'ti-file', required:false},
      {id:'d_other',   name:'Any other documents received with LOC', why:'Some letters of claim arrive with supporting documents — medical reports, receipts, or correspondence. Upload anything received alongside the LOC.', icon:'ti-paperclip', required:false},
    ],
    nextLabel:'Intake confirmed — proceed to triage',
  },
  {
    id:'triage', label:'Triage', icon:'ti-search',
    color:'#92400E', faint:'#FEF3C7', dot:'#F59E0B',
    purpose:'Review the AI assessment below. Assign the case to a solicitor, confirm the CPR response deadline, and record any additional notes. The AI will identify which points can be defended, which need evidence, and whether anything warrants escalation.',
    checks:[
      {id:'t_ai',     label:'AI triage assessment reviewed', sub:'Read the defence recommendation and point-by-point breakdown below before proceeding.', required:true, type:'checkbox'},
      {id:'t_assign', label:'Lead solicitor assigned', sub:'Select the solicitor responsible for this case.', required:true, type:'assign'},

/* ── Helpers ── */
function ts(){ return new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function log(text,type='action'){ audit.push({text,type,time:ts(),by:CASE.user}); renderAudit(); }

function stageComplete(idx){
  const s = STAGES[idx];
  const reqOk = s.checks.filter(c=>c.required).every(c=>checked[c.id]);
  const loaOk = idx!==0 || loaChoice!=='';
  const assignOk = idx!==1 || assignedTo!=='';
  return reqOk && loaOk && assignOk;
}
function completedCount(idx){
  return STAGES[idx].checks.filter(c=>checked[c.id]).length;
}

/* ── Render ── */
function render(){ try{renderMain();}catch(e){const m=document.getElementById('main');if(m)m.innerHTML='<div style="padding:40px;color:var(--red);font-size:13px"><strong>Error:</strong> '+e.message+'</div>';console.error(e);return;} try{renderAudit();}catch(e){} }

  }).join('');

  /* hint */
  let hint = '';
  if(!done){
    const missingReq = s.checks.filter(c=>c.required && !checked[c.id]);
    if(currentStage===0 && loaChoice==='') hint = 'Select a Letter of Acknowledgement decision to proceed';
    else if(currentStage===1 && !assignedTo) hint = 'Assign a lead solicitor to proceed';
    else if(missingReq.length) hint = missingReq.length+' required item'+(missingReq.length>1?'s':'')+' remaining';

  m.innerHTML = '<div class="stage-rail">'+rail+'</div>'
    +'<div class="case-hdr">'
    +'<div class="ch-ref">'+CASE.ref+'</div>'

function stageTitle(i){
  return ['What have we received?','What is our defence position?','What evidence do we need?','Prepare and file the defence','Close the case'][i] || STAGES[i].label;
}

function renderAudit(){
  const el = document.getElementById('audit-scroll');
  document.getElementById('audit-count').textContent = audit.length+' entr'+(audit.length===1?'y':'ies');
  if(!audit.length){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:8px 2px">No activity yet</div>'; return; }
  el.innerHTML = audit.slice().reverse().map(function(e){
    return '<div class="audit-entry">'
      +'<div class="audit-dot dot-'+e.type+'"></div>'
      +'<div><div class="audit-text">'+e.text+'</div>'
      +'<div class="audit-time">'+e.time+' &middot; '+e.by+'</div></div>'
      +'</div>';
  }).join('');
}

/* ── Actions ── */
function toggleCheck(id, label){
  if(checked[id]){ delete checked[id]; log('Unchecked: '+label,'action'); }
  else { checked[id]=true; log('Confirmed: '+label,'action'); }
  render();
}

function setLoa(val){
  loaChoice = val;
  checked['c_loa'] = true;
  const msgs = {send:'LOA decision: Letter of Acknowledgement will be sent',defer:'LOA decision: will be sent separately',none:'LOA decision: not sending'};
  log(msgs[val],'action');
  render();
}

function setAssignee(val){
  if(!val) return;
  assignedTo = val;
  checked['t_assign'] = true;
  log('Case assigned to: '+val,'action');
  render();
}

function saveNotes(){
  const inp = document.getElementById('inp-notes');
  if(!inp||!inp.value.trim()) return;
  strategyNote = inp.value.trim();
  checked['t_notes'] = true;
  log('Triage notes: '+strategyNote,'note');
  render();
}

function advance(){
  if(!stageComplete(currentStage)) return;
  log('Stage completed: '+STAGES[currentStage].label+' → '+(STAGES[currentStage+1]?.label||'closed'),'stage');
  currentStage++;
  if(currentStage===1) setTimeout(runTriageAI, 400);
  render();
  document.getElementById('main').scrollTo(0,0);
}

function jumpTo(i){
  if(i===currentStage) return;
  if(i>currentStage){
    for(let x=currentStage;x<i;x++){
      if(!stageComplete(x)){ log('Cannot advance to '+STAGES[i].label+' — '+STAGES[x].label+' incomplete','note'); return; }
    }
  }
  log('Navigated to: '+STAGES[i].label,'note');
  currentStage=i;
  render();
  document.getElementById('main').scrollTo(0,0);
}

/* ── AI triage ── */
async function runTriageAI(){
  triageRec = 'loading';
  render();

  const pointsSummary = CASE.points.length
    ? CASE.points.map(function(p){ return p.n+'. '+p.claim+' ['+p.evidenceStatus+(p.evidenceDoc?', evidence: '+p.evidenceDoc:'')+']'; }).join('\n')
    : 'No structured points extracted — claim type: '+CASE.type+', value: '+CASE.value;

  const prompt = 'You are a legal analyst for an airline. A letter of claim has been received. Analyse it and provide a structured triage assessment.\n\n'
    +'Claim: '+CASE.type+'\nFlight: '+CASE.flight+'\nValue: '+CASE.value+'\nFramework: '+CASE.framework+'\n\n'
    +'Points of claim:\n'+pointsSummary+'\n\n'
    +'For each point, state: (1) whether it can be DEFENDED with existing evidence, (2) what evidence is MISSING to defend it, or (3) whether it should be ESCALATED due to complexity or serious exposure.\n\n'
    +'IMPORTANT: Never suggest settlement as an AI recommendation. Your job is to identify defence lines, missing evidence, and escalation flags only.\n\n'
    +'Respond in this exact HTML format — no markdown, no backticks:\n'
    +'<div class="verdict-pill vp-[defend|missing|escalate]"><i class="ti ti-[shield|alert-triangle|arrow-up]"></i> Overall: [DEFENDABLE|EVIDENCE NEEDED|ESCALATE]</div>'
    +'<div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">[2-3 sentence plain English summary of overall position]</div>'
    +'<div class="point-assessment">'
    +'[For each point: <div class="pa-item"><div class="pa-top"><div class="pa-dot pa-dot-[green|amber|red]"></div><div class="pa-title">[Point number and short title]</div><span class="pa-verdict pav-[defend|missing|escalate]">[DEFEND|EVIDENCE NEEDED|ESCALATE]</span></div><div class="pa-body">[1-2 sentence assessment]</div><div class="pa-evidence">[Evidence available or needed]</div></div>]'
    +'</div>'
    +(redPts>0 ? '<div class="escalate-block"><div class="esc-title"><i class="ti ti-alert-triangle" style="font-size:13px"></i>Escalation flag</div><div class="esc-body">[Explain what specifically warrants escalation and why]</div></div>' : '');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system:'You are a specialist aviation legal analyst. You provide defence assessments for airline in-house legal teams. Be direct, specific, and practical. Never recommend settlement — only identify defence lines, missing evidence, or escalation flags.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.find(function(b){return b.type==='text';})?.text || '';
    triageRec = raw.replace(/```html|```/g,'').trim();
    log('AI triage assessment generated','ai');
  } catch(e){
    triageRec = buildFallbackTriage();
    log('AI triage assessment generated (offline mode)','ai');
  }
  render();
}

function buildFallbackTriage(){
  const overall = redPts > 1 ? 'escalate' : redPts===1 ? 'missing' : 'defend';
  const overallLabel = redPts > 1 ? 'ESCALATE' : redPts===1 ? 'EVIDENCE NEEDED' : 'DEFENDABLE';
  const overallIcon = redPts > 1 ? 'arrow-up' : redPts===1 ? 'alert-triangle' : 'shield';
  const summary = overall==='defend'
    ? 'The statutory delay claim (EC 261/2004) is largely defensible — the diversion was weather-driven and supported by available meteorological data. The quantum is capped at €400. Focus should be on documenting the extraordinary circumstances defence thoroughly.'
    : overall==='missing'
    ? 'The core delay claim can be defended on extraordinary circumstances grounds, but critical evidence is missing. Crew statements and FDR data must be obtained before a defence can be filed. The consequential loss allegation (£38,250) requires immediate independent investigation.'
    : 'Multiple points of claim have no evidence on file. The consequential loss allegation and the failure-to-warn allegation both carry significant exposure. This case requires urgent evidence gathering and senior counsel review before any response is filed.';

  let pointsHtml = '';
  if(CASE.points.length){
    pointsHtml = CASE.points.map(function(p){
      const dotCls = p.evidenceStatus==='green'?'pa-dot-green':p.evidenceStatus==='amber'?'pa-dot-amber':'pa-dot-red';
      const verdictCls = p.evidenceStatus==='green'?'pav-defend':p.evidenceStatus==='amber'?'pav-missing':'pav-escalate';
      const verdictTxt = p.evidenceStatus==='green'?'DEFEND':p.evidenceStatus==='amber'?'EVIDENCE NEEDED':'ESCALATE';
      const body = p.evidenceDetail || (p.evidenceStatus==='green'?'Evidence available to defend this point.':p.evidenceStatus==='amber'?'Partial evidence. Obtain outstanding items before filing.':'No evidence on file. Cannot defend without investigation.');
      const evLine = p.evidenceDoc ? p.evidenceDoc : (p.evidenceStatus==='red'?'No evidence currently on file':'See evidence checklist');
      return '<div class="pa-item">'
        +'<div class="pa-top"><div class="pa-dot '+dotCls+'"></div><div class="pa-title">Point '+p.n+' — '+p.claim+'</div>'
        +'<span class="pa-verdict '+verdictCls+'">'+verdictTxt+'</span></div>'
        +'<div class="pa-body">'+body+'</div>'
        +'<div class="pa-evidence">'+evLine+'</div>'
        +'</div>';
    }).join('');
  } else {
    pointsHtml = '<div class="pa-item"><div class="pa-top"><div class="pa-dot pa-dot-amber"></div>'
      +'<div class="pa-title">EC 261/2004 — Delay claim</div><span class="pa-verdict pav-missing">EVIDENCE NEEDED</span></div>'
      +'<div class="pa-body">Weather diversion claim. Extraordinary circumstances defence available if meteorological evidence supports exceptional conditions at BCN.</div>'
      +'<div class="pa-evidence">METAR, SIGMET, NOTAM records required</div></div>';
  }

  const escHtml = redPts>0
    ? '<div class="escalate-block"><div class="esc-title"><i class="ti ti-alert-triangle" style="font-size:13px"></i>Escalation flag</div>'
      +'<div class="esc-body">One or more points of claim have no evidence on file and cannot currently be defended. Do not file a response until these gaps are addressed. Senior counsel should review before proceeding.</div></div>'
    : '';

  return '<div class="verdict-pill vp-'+overall+'"><i class="ti ti-'+overallIcon+'"></i> Overall: '+overallLabel+'</div>'
    +'<div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">'+summary+'</div>'
    +'<div class="point-assessment">'+pointsHtml+'</div>'
    +escHtml;
}

/* ── Calendar export ── */
function exportICS(){
  if(!cprDeadline) return;
  const fmt = function(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; };
  const start = fmt(cprDeadline);
  const end = fmt(new Date(cprDeadline.getTime()+3600000));
  const remind14 = fmt(new Date(cprDeadline.getTime()-14*86400000));
  const remind7  = fmt(new Date(cprDeadline.getTime()-7*86400000));
  const remind3  = fmt(new Date(cprDeadline.getTime()-3*86400000));
  const ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//261Claims//EN\r\n'
    +'BEGIN:VEVENT\r\n'
    +'UID:'+CASE.ref+'-cpr@261claims\r\n'
    +'DTSTART:'+start+'\r\nDTEND:'+end+'\r\n'
    +'SUMMARY:CPR Deadline — '+CASE.name+' v. Horizon Airways ('+CASE.ref+')\r\n'
    +'DESCRIPTION:CPR response deadline for '+CASE.type+'. Value: '+CASE.value+'. Ref: '+CASE.ref+'\r\n'
    +'BEGIN:VALARM\r\nTRIGGER:'+remind14+'\r\nACTION:DISPLAY\r\nDESCRIPTION:14 days to CPR deadline — '+CASE.ref+'\r\nEND:VALARM\r\n'
    +'BEGIN:VALARM\r\nTRIGGER:'+remind7+'\r\nACTION:DISPLAY\r\nDESCRIPTION:7 days to CPR deadline — '+CASE.ref+'\r\nEND:VALARM\r\n'
    +'BEGIN:VALARM\r\nTRIGGER:'+remind3+'\r\nACTION:DISPLAY\r\nDESCRIPTION:3 days to CPR deadline — '+CASE.ref+'\r\nEND:VALARM\r\n'
    +'END:VEVENT\r\nEND:VCALENDAR';
  const blob = new Blob([ics],{type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = CASE.ref+'-CPR-deadline.ics';
  a.click();
  log('CPR deadline exported to calendar ('+cprStr+')','action');
}

function openGoogleCal(){
  if(!cprDeadline) return;
  const fmt = function(d){ return d.toISOString().replace(/[-:T]/g,'').split('.')[0]+'Z'; };
  const dates = fmt(cprDeadline)+'/'+fmt(new Date(cprDeadline.getTime()+3600000));
  const text = encodeURIComponent('CPR Deadline — '+CASE.name+' v. Horizon Airways ('+CASE.ref+')');
  const details = encodeURIComponent('CPR response deadline. Claim: '+CASE.type+'. Value: '+CASE.value);
  window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+text+'&dates='+dates+'&details='+details,'_blank');
  log('CPR deadline opened in Google Calendar','action');
}

/* ── Upload ── */
let pendingUpload = null;
function triggerUpload(docId,docName){ pendingUpload={docId,docName}; document.getElementById('file-input').click(); }
function handleUpload(e){
  const f=e.target.files[0];
  if(!f||!pendingUpload) return;
  uploaded[pendingUpload.docId]=f.name;
  log('Uploaded: "'+f.name+'" for '+pendingUpload.docName,'upload');
  e.target.value=''; pendingUpload=null; render();
}

function addNote(){
  const inp=document.getElementById('note-input');
  const val=inp.value.trim();
  if(!val) return;
  log(val,'note');
  inp.value='';
}

/* ── Init ── */
log('Case activated from intake — '+CASE.name+' v. Horizon Airways','create');
log('Claim type: '+CASE.type+' · Value: '+CASE.value,'create');
render();
